<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trip Split</title>
<meta name="description" content="Chia tiền chi tiêu nhóm cho các chuyến đi">

<!-- PWA: chuẩn chung -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A1A2E">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<!-- PWA: chuẩn riêng cho iOS Safari (không tự đọc manifest.json đầy đủ) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trip Split">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    /* Bryan In Data brand tokens */
    --navy: #1A1A2E;
    --blue: #4A6CF7;
    --blue-dark: #3A56D4;
    --purple: #8B5CF6;
    --bg-tint: #F8F9FF;

    --bg: var(--bg-tint);
    --surface: #FFFFFF;
    --surface-2: #F1F2FA;
    --surface-3: #E9EBFA;
    --border: #E3E5F2;
    --border-strong: #CBCFE8;
    --text-primary: var(--navy);
    --text-secondary: #585B78;
    --text-muted: #9295B0;
    --accent: var(--blue);
    --accent-bg: #EDF0FE;
    --accent-text: var(--blue-dark);
    --accent-2: var(--purple);
    --accent-2-bg: #F1ECFE;
    --accent-2-text: #6D3FD9;
    --success: #1A9461;
    --success-bg: #E7F6EE;
    --danger: #D6453A;
    --danger-bg: #FCEDEB;
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --shadow-card: 0 1px 2px rgba(26,26,46,0.04), 0 1px 8px rgba(26,26,46,0.03);
    --shadow-modal: 0 12px 40px rgba(26,26,46,0.18);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(circle at 8% 0%, rgba(139,92,246,0.07), transparent 45%),
      radial-gradient(circle at 100% 12%, rgba(74,108,247,0.08), transparent 40%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text-primary);
    padding: 1.25rem 1rem 3rem;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 480px; margin: 0 auto; }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .app-header .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  h1 {
    font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.01em;
  }

  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem;
    margin-bottom: 0.9rem;
    box-shadow: var(--shadow-card);
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem;
  }
  .card-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 6px;
  }
  .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

  input, select {
    height: 40px;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text-primary);
    width: 100%;
    transition: border-color 0.15s ease;
    font-family: inherit;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }

  button {
    height: 40px;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  button:hover { background: var(--surface-2); border-color: var(--border-strong); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.45; cursor: default; }
  button.primary {
    background: var(--blue);
    color: white;
    border-color: var(--blue);
    box-shadow: 0 2px 8px rgba(74,108,247,0.3);
  }
  button.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
  button.ghost { border: none; background: none; color: var(--text-muted); padding: 4px; height: auto; }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border-strong);
    background: var(--surface); font-size: 13.5px; font-weight: 500; cursor: pointer;
    transition: all 0.12s ease;
  }
  .pill.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }

  .member-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-2); border-radius: 20px; padding: 6px 6px 6px 13px;
    font-size: 13.5px; font-weight: 500; color: var(--text-primary);
  }
  .member-tag button { height: auto; border: none; background: none; padding: 3px 6px; font-size: 13px; color: var(--text-muted); }
  .member-tag button:hover { color: var(--danger); background: none; }

  .expense-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .expense-row:last-child { border-bottom: none; padding-bottom: 2px; }
  .expense-row:first-child { padding-top: 2px; }
  .expense-main { font-size: 14.5px; }
  .expense-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .amount { font-weight: 600; font-size: 14.5px; white-space: nowrap; }
  .expense-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .settlement-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0; font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .settlement-row:last-child { border-bottom: none; }
  .settlement-row .spacer { flex: 1; }
  .settlement-arrow { color: var(--accent-2); font-weight: 600; }

  .empty {
    color: var(--text-muted); font-size: 13.5px; padding: 1.1rem 0; text-align: center;
  }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,26,46,0.55);
    display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 50;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); padding: 1.4rem;
    width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-modal);
  }
  .modal h2 { font-size: 16.5px; font-weight: 600; margin: 0 0 14px; letter-spacing: -0.01em; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 13px; font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 6px; }

  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.1rem; }
  .tab {
    padding: 7px 15px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--surface); font-size: 13.5px; font-weight: 500; cursor: pointer;
    color: var(--text-secondary); transition: all 0.12s ease;
  }
  .tab:hover { border-color: var(--border-strong); }
  .tab.active {
    background: var(--navy); color: white; border-color: var(--navy);
  }
  .tab.add-tab { color: var(--accent-text); border-color: var(--accent-bg); background: var(--accent-bg); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: white; padding: 10px 18px; border-radius: 24px;
    font-size: 13.5px; font-weight: 500; z-index: 100; box-shadow: 0 8px 24px rgba(26,26,46,0.25);
  }

  .total-line {
    text-align: right; font-size: 13px; color: var(--text-secondary); margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .danger-link {
    color: var(--danger); font-size: 13px; font-weight: 500; background: none;
    border: none; padding: 6px 0; cursor: pointer;
  }

  .cat-badge {
    display: inline-flex; align-items: center; font-size: 10.5px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px; margin-right: 7px;
    text-transform: uppercase; letter-spacing: 0.02em;
  }

  .balance-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border);
  }
  .balance-row:last-child { border-bottom: none; }
  .balance-name { font-weight: 500; }
  .balance-amt { font-weight: 600; }
  .balance-pos { color: var(--success); }
  .balance-neg { color: var(--danger); }
  .balance-note { color: var(--text-muted); font-size: 11.5px; font-weight: 400; margin-left: 4px; }

  .overview-head-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    padding: 0 0 6px; gap: 4px;
  }
  .overview-head-label {
    font-size: 10.5px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.02em; text-align: right;
  }
  .overview-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    align-items: center; padding: 6px 0; gap: 4px; font-size: 13px;
  }
  .overview-val { text-align: right; font-variant-numeric: tabular-nums; }

  .icon-btn {
    border: none; background: none; padding: 6px; cursor: pointer; display: inline-flex;
    color: var(--text-muted); border-radius: var(--radius-sm); transition: all 0.12s ease;
  }
  .icon-btn:hover { color: var(--text-primary); background: var(--surface-2); }

  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
    display: inline-block; flex-shrink: 0;
  }
  .sync-dot.ok { background: var(--success); }
  .sync-dot.error { background: var(--danger); }

  .setup-banner {
    background: #FFF7E8; border: 1px solid #F0CB7C; border-radius: var(--radius);
    padding: 14px; font-size: 13.5px; margin-bottom: 1rem; color: #7A5414;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border-strong);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Category summary chart */
  .cat-chart-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 13.5px;
  }
  .cat-chart-label { width: 76px; flex-shrink: 0; color: var(--text-secondary); font-weight: 500; }
  .cat-chart-bar-track {
    flex: 1; height: 9px; border-radius: 5px; background: var(--surface-2); overflow: hidden;
  }
  .cat-chart-bar-fill { height: 100%; border-radius: 5px; }
  .cat-chart-amt { width: 64px; text-align: right; font-weight: 600; flex-shrink: 0; }
  .cat-chart-pct { width: 38px; text-align: right; color: var(--text-muted); font-size: 11.5px; flex-shrink: 0; }

  .donut-wrap { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
  .donut-legend { flex: 1; min-width: 160px; display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: var(--text-secondary); flex: 1; }
  .legend-val { font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="app-header">
    <div class="brand">
      <div class="brand-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 10h13l-3.5-3.5"/>
          <path d="M17 16H4l3.5 3.5"/>
        </svg>
      </div>
      <h1>Trip Split</h1>
    </div>
    <div class="row" style="gap:10px;">
      <button class="icon-btn" onclick="window.app.openHelp()" aria-label="Hướng dẫn sử dụng" title="Hướng dẫn sử dụng" style="font-size:15px;">❓</button>
      <span id="syncDot" class="sync-dot" title="Trạng thái đồng bộ"></span>
    </div>
  </div>
  <div id="app"></div>
</div>

<script>
/* ====== CẤU HÌNH - DÁN URL APPS SCRIPT CỦA BẠN VÀO ĐÂY ====== */
const API_URL = 'https://script.google.com/macros/s/AKfycby_YCMUQ0o9zzYbk1zttsYKsktK3tQk8ddxcXFiJfzdedxL_J-2wEnEb3wvXM36OupBHQ/exec';
/* ============================================================= */

function uid() { return Math.random().toString(36).slice(2, 10); }
function fmt(n) {
  const rounded = Math.round(n);
  const k = rounded / 1000;
  // Nếu chia hết cho 1000 thì hiện số nguyên + k, nếu không thì hiện 1 số lẻ
  const kRounded = Math.round(k * 10) / 10;
  const display = kRounded % 1 === 0 ? kRounded.toFixed(0) : kRounded.toFixed(1);
  return display.replace('.', ',') + 'k';
}
// Format số tiền theo đơn vị ngoại tệ gốc (không chia 1000 như VNĐ), kèm symbol.
function fmtForeign(n, currencyCode) {
  const rounded = Math.round(n * 100) / 100; // giữ tối đa 2 số lẻ cho ngoại tệ
  const display = rounded.toLocaleString('vi-VN', { maximumFractionDigits: 2 });
  return display + currencySymbol(currencyCode);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function parseMembers(str) { return str ? String(str).split(',').map(s => s.trim()).filter(Boolean) : []; }

const CURRENCIES = [
  { code: 'USD', symbol: '$', name: 'USD' },
  { code: 'JPY', symbol: '¥', name: 'JPY' },
  { code: 'EUR', symbol: '€', name: 'EUR' },
  { code: 'THB', symbol: '฿', name: 'THB' },
  { code: 'KRW', symbol: '₩', name: 'KRW' },
  { code: 'SGD', symbol: 'S$', name: 'SGD' },
  { code: 'CNY', symbol: '¥', name: 'CNY' },
  { code: 'TWD', symbol: 'NT$', name: 'TWD' },
  { code: 'AUD', symbol: 'A$', name: 'AUD' },
  { code: 'GBP', symbol: '£', name: 'GBP' },
];
function currencySymbol(code) {
  const found = CURRENCIES.find(c => c.code === code);
  return found ? found.symbol : code;
}
// Quy đổi 1 expense sang VNĐ để dùng cho mọi tính toán (settlement, balance, chart...).
// amount luôn lưu số tiền gốc theo currency của dòng đó; trip.exchangeRate là tỷ giá
// 1 đơn vị ngoại tệ = bao nhiêu VNĐ, áp dụng chung cho cả trip.
const CATEGORIES = [
  { id: '', label: 'Khác', color: '#9295B0', bg: '#EEEFF5', text: '#5F6275' },
  { id: 'food', label: 'Ăn uống', color: '#E8833A', bg: '#FCEEE1', text: '#A85A1F' },
  { id: 'transport', label: 'Di chuyển', color: '#3266E0', bg: '#E8EDFC', text: '#2348AD' },
  { id: 'stay', label: 'Chỗ ở', color: '#1F9E6E', bg: '#E5F6EF', text: '#157450' },
  { id: 'activity', label: 'Vui chơi', color: '#D6457A', bg: '#FCE9F0', text: '#A12E59' },
  { id: 'fund', label: 'Góp quỹ', color: '#C9970F', bg: '#FBF1DC', text: '#8A6608' },
];
// Tên thành viên đặc biệt đóng vai "người trả" khi chi tiêu bằng tiền mặt từ quỹ chung.
// Không phải người thật - bị lọc riêng khỏi bảng số dư/settlement hiển thị cho người dùng.
const CASH_FUND_NAME = 'Quỹ chung';
function categoryLabel(id) {
  const found = CATEGORIES.find(c => c.id === id);
  return found ? found.label : 'Khác';
}
function categoryColor(id) {
  const found = CATEGORIES.find(c => c.id === id);
  return found ? found.color : '#9295B0';
}
function categoryBadgeStyle(id) {
  const found = CATEGORIES.find(c => c.id === id);
  const bg = found ? found.bg : '#EEEFF5';
  const text = found ? found.text : '#5F6275';
  return `background:${bg}; color:${text};`;
}
function nowTimeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function computeCategoryTotals(expenses) {
  const totals = {};
  let grandTotal = 0;
  expenses.forEach(e => {
    // Bỏ qua khoản góp quỹ - đây không phải "chi tiêu", mà là tiền nạp vào quỹ,
    // đưa vào sẽ làm méo tỷ lệ % của các loại chi tiêu thật.
    if (e.category === 'fund') return;
    const key = e.category || '';
    const amt = e.amountVND ?? e.amount;
    totals[key] = (totals[key] || 0) + amt;
    grandTotal += amt;
  });
  const rows = Object.entries(totals)
    .map(([cat, amt]) => ({ cat, amt, pct: grandTotal > 0 ? amt / grandTotal : 0 }))
    .sort((a, b) => b.amt - a.amt);
  return { rows, grandTotal };
}

// Nhóm chi tiêu theo ngày, mỗi ngày tách theo category để vẽ stacked bar chart.
// Bỏ qua khoản góp quỹ giống computeCategoryTotals, vì lý do tương tự.
function computeDailyCategoryTotals(expenses) {
  const byDate = {}; // date -> { total, byCategory: { catId: amt } }
  expenses.forEach(e => {
    if (e.category === 'fund') return;
    const amt = e.amountVND ?? e.amount;
    const date = e.date || '';
    if (!byDate[date]) byDate[date] = { date, total: 0, byCategory: {} };
    byDate[date].total += amt;
    const catKey = e.category || '';
    byDate[date].byCategory[catKey] = (byDate[date].byCategory[catKey] || 0) + amt;
  });
  const days = Object.values(byDate).sort((a, b) => a.date < b.date ? -1 : 1);
  const maxTotal = Math.max(...days.map(d => d.total), 1);
  return { days, maxTotal };
}

function renderCategoryChart(expenses) {
  const { rows, grandTotal } = computeCategoryTotals(expenses);
  if (grandTotal <= 0) return '';

  // Vẽ donut bằng conic-gradient thuần CSS, không cần thư viện ngoài
  let gradientStops = [];
  let acc = 0;
  rows.forEach(r => {
    const start = acc * 360;
    acc += r.pct;
    const end = acc * 360;
    gradientStops.push(`${categoryColor(r.cat)} ${start}deg ${end}deg`);
  });
  const gradient = `conic-gradient(${gradientStops.join(', ')})`;

  let html = `<div class="card">
    <div class="card-head"><span class="card-title">Chi tiêu theo loại</span></div>
    <div class="donut-wrap">
      <div style="width:96px; height:96px; border-radius:50%; background:${gradient}; flex-shrink:0; position:relative;">
        <div style="position:absolute; inset:14px; background:var(--surface); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--text-secondary); text-align:center; line-height:1.3;">
          ${fmt(grandTotal)}
        </div>
      </div>
      <div class="donut-legend">`;
  rows.forEach(r => {
    html += `<div class="legend-item">
      <span class="legend-dot" style="background:${categoryColor(r.cat)};"></span>
      <span class="legend-label">${escapeHtml(categoryLabel(r.cat))}</span>
      <span class="legend-val">${Math.round(r.pct * 100)}%</span>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--border);">`;
  rows.forEach(r => {
    html += `<div class="cat-chart-row">
      <span class="cat-chart-label">${escapeHtml(categoryLabel(r.cat))}</span>
      <span class="cat-chart-bar-track"><span class="cat-chart-bar-fill" style="width:${Math.max(r.pct * 100, 3)}%; background:${categoryColor(r.cat)};"></span></span>
      <span class="cat-chart-amt">${fmt(r.amt)}</span>
      <span class="cat-chart-pct">${Math.round(r.pct * 100)}%</span>
    </div>`;
  });
  html += `</div></div>`;

  return html;
}

function renderDailyChart(expenses) {
  const { days, maxTotal } = computeDailyCategoryTotals(expenses);
  if (days.length === 0) return '';

  const CHART_H = 140; // chiều cao vùng vẽ cột (không tính label số tiền/ngày), px
  const LABEL_TOP_H = 16; // label số tiền phía trên cột
  const LABEL_BOTTOM_H = 18; // label ngày phía dưới cột
  const TOTAL_H = CHART_H + LABEL_TOP_H + LABEL_BOTTOM_H;

  let html = `<div class="card">
    <div class="card-head"><span class="card-title">Chi tiêu theo ngày</span></div>
    <div style="display:flex; align-items:flex-end; gap:10px; height:${TOTAL_H}px; overflow-x:auto; overflow-y:hidden; padding-bottom:2px; margin-top:6px;">`;

  days.forEach(d => {
    const barH = Math.max((d.total / maxTotal) * CHART_H, 4);
    // Sắp category trong cột theo thứ tự cố định (giống bảng category chính) để màu nhất quán giữa các cột
    const catEntries = CATEGORIES
      .map(c => ({ cat: c.id, amt: d.byCategory[c.id] || 0 }))
      .filter(e => e.amt > 0);

    let segmentsHtml = '';
    catEntries.forEach(e => {
      const segH = (e.amt / d.total) * barH;
      segmentsHtml += `<div style="width:100%; height:${segH}px; background:${categoryColor(e.cat)};" title="${escapeHtml(categoryLabel(e.cat))}: ${fmt(e.amt)}"></div>`;
    });

    const shortDate = d.date ? d.date.slice(5).replace('-', '/') : '?'; // "2026-06-29" -> "06/29"
    html += `<div style="display:flex; flex-direction:column; align-items:center; flex-shrink:0; width:42px;">
      <div style="font-size:10.5px; font-weight:600; color:var(--text-primary); margin-bottom:3px; white-space:nowrap;">${fmt(d.total)}</div>
      <div style="display:flex; flex-direction:column-reverse; width:26px; height:${CHART_H}px; border-radius:4px 4px 0 0; overflow:hidden;">
        ${segmentsHtml}
      </div>
      <div style="font-size:10px; color:var(--text-muted); margin-top:4px; white-space:nowrap;">${escapeHtml(shortDate)}</div>
    </div>`;
  });

  html += `</div>`;

  // Legend dùng chung danh sách category xuất hiện trong toàn bộ trip (không lặp theo từng ngày)
  const usedCats = new Set();
  days.forEach(d => Object.keys(d.byCategory).forEach(c => { if (d.byCategory[c] > 0) usedCats.add(c); }));
  html += `<div class="row" style="gap:10px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); flex-wrap:wrap;">`;
  CATEGORIES.filter(c => usedCats.has(c.id)).forEach(c => {
    html += `<div class="legend-item" style="font-size:11.5px;">
      <span class="legend-dot" style="background:${c.color};"></span>
      <span class="legend-label" style="flex:none;">${escapeHtml(c.label)}</span>
    </div>`;
  });
  html += `</div></div>`;

  return html;
}


function generateSummaryImage(trip, expenses, balances, settlements, cashFundRemaining) {
  const W = 600;
  const PAD = 36;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const scale = 2; // render @2x cho ảnh nét trên màn hình retina
  const hasCashFund = Array.isArray(cashFundRemaining) && cashFundRemaining.length > 0;

  // --- Bước 1: đo trước chiều cao cần thiết bằng cách render thử trên canvas tạm ---
  const { rows: catRows, grandTotal } = computeCategoryTotals(expenses);
  // Header (logo 50) + tên trip (22+8+28) + tổng chi (26+36)
  let estHeight = PAD + 50 + 22 + 8 + 28 + 26 + 36;
  if (catRows.length > 0) {
    const donutBlockHeight = Math.max(108, catRows.length * 26 + 8);
    estHeight += donutBlockHeight + 28;
  }
  estHeight += 22 + trip.members.length * 26 + 6 + 28; // số dư + line
  if (hasCashFund) estHeight += 22 + cashFundRemaining.length * 26 + 10 + 28; // khối quỹ tiền mặt (1 dòng/đơn vị) + line
  estHeight += 24 + Math.max(settlements.length, 1) * 28 + 10; // settlement
  estHeight += 20; // footer + padding đáy

  canvas.width = W * scale;
  canvas.height = estHeight * scale;
  ctx.scale(scale, scale);

  // --- Nền ---
  ctx.fillStyle = '#F8F9FF';
  ctx.fillRect(0, 0, W, estHeight);

  let y = PAD;

  // --- Header: logo + tên app ---
  ctx.save();
  const markGrad = ctx.createLinearGradient(PAD, y, PAD + 30, y + 30);
  markGrad.addColorStop(0, '#4A6CF7');
  markGrad.addColorStop(1, '#8B5CF6');
  ctx.fillStyle = markGrad;
  roundRect(ctx, PAD, y, 30, 30, 9);
  ctx.fill();
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(PAD + 7, y + 14); ctx.lineTo(PAD + 22, y + 14); ctx.lineTo(PAD + 18, y + 10);
  ctx.moveTo(PAD + 23, y + 19); ctx.lineTo(PAD + 8, y + 19); ctx.lineTo(PAD + 12, y + 23);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#1A1A2E';
  ctx.font = '600 15px -apple-system, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText('Trip Split', PAD + 40, y + 16);
  y += 50;

  // --- Tên trip ---
  ctx.fillStyle = '#1A1A2E';
  ctx.font = '600 22px -apple-system, sans-serif';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(trip.name, PAD, y);
  y += 8;
  ctx.strokeStyle = '#E3E5F2';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
  y += 28;

  // --- Tổng chi ---
  ctx.fillStyle = '#9295B0';
  ctx.font = '600 11px -apple-system, sans-serif';
  ctx.fillText('TỔNG CHI TIÊU', PAD, y);
  y += 26;
  ctx.fillStyle = '#1A1A2E';
  ctx.font = '700 28px -apple-system, sans-serif';
  ctx.fillText(fmt(grandTotal), PAD, y);
  y += 36;

  // --- Donut chart + legend ---
  if (catRows.length > 0) {
    const cx = PAD + 50, cy = y + 50, r = 50, rInner = 30;
    let startAngle = -Math.PI / 2;
    catRows.forEach(row => {
      const sweep = row.pct * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAngle, startAngle + sweep);
      ctx.closePath();
      ctx.fillStyle = categoryColor(row.cat);
      ctx.fill();
      startAngle += sweep;
    });
    ctx.fillStyle = '#F8F9FF';
    ctx.beginPath();
    ctx.arc(cx, cy, rInner, 0, Math.PI * 2);
    ctx.fill();

    let ly = y + 14;
    const legendX = PAD + 120;
    catRows.forEach(row => {
      ctx.fillStyle = categoryColor(row.cat);
      ctx.beginPath();
      ctx.arc(legendX, ly, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#585B78';
      ctx.font = '500 13px -apple-system, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText(categoryLabel(row.cat), legendX + 12, ly + 1);
      ctx.fillStyle = '#1A1A2E';
      ctx.font = '600 13px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(Math.round(row.pct * 100) + '%', W - PAD, ly + 1);
      ctx.textAlign = 'left';
      ly += 26;
    });
    const donutBlockHeight = Math.max(108, catRows.length * 26 + 8);
    y += donutBlockHeight;
    ctx.strokeStyle = '#E3E5F2';
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
    y += 28;
  }

  // --- Số dư từng người ---
  ctx.fillStyle = '#9295B0';
  ctx.font = '600 11px -apple-system, sans-serif';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('SỐ DƯ TỪNG NGƯỜI', PAD, y);
  y += 22;
  trip.members.forEach(m => {
    const bal = Math.round(balances[m] || 0);
    const isPos = bal > 100, isNeg = bal < -100;
    ctx.fillStyle = '#1A1A2E';
    ctx.font = '500 14px -apple-system, sans-serif';
    ctx.fillText(m, PAD, y);
    ctx.fillStyle = isPos ? '#1A9461' : isNeg ? '#D6453A' : '#9295B0';
    ctx.font = '600 14px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((bal > 0 ? '+' : '') + fmt(bal), W - PAD, y);
    ctx.textAlign = 'left';
    y += 26;
  });
  y += 6;
  ctx.strokeStyle = '#E3E5F2';
  ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
  y += 28;

  // --- Quỹ tiền mặt chung (nếu có) ---
  if (hasCashFund) {
    ctx.fillStyle = '#9295B0';
    ctx.font = '600 11px -apple-system, sans-serif';
    ctx.fillText('QUỸ TIỀN MẶT CHUNG', PAD, y);
    y += 22;
    cashFundRemaining.forEach(r => {
      const display = r.currency ? fmtForeign(r.remaining, r.currency) : fmt(r.remaining);
      ctx.fillStyle = '#1A1A2E';
      ctx.font = '500 14px -apple-system, sans-serif';
      ctx.fillText(`Còn lại (${r.label})`, PAD, y);
      ctx.fillStyle = r.remaining >= 0 ? '#1A9461' : '#D6453A';
      ctx.font = '700 14px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(display, W - PAD, y);
      ctx.textAlign = 'left';
      y += 26;
    });
    y += 10;
    ctx.strokeStyle = '#E3E5F2';
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
    y += 28;
  }

  // --- Kết quả thanh toán ---
  ctx.fillStyle = '#9295B0';
  ctx.font = '600 11px -apple-system, sans-serif';
  ctx.fillText('KẾT QUẢ THANH TOÁN', PAD, y);
  y += 24;
  if (settlements.length === 0) {
    ctx.fillStyle = '#585B78';
    ctx.font = '500 14px -apple-system, sans-serif';
    ctx.fillText('Mọi người đã hòa sổ', PAD, y);
    y += 26;
  } else {
    settlements.forEach(s => {
      ctx.fillStyle = '#1A1A2E';
      ctx.font = '600 14px -apple-system, sans-serif';
      ctx.fillText(s.from, PAD, y);
      const fromWidth = ctx.measureText(s.from).width;
      ctx.fillStyle = '#8B5CF6';
      ctx.font = '600 14px -apple-system, sans-serif';
      ctx.fillText(' → ', PAD + fromWidth, y);
      const arrowWidth = ctx.measureText(' → ').width;
      ctx.fillStyle = '#1A1A2E';
      ctx.fillText(s.to, PAD + fromWidth + arrowWidth, y);
      ctx.font = '700 14px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(fmt(s.amount), W - PAD, y);
      ctx.textAlign = 'left';
      y += 28;
    });
  }
  y += 10;

  // --- Footer ---
  ctx.fillStyle = '#9295B0';
  ctx.font = '400 11px -apple-system, sans-serif';
  ctx.fillText('Tạo bởi Trip Split', PAD, y);

  // --- Xuất PNG ---
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${trip.name.replace(/[^\w\u00C0-\u1EF9 ]/g, '')}-tong-ket.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Đã tải ảnh tổng kết');
  }, 'image/png');
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function computeBalances(members, expenses) {
  const balances = {};
  members.forEach(m => balances[m] = 0);
  expenses.forEach(exp => {
    const amt = exp.amountVND ?? exp.amount;
    balances[exp.paidBy] = (balances[exp.paidBy] || 0) + amt;
    // Khoản góp quỹ (category 'fund') chỉ cộng cho người góp, không chia/trừ cho ai -
    // đây là tiền "nạp vào ví chung", khác với chi tiêu thường phải chia đều.
    if (exp.category === 'fund') return;
    const splitMembers = exp.splitWith.length > 0 ? exp.splitWith : members;
    const share = amt / splitMembers.length;
    splitMembers.forEach(m => { balances[m] = (balances[m] || 0) - share; });
  });
  return balances;
}

// Tính tổng số tiền mỗi người đã THỰC SỰ DÙNG (phần chia trong mỗi khoản chi),
// khác với balances (vốn là đã trả - đã dùng). Khoản góp quỹ không tính cho ai,
// vì đó không phải tiêu dùng.
function computeUsage(members, expenses) {
  const usage = {};
  members.forEach(m => usage[m] = 0);
  expenses.forEach(exp => {
    if (exp.category === 'fund') return;
    const amt = exp.amountVND ?? exp.amount;
    const splitMembers = exp.splitWith.length > 0 ? exp.splitWith : members;
    const share = amt / splitMembers.length;
    splitMembers.forEach(m => { usage[m] = (usage[m] || 0) + share; });
  });
  return usage;
}

// Tổng số tiền mỗi người đã TRẢ RA (paidBy), không trừ phần chia của ai -
// bao gồm cả khoản góp quỹ, vì đó cũng là tiền người đó đã bỏ ra.
// Quan hệ: Đã chi - Đã dùng = Số dư (balances).
function computePaid(members, expenses) {
  const paid = {};
  members.forEach(m => paid[m] = 0);
  expenses.forEach(exp => {
    const amt = exp.amountVND ?? exp.amount;
    paid[exp.paidBy] = (paid[exp.paidBy] || 0) + amt;
  });
  return paid;
}

// Tách riêng số dư của "Quỹ chung" (tiền mặt) ra khỏi bảng số dư của người thật,
// vì Quỹ chung không phải thành viên - không nên xuất hiện trong settlement
// dạng "ai chuyển cho ai". Trả về số dư quỹ (tổng góp - tổng chi) và bảng
// balances còn lại chỉ gồm người thật.
function splitCashFundBalance(balances) {
  // Lưu ý: balances[CASH_FUND_NAME] KHÔNG phải số tiền mặt còn lại trong quỹ -
  // nó chỉ là "phần Quỹ chung đã chi hộ, đang được nợ lại" theo công thức kế toán nội bộ.
  // Số tiền mặt thực tế còn lại phải tính riêng ở computeCashFundRemaining().
  const peopleBalances = {};
  Object.entries(balances).forEach(([name, bal]) => {
    if (name !== CASH_FUND_NAME) peopleBalances[name] = bal;
  });
  return { peopleBalances };
}

// Tính đúng số tiền mặt còn lại trong quỹ chung = tổng đã góp (category 'fund')
// trừ tổng đã chi ra từ quỹ (paidBy = Quỹ chung, không phải khoản fund).
// Tính tồn quỹ tiền mặt riêng theo TỪNG đơn vị tiền tệ đã dùng (không quy đổi gộp về VNĐ),
// vì tiền mặt vật lý trong túi là tiền thật theo từng loại - quy đổi gộp sẽ làm mất
// thông tin "đang cầm bao nhiêu tờ ngoại tệ thật". Trả về mảng [{ currency, label, remaining }],
// sắp VNĐ lên đầu rồi đến các ngoại tệ khác.
function computeCashFundRemaining(expenses) {
  const byCurrency = {}; // key: '' (VNĐ) hoặc mã ngoại tệ -> { contributed, spent }
  expenses.forEach(exp => {
    const key = exp.currency || '';
    if (!byCurrency[key]) byCurrency[key] = { contributed: 0, spent: 0 };
    if (exp.category === 'fund') byCurrency[key].contributed += exp.amount;
    if (exp.paidBy === CASH_FUND_NAME && exp.category !== 'fund') byCurrency[key].spent += exp.amount;
  });
  const result = Object.entries(byCurrency)
    .map(([key, v]) => ({
      currency: key,
      label: key || 'VNĐ',
      remaining: v.contributed - v.spent,
    }));
  // VNĐ lên đầu, còn lại theo alphabet
  result.sort((a, b) => {
    if (a.currency === '') return -1;
    if (b.currency === '') return 1;
    return a.currency.localeCompare(b.currency);
  });
  return result;
}

function simplifyDebts(balances) {
  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([name, amt]) => {
    const r = Math.round(amt);
    if (r > 100) creditors.push({ name, amt: r });
    else if (r < -100) debtors.push({ name, amt: -r });
  });
  creditors.sort((a,b) => b.amt - a.amt);
  debtors.sort((a,b) => b.amt - a.amt);
  const settlements = [];
  let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const c = creditors[ci], d = debtors[di];
    const amt = Math.min(c.amt, d.amt);
    if (amt > 100) settlements.push({ from: d.name, to: c.name, amount: amt });
    c.amt -= amt; d.amt -= amt;
    if (c.amt <= 100) ci++;
    if (d.amt <= 100) di++;
  }
  return settlements;
}

// ---- API layer ----
async function apiGet() {
  const res = await fetch(`${API_URL}?ws=${encodeURIComponent(WORKSPACE_ID)}`);
  if (!res.ok) throw new Error('GET failed');
  const json = await res.json();
  if (json.ok === false) throw new Error(json.error || 'GET failed');
  return json;
}
async function apiPost(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' }, // tránh CORS preflight với Apps Script
    body: JSON.stringify({ ...payload, workspace_id: WORKSPACE_ID }),
  });
  if (!res.ok) throw new Error('POST failed');
  const json = await res.json();
  if (json.ok === false) throw new Error(json.error || 'POST failed');
  return json;
}

let activeTripId = null;
let modal = null;

let memberInput = '';
