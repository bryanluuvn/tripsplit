<html lang="vi">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trip Split</title>
<meta name="description" content="Chia tiền chi tiêu nhóm cho các chuyến đi">

<!-- PWA: chuẩn chung -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A1A2E">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<!-- PWA: chuẩn riêng cho iOS Safari (không tự đọc manifest.json đầy đủ) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root {
    /* Bryan In Data brand tokens */
    --navy: #1A1A2E;
    --blue: #4A6CF7;
    --blue-dark: #3A56D4;
    --purple: #8B5CF6;
    --bg-tint: #F8F9FF;

    --bg: var(--bg-tint);
    --surface: #FFFFFF;
    --surface-2: #F1F2FA;
    --surface-3: #E9EBFA;
    --border: #E3E5F2;
    --border-strong: #CBCFE8;
    --text-primary: var(--navy);
    --text-secondary: #585B78;
    --text-muted: #9295B0;
    --accent: var(--blue);
    --accent-bg: #EDF0FE;
    --accent-text: var(--blue-dark);
    --accent-2: var(--purple);
    --accent-2-bg: #F1ECFE;
    --accent-2-text: #6D3FD9;
    --success: #1A9461;
    --success-bg: #E7F6EE;
    --danger: #D6453A;
    --danger-bg: #FCEDEB;
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --shadow-card: 0 1px 2px rgba(26,26,46,0.04), 0 1px 8px rgba(26,26,46,0.03);
    --shadow-modal: 0 12px 40px rgba(26,26,46,0.18);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(circle at 8% 0%, rgba(139,92,246,0.07), transparent 45%),
      radial-gradient(circle at 100% 12%, rgba(74,108,247,0.08), transparent 40%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text-primary);
    padding: 1.25rem 1rem 3rem;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 480px; margin: 0 auto; }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .app-header .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  h1 {
    font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.01em;
  }

  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem;
    margin-bottom: 0.9rem;
    box-shadow: var(--shadow-card);
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem;
  }
  .card-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 6px;
  }
  .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

  input, select {
    height: 40px;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text-primary);
    width: 100%;
    transition: border-color 0.15s ease;
    font-family: inherit;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }

  button {
    height: 40px;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  button:hover { background: var(--surface-2); border-color: var(--border-strong); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.45; cursor: default; }
  button.primary {
    background: var(--blue);
    color: white;
    border-color: var(--blue);
    box-shadow: 0 2px 8px rgba(74,108,247,0.3);
  }
  button.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
  button.ghost { border: none; background: none; color: var(--text-muted); padding: 4px; height: auto; }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border-strong);
    background: var(--surface); font-size: 13.5px; font-weight: 500; cursor: pointer;
    transition: all 0.12s ease;
  }
  .pill.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }

  .member-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-2); border-radius: 20px; padding: 6px 6px 6px 8px;
    font-size: 13.5px; font-weight: 500; color: var(--text-primary);
    user-select: none; transition: opacity 0.15s, box-shadow 0.15s;
  }
  .member-tag button { height: auto; border: none; background: none; padding: 3px 6px; font-size: 13px; color: var(--text-muted); }
  .member-tag button:hover { color: var(--danger); background: none; }
  .member-tag.dragging { opacity: 0.4; }
  .member-tag.drag-over { box-shadow: -3px 0 0 2px var(--accent); }
  .drag-handle {
    cursor: grab; color: var(--text-muted); font-size: 14px; padding: 0 3px;
    line-height: 1; touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }

  .expense-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .expense-row:last-child { border-bottom: none; padding-bottom: 2px; }
  .expense-row:first-child { padding-top: 2px; }
  .expense-main { font-size: 14.5px; }
  .expense-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .amount { font-weight: 600; font-size: 14.5px; white-space: nowrap; }
  .expense-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .settlement-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0; font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .settlement-row:last-child { border-bottom: none; }
  .settlement-row .spacer { flex: 1; }
  .settlement-arrow { color: var(--accent-2); font-weight: 600; }
  .settle-btn {
    border: 1.5px solid var(--success); background: none; color: var(--success);
    border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .settle-btn:hover { background: var(--success); color: white; }

  .empty {
    color: var(--text-muted); font-size: 13.5px; padding: 1.1rem 0; text-align: center;
  }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,26,46,0.55);
    display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 50;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); padding: 1.4rem;
    width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-modal);
  }
  .modal h2 { font-size: 16.5px; font-weight: 600; margin: 0 0 14px; letter-spacing: -0.01em; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 13px; font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 6px; }

  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.1rem; }
  .tab {
    padding: 7px 15px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--surface); font-size: 13.5px; font-weight: 500; cursor: pointer;
    color: var(--text-secondary); transition: all 0.12s ease;
  }
  .tab:hover { border-color: var(--border-strong); }
  .tab.active {
    background: var(--navy); color: white; border-color: var(--navy);
  }
  .tab.add-tab { color: var(--accent-text); border-color: var(--accent-bg); background: var(--accent-bg); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: white; padding: 10px 18px; border-radius: 24px;
    font-size: 13.5px; font-weight: 500; z-index: 100; box-shadow: 0 8px 24px rgba(26,26,46,0.25);
  }

  .total-line {
    text-align: right; font-size: 13px; color: var(--text-secondary); margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .danger-link {
    color: var(--danger); font-size: 13px; font-weight: 500; background: none;
    border: none; padding: 6px 0; cursor: pointer;
  }

  .cat-badge {
    display: inline-flex; align-items: center; font-size: 10.5px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px; margin-right: 7px;
    text-transform: uppercase; letter-spacing: 0.02em;
  }

  .balance-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border);
  }
  .balance-row:last-child { border-bottom: none; }
  .balance-name { font-weight: 500; }
  .balance-amt { font-weight: 600; }
  .balance-pos { color: var(--success); }
  .balance-neg { color: var(--danger); }
  .balance-note { color: var(--text-muted); font-size: 11.5px; font-weight: 400; margin-left: 4px; }

  .overview-head-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    padding: 0 0 6px; gap: 4px;
  }
  .overview-head-label {
    font-size: 10.5px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.02em; text-align: right;
  }
  .overview-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    align-items: center; padding: 6px 0; gap: 4px; font-size: 13px;
  }
  .overview-val { text-align: right; font-variant-numeric: tabular-nums; }

  .icon-btn {
    border: none; background: none; padding: 6px; cursor: pointer; display: inline-flex;
    color: var(--text-muted); border-radius: var(--radius-sm); transition: all 0.12s ease;
  }
  .icon-btn:hover { color: var(--text-primary); background: var(--surface-2); }

  .lang-toggle-btn {
    font-size: 11px !important;
    font-weight: 700 !important;
    letter-spacing: 0.06em;
    padding: 3px 8px !important;
    height: 26px !important;
    min-width: auto !important;
    border: 1.5px solid var(--border) !important;
    border-radius: 20px !important;
    background: transparent !important;
    color: var(--text-muted) !important;
    box-shadow: none !important;
    line-height: 1 !important;
  }
  .lang-toggle-btn:hover {
    border-color: var(--accent) !important;
    color: var(--accent) !important;
  }


  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
    display: inline-block; flex-shrink: 0;
  }
  .sync-dot.ok { background: var(--success); }
  .sync-dot.error { background: var(--danger); }
  .sync-dot.offline { background: #F59E0B; animation: pulse-offline 2s infinite; }
  @keyframes pulse-offline {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .setup-banner {
    background: #FFF7E8; border: 1px solid #F0CB7C; border-radius: var(--radius);
    padding: 14px; font-size: 13.5px; margin-bottom: 1rem; color: #7A5414;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border-strong);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Category summary chart */
  .cat-chart-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 13.5px;
  }
  .cat-chart-label { width: 76px; flex-shrink: 0; color: var(--text-secondary); font-weight: 500; }
  .cat-chart-bar-track {
    flex: 1; height: 9px; border-radius: 5px; background: var(--surface-2); overflow: hidden;
    display: block; position: relative;
  }
  .cat-chart-bar-fill { display: block; height: 100%; border-radius: 5px; }
  .cat-chart-amt { width: 64px; text-align: right; font-weight: 600; flex-shrink: 0; }
  .cat-chart-pct { width: 38px; text-align: right; color: var(--text-muted); font-size: 11.5px; flex-shrink: 0; }

  .donut-wrap { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
  .donut-legend { flex: 1; min-width: 160px; display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: var(--text-secondary); flex: 1; }
  .legend-val { font-weight: 600; color: var(--text-primary); }
</style>
</head>

<div class="wrap">
  <div class="app-header">
    <div class="brand">
      <div class="brand-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">

          <path d="M17 16H4l3.5 3.5"/>
        </svg>
      </div>
      <h1>Trip Split</h1>
    </div>
    <div class="row" style="gap:10px;">
      <button class="icon-btn" onclick="window.app.openShare()" aria-label="${t('share_title')}" title="${t('share_title')}" style="font-size:15px;">🔗</button>
      <button class="icon-btn" onclick="window.app.manualRefresh()" aria-label="${t('sync_latest')}" title="${t('sync_latest')}" style="font-size:15px;" id="refreshBtn">↻</button>
      <button class="icon-btn" onclick="window.app.openHelp()" aria-label="${t('help_title')}" title="${t('help_title')}" style="font-size:15px;">❓</button>
      <button class="icon-btn lang-toggle-btn" onclick="toggleAppLang()" id="langToggleBtn" title="Switch language / Đổi ngôn ngữ" style="font-size:12px; font-weight:700; min-width:32px; letter-spacing:0.02em;">EN</button>
      <span id="syncDot" class="sync-dot" title="${t('sync_status_title')}"></span>
    </div>
  </div>
  <div id="app"></div>
</div>

// ══════════════════════════════════════════════════════════════
// i18n — bilingual support (VI / EN)
// ══════════════════════════════════════════════════════════════
let appLang = localStorage.getItem('ts_app_lang') || 'vi';
function setLang(lang) {
  appLang = lang;
  localStorage.setItem('ts_app_lang', lang);
  // Nếu đang ở workspace setup screen, re-render nó thay vì render() chính
  if (!WORKSPACE_ID) {
    renderWorkspaceSetup(null);
  } else {
    render();
  }
}
function toggleAppLang() { setLang(appLang === 'vi' ? 'en' : 'vi'); }

function t(key) {
  const lang = appLang || 'vi';
  return (APP_TRANSLATIONS[lang] && APP_TRANSLATIONS[lang][key]) || (APP_TRANSLATIONS['vi'][key]) || key;
}
// Locale to use for number formatting, following current app language
function numLocale() { return appLang === 'en' ? 'en-US' : 'vi-VN'; }
// Ngưỡng "coi như đã hòa sổ" — chỉ để lọc rác làm tròn số thực (floating point) khi chia tiền,
// KHÔNG được lớn tới mức che mất nợ thật dù nhỏ. Rác làm tròn thực tế cỡ 1e-10 trở xuống,
// nên ngưỡng chỉ cần rất nhỏ: 1 đơn vị cho tiền không có số lẻ (VNĐ/JPY/KRW/IDR),
// 0.01 (1 xu) cho tiền có số lẻ (USD/EUR...).
function settleThreshold(homeCurrency) {
  const noDecimal = ['JPY', 'KRW', 'IDR', 'VND'].includes(homeCurrency || 'VND');
  return noDecimal ? 1 : 0.01;
}

// VND: hiện dạng "1.500k" | Others: symbol prefix + number
function fmtHome(n, homeCurrency) {
  const hc = homeCurrency || 'VND';
  if (hc === 'VND') {
    const rounded = Math.round(n);
    const k = rounded / 1000;
    const kRounded = Math.round(k * 10) / 10;
    const display = kRounded % 1 === 0 ? kRounded.toFixed(0) : kRounded.toFixed(1);
    return display.replace('.', ',') + 'k';
  }
  const sym = currencySymbol(hc);
  const rounded = Math.round(Math.abs(n) * 100) / 100;
  const isNeg = n < 0;
  // JPY, KRW, IDR: no decimal
  const noDecimal = ['JPY','KRW','IDR','VND'].includes(hc);
  const display = noDecimal
    ? Math.round(rounded).toLocaleString()
    : rounded.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (isNeg ? '-' : '') + sym + display;
}

}

function computeCategoryTotals(expenses) {
  const totals = {};
  let grandTotal = 0;
  expenses.forEach(e => {
    // Bỏ qua các khoản không phải chi tiêu thật (góp quỹ, thanh toán công nợ)
    // để không làm méo tỷ lệ % của các loại chi tiêu thực sự.
    if (isNonSpending(e.category)) return;
    const key = e.category || '';
    const amt = e.amountVND ?? e.amount;
    totals[key] = (totals[key] || 0) + amt;
    grandTotal += amt;
  });
  const rows = Object.entries(totals)
    .map(([cat, amt]) => ({ cat, amt, pct: grandTotal > 0 ? amt / grandTotal : 0 }))
    .sort((a, b) => b.amt - a.amt);
  return { rows, grandTotal };
}

// Nhóm chi tiêu theo ngày, mỗi ngày tách theo category để vẽ stacked bar chart.
// Bỏ qua khoản góp quỹ giống computeCategoryTotals, vì lý do tương tự.
function computeDailyCategoryTotals(expenses) {
  const byDate = {}; // date -> { total, byCategory: { catId: amt } }
  expenses.forEach(e => {
    if (isNonSpending(e.category)) return;
    const amt = e.amountVND ?? e.amount;
    const date = e.date || '';
    if (!byDate[date]) byDate[date] = { date, total: 0, byCategory: {} };
    byDate[date].total += amt;
    const catKey = e.category || '';
    byDate[date].byCategory[catKey] = (byDate[date].byCategory[catKey] || 0) + amt;
  });
  const days = Object.values(byDate).sort((a, b) => a.date < b.date ? -1 : 1);
  const maxTotal = Math.max(...days.map(d => d.total), 1);
  return { days, maxTotal };
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function computeBalances(members, expenses) {
  const balances = {};
  members.forEach(m => balances[m] = 0);
  expenses.forEach(exp => {
    const amt = exp.amountVND ?? exp.amount;
    balances[exp.paidBy] = (balances[exp.paidBy] || 0) + amt;
    // Khoản góp quỹ (category 'fund') chỉ cộng cho người góp, không chia/trừ cho ai -
    // đây là tiền "nạp vào ví chung", khác với chi tiêu thường phải chia đều.
    if (exp.category === 'fund') return;
    const splitMembers = exp.splitWith.length > 0 ? exp.splitWith : members;
    const share = amt / splitMembers.length;
    splitMembers.forEach(m => { balances[m] = (balances[m] || 0) - share; });
  });
  return balances;
}

// Tính tổng số tiền mỗi người đã THỰC SỰ DÙNG (phần chia trong mỗi khoản chi),
// khác với balances (vốn là đã trả - đã dùng). Khoản góp quỹ và thanh toán
// không tính vào đây vì không phải tiêu dùng thật.
function computeUsage(members, expenses) {
  const usage = {};
  members.forEach(m => usage[m] = 0);
  expenses.forEach(exp => {
    if (isNonSpending(exp.category)) return;
    const amt = exp.amountVND ?? exp.amount;
    const splitMembers = exp.splitWith.length > 0 ? exp.splitWith : members;
    const share = amt / splitMembers.length;
    splitMembers.forEach(m => { usage[m] = (usage[m] || 0) + share; });
  });
  return usage;
}

// Tổng số tiền mỗi người đã TRẢ RA (paidBy), không trừ phần chia của ai -
// bao gồm cả khoản góp quỹ, vì đó cũng là tiền người đó đã bỏ ra.
// Quan hệ: Đã chi - Đã dùng = Số dư (balances).
function computePaid(members, expenses) {
  const paid = {};
  members.forEach(m => paid[m] = 0);
  expenses.forEach(exp => {
    const amt = exp.amountVND ?? exp.amount;
    paid[exp.paidBy] = (paid[exp.paidBy] || 0) + amt;
  });
  return paid;
}

// Tách riêng số dư của "Quỹ chung" (tiền mặt) ra khỏi bảng số dư của người thật,
// vì Quỹ chung không phải thành viên - không nên xuất hiện trong settlement
// dạng "ai chuyển cho ai". Trả về số dư quỹ (tổng góp - tổng chi) và bảng
// balances còn lại chỉ gồm người thật.
function splitCashFundBalance(balances) {
  // Lưu ý: balances[CASH_FUND_NAME] KHÔNG phải số tiền mặt còn lại trong quỹ -
  // nó chỉ là "phần Quỹ chung đã chi hộ, đang được nợ lại" theo công thức kế toán nội bộ.
  // Số tiền mặt thực tế còn lại phải tính riêng ở computeCashFundRemaining().
  const peopleBalances = {};
  Object.entries(balances).forEach(([name, bal]) => {
    if (name !== CASH_FUND_NAME) peopleBalances[name] = bal;
  });
  return { peopleBalances };
}

// Tính đúng số tiền mặt còn lại trong quỹ chung = tổng đã góp (category 'fund')
// trừ tổng đã chi ra từ quỹ (paidBy = Quỹ chung, không phải khoản fund).
// Tính tồn quỹ tiền mặt riêng theo TỪNG đơn vị tiền tệ đã dùng (không quy đổi gộp về VNĐ),
// vì tiền mặt vật lý trong túi là tiền thật theo từng loại - quy đổi gộp sẽ làm mất
// thông tin "đang cầm bao nhiêu tờ ngoại tệ thật". Trả về mảng [{ currency, label, remaining }],
// sắp VNĐ lên đầu rồi đến các ngoại tệ khác.
function computeCashFundRemaining(expenses) {
  const byCurrency = {}; // key: '' (VNĐ) hoặc mã ngoại tệ -> { contributed, spent }
  expenses.forEach(exp => {
    const key = exp.currency || '';
    if (!byCurrency[key]) byCurrency[key] = { contributed: 0, spent: 0 };
    if (exp.category === 'fund') byCurrency[key].contributed += exp.amount;
    if (exp.paidBy === CASH_FUND_NAME && exp.category !== 'fund') byCurrency[key].spent += exp.amount;
  });
  const result = Object.entries(byCurrency)
    .map(([key, v]) => ({
      currency: key,
      label: key || currentHomeCurrency(),
      remaining: v.contributed - v.spent,
    }));
  // VNĐ lên đầu, còn lại theo alphabet
  result.sort((a, b) => {
    if (a.currency === '') return -1;
    if (b.currency === '') return 1;
    return a.currency.localeCompare(b.currency);
  });
  return result;
}

function simplifyDebts(balances, homeCurrency) {
  const TH = settleThreshold(homeCurrency);
  const round = amt => roundCurrency(amt, homeCurrency);
  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([name, amt]) => {
    const r = round(amt);
    if (r > TH) creditors.push({ name, amt: r });
    else if (r < -TH) debtors.push({ name, amt: -r });
  });
  creditors.sort((a,b) => b.amt - a.amt);
  debtors.sort((a,b) => b.amt - a.amt);
  const settlements = [];
  let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const c = creditors[ci], d = debtors[di];
    const amt = round(Math.min(c.amt, d.amt));
    if (amt > TH) settlements.push({ from: d.name, to: c.name, amount: amt });
    c.amt = round(c.amt - amt); d.amt = round(d.amt - amt);
    if (c.amt <= TH) ci++;
    if (d.amt <= TH) di++;
  }
  return settlements;
}

// ===== OFFLINE SUPPORT =====
let pendingOps = [];
const DB_NAME = 'TripSplitOfflineDB';
const STORE_NAME = 'workspace_data';

// Initialize IndexedDB
async function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'wsId' });
      }
    };
  });
}

// Save trips and expenses to IndexedDB
async function saveOffline(trips, expenses) {
  try {
    const db = await initDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    await new Promise((resolve, reject) => {
      const req = store.put({
        wsId: WORKSPACE_ID,
        trips,
        expenses,
        timestamp: Date.now()
      });
      req.onerror = () => reject(req.error);
      req.onsuccess = () => resolve();
    });
  } catch (err) {
    console.warn('[Offline] Failed to save to IndexedDB:', err);
  }
}

// Load trips and expenses from IndexedDB
async function loadOffline() {
  try {
    const db = await initDB();
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    return new Promise((resolve, reject) => {
      const req = store.get(WORKSPACE_ID);
      req.onerror = () => reject(req.error);
      req.onsuccess = () => {
        const data = req.result;
        resolve(data ? { trips: data.trips || [], expenses: data.expenses || [] } : { trips: [], expenses: [] });
      };
    });
  } catch (err) {
    console.warn('[Offline] Failed to load from IndexedDB:', err);
    return { trips: [], expenses: [] };
  }
}

// Modified apiGet with offline fallback
const originalApiGet = apiGet;
apiGet = async function() {
  try {
    const data = await originalApiGet();
    // Save to offline storage for later use
    await saveOffline(data.trips || [], data.expenses || []);
    return data;
  } catch (err) {
    console.warn('[Offline] Network GET failed, loading from cache:', err);
    // If network fails, load from offline storage
    const offlineData = await loadOffline();
    return { ok: true, ...offlineData };
  }
};

// Modified apiPost with pending ops queue
const originalApiPost = apiPost;
apiPost = async function(payload) {
  try {
    const result = await originalApiPost(payload);
    // Success: remove this op from pending queue if it was there
    pendingOps = pendingOps.filter(op => JSON.stringify(op) !== JSON.stringify(payload));
    return result;
  } catch (err) {
    console.warn('[Offline] POST failed, queueing operation:', payload);
    // Network failed: queue the operation for later
    if (!pendingOps.find(op => JSON.stringify(op) === JSON.stringify(payload))) {
      pendingOps.push(payload);
    }
    // Return fake success to let UI update optimistically
    return { ok: true };
  }
};

// Sync pending operations when back online
async function syncPendingOps() {
  if (pendingOps.length === 0) return;
  
  console.log(`[Offline] Syncing ${pendingOps.length} pending operations...`);
  const opsToSync = [...pendingOps];
  
  for (const op of opsToSync) {
    try {
      await originalApiPost(op);
      pendingOps = pendingOps.filter(o => JSON.stringify(o) !== JSON.stringify(op));
      console.log('[Offline] Synced:', op.action);
    } catch (err) {
      console.warn('[Offline] Failed to sync:', op.action, err);
      // Keep op in queue to retry later
      break;
    }
  }
  
  // After syncing, refresh data from server
  if (pendingOps.length === 0) {
    console.log('[Offline] All ops synced, refreshing data...');
    await refreshData(false);
    showToast(t('sync_done') || 'Sync complete');
  }
}

function getExpensesForTrip(trip) {

    .map(e => {
      const currency = e.currency || '';

      const amountHome = currency ? amount * rate : amount;
      return {
        id: e.expense_id,

        time: e.time || '',

      return ak < bk ? 1 : -1;

function initMemberDragSort() {
  const container = document.querySelector('.member-sortable');
  if (!container) return;
  const tags = Array.from(container.querySelectorAll('.member-tag[draggable]'));
  if (tags.length < 2) return;

  let dragSrc = null;

  function getNewOrder() {
    return Array.from(container.querySelectorAll('.member-tag[data-member-name]'))
      .map(el => el.dataset.memberName);
  }

  function saveMemberOrder(newOrder) {
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    if (!trip) return;
    const oldMembers = trip.members;
    withSaving(
      () => { trip.members = newOrder.join(','); },
      () => apiPost({ action: 'updateTripMembers', trip_id: activeTripId, members: newOrder.join(',') })
    );
  }

  // ---- Mouse drag (desktop) ----
  tags.forEach(tag => {
    const handle = tag.querySelector('.drag-handle');
    if (!handle) return;

    tag.addEventListener('dragstart', e => {
      dragSrc = tag;
      tag.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    tag.addEventListener('dragend', () => {
      tag.classList.remove('dragging');
      container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      dragSrc = null;
    });
    tag.addEventListener('dragover', e => {
      e.preventDefault();
      if (tag !== dragSrc) tag.classList.add('drag-over');
    });
    tag.addEventListener('dragleave', () => tag.classList.remove('drag-over'));
    tag.addEventListener('drop', e => {
      e.preventDefault();
      tag.classList.remove('drag-over');
      if (!dragSrc || dragSrc === tag) return;
      // Chèn dragSrc vào trước tag hiện tại
      container.insertBefore(dragSrc, tag);
      saveMemberOrder(getNewOrder());
    });
  });

  // ---- Touch drag (mobile) ----
  tags.forEach(tag => {
    const handle = tag.querySelector('.drag-handle');
    if (!handle) return;

    let startY = 0, startX = 0;
    let isDragging = false;
    let placeholder = null;
    let clone = null;

    handle.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      startY = touch.clientY;
      startX = touch.clientX;
      isDragging = false;
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      const touch = e.touches[0];
      const dy = Math.abs(touch.clientY - startY);
      const dx = Math.abs(touch.clientX - startX);
      if (!isDragging && (dy > 5 || dx > 5)) {
        isDragging = true;
        // Tạo clone nổi lên để kéo
        clone = tag.cloneNode(true);
        clone.style.cssText = `position:fixed; opacity:0.85; pointer-events:none; z-index:9999;
          width:${tag.offsetWidth}px; left:${tag.getBoundingClientRect().left}px;
          top:${tag.getBoundingClientRect().top}px; box-shadow:0 4px 16px rgba(0,0,0,0.18);`;
        document.body.appendChild(clone);
        tag.style.opacity = '0.3';
      }
      if (!isDragging || !clone) return;
      e.preventDefault();
      clone.style.top = (touch.clientY - 20) + 'px';

      // Tìm target để highlight
      container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      const targetTag = elemBelow?.closest('.member-tag[data-member-name]');
      if (targetTag && targetTag !== tag) targetTag.classList.add('drag-over');
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (!isDragging) return;
      if (clone) { clone.remove(); clone = null; }
      tag.style.opacity = '';
      isDragging = false;

      const touch = e.changedTouches[0];
      const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      const targetTag = elemBelow?.closest('.member-tag[data-member-name]');
      container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

      if (targetTag && targetTag !== tag) {
        container.insertBefore(tag, targetTag);
        saveMemberOrder(getNewOrder());
      }
    });
  });
}

        <span class="card-title">${appLang === 'en' ? 'Expenses' : 'Chi tiêu'} · ${expenses.length}</span>

      const cashFundRemaining = computeCashFundRemaining(expenses);

      html += `<div class="card">

          <span></span>

      trip.members.forEach(m => {
        const bal = roundCurrency(peopleBalances[m] || 0, trip.homeCurrency);
        const TH = settleThreshold(trip.homeCurrency);
        const cls = bal > TH ? 'balance-pos' : bal < -TH ? 'balance-neg' : '';
        const sign = bal > 0 ? '+' : '';
        const note = bal > TH ? t('will_receive').replace(/[()]/g,'') : bal < -TH ? t('needs_to_pay').replace(/[()]/g,'') : t('settled').replace(/[()]/g,'');
        html += `<div class="overview-row">
          <span class="balance-name" style="cursor:pointer; text-decoration:underline dotted; text-underline-offset:3px;" data-action="openMemberDetail" data-member="${escapeHtml(m)}" title="${t('view_member_detail_title')} ${escapeHtml(m)}">${escapeHtml(m)}</span>
          <span class="overview-val">${fmtHome(paid[m] || 0, trip.homeCurrency)}</span>
          <span class="overview-val">${fmtHome(usage[m] || 0, trip.homeCurrency)}</span>
          <span class="overview-val ${cls}" style="font-weight:600;">${sign}${fmtHome(bal, trip.homeCurrency)}</span>
        </div>

        cashFundRemaining.forEach(r => {

          const display = r.currency ? fmtForeign(r.remaining, r.currency) : fmtHome(r.remaining, trip.homeCurrency);
          html += `<div class="balance-row">
            <span class="balance-name">${t('remaining_label')} (${escapeHtml(r.label)})</span>
            <span class="balance-amt ${cls}">${display}</span>
          </div>`;
        });
        html += `</div>`;
      }

      html += `<div class="card">
        <div class="card-head">
          <span class="card-title">${t('settlement_title')}</span>
          <div class="row" style="gap:6px;">
            <button class="icon-btn" data-action="exportCsv" aria-label="${t('export_csv_aria')}" title="${t('export_csv_aria')}">⬇️</button>
            <button class="icon-btn" data-action="exportImage" aria-label="${t('export_image_aria')}" title="${t('export_image_aria')}">🖼️</button>
            <button data-action="copySummary">📋 ${t('settlement_copy')}</button>
          </div>
        </div>`;
      if (settlements.length === 0) {
        html += `<p class="empty">${t('all_settled_full')}</p>`;
      } else {
        settlements.forEach(s => {
          html += `<div class="settlement-row">
            <strong>${escapeHtml(s.from)}</strong>
            <span class="settlement-arrow">→</span>
            <strong>${escapeHtml(s.to)}</strong>
            <span class="spacer"></span>
            <strong>${fmtHome(s.amount, currentHomeCurrency())}</strong>
            <button class="settle-btn" data-action="markSettled"
              data-from="${escapeHtml(s.from)}" data-to="${escapeHtml(s.to)}" data-amount="${s.amount}"
              title="${t('mark_settled_title')}">✓</button>
          </div>`;
        });
      }
      html += `</div>`;
    }

    html += `<div class="row" style="justify-content:space-between; margin-top:4px;">
      <button class="danger-link" data-action="deleteTrip">${t('btn_delete_trip')}</button>
      ${trip.archived
        ? `<button style="font-size:13px; padding:6px 0; border:none; background:none; color:var(--text-secondary); cursor:pointer;" data-action="unarchiveTrip" data-id="${trip.trip_id}">${t('btn_unarchive')}</button>`
        : `<button style="font-size:13px; padding:6px 0; border:none; background:none; color:var(--text-secondary); cursor:pointer;" data-action="archiveTrip" data-id="${trip.trip_id}">${t('btn_archive')}</button>`
      }
    </div>`;
  }

  app.innerHTML = html;

  app.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleAction));
  const mi = document.getElementById('memberInput');
  if (mi) mi.addEventListener('input', e => { memberInput = e.target.value; });

  const fp = document.getElementById('filterPerson');
  if (fp) fp.addEventListener('change', e => { expenseFilter.person = e.target.value; render(); });
  const fc = document.getElementById('filterCategory');
  if (fc) fc.addEventListener('change', e => {
    expenseFilter.category = e.target.value === '__all__' ? '' : e.target.value;
    render();
  });

  // Drag-to-reorder thành viên
  initMemberDragSort();

  const existingOverlay = document.getElementById('modalOverlay');
  if (existingOverlay) existingOverlay.remove();
  if (modal) renderModal();
}

// Optimistic update: áp dụng thay đổi vào state cục bộ NGAY, render ngay,
// rồi mới gửi request lên server ở dưới nền. Nếu lỗi, hoàn tác lại bằng snapshot.
// ===== Request queue: đảm bảo mọi thao tác gửi lên server theo đúng thứ tự =====
// Khi người dùng thao tác liên tiếp nhanh, các request không được gửi song song
// (dễ về sai thứ tự, ghi đè nhau trên Sheet). Thay vào đó, mỗi request được đẩy
// vào hàng đợi và xử lý tuần tự từng cái một. Sau khi queue trống, mới refresh
// 1 lần để lấy đúng dữ liệu thật từ Sheet — không refresh liên tục giữa chừng.
const requestQueue = [];
let queueProcessing = false;

async function processQueue() {
  if (queueProcessing) return;
  queueProcessing = true;

  while (requestQueue.length > 0) {
    const { sendRequest, snapshotTrips, snapshotExpenses } = requestQueue.shift();
    try {
      await sendRequest();
      setSyncDot('ok');
    } catch (err) {
      // Lỗi: hoàn tác về snapshot của request này (gần nhất với state thật lúc đó)
      rawTrips = snapshotTrips;
      rawExpenses = snapshotExpenses;
      // Update offline storage with rolled-back data
      await saveOffline(rawTrips, rawExpenses);
      // Xóa sạch queue còn lại vì state đã bị hoàn tác, các request sau không còn hợp lệ
      requestQueue.length = 0;
      showToast(t('sync_undo_error_prefix') + ' ' + err.message);
      setSyncDot('error');
      render();
      break;
    }
  }

  queueProcessing = false;
  // Chỉ refresh 1 lần sau khi toàn bộ queue trống — không refresh giữa chừng
  // để tránh cắt ngang thao tác đang dở.
  if (requestQueue.length === 0) refreshData(false);
}

async function withSaving(applyLocal, sendRequest) {
  // Chụp snapshot TRƯỚC khi applyLocal (để có thể hoàn tác đúng về trạng thái này nếu lỗi)
  const snapshotTrips = JSON.parse(JSON.stringify(rawTrips));
  const snapshotExpenses = JSON.parse(JSON.stringify(rawExpenses));

  if (applyLocal) applyLocal();
  render();
  setSyncDot('loading');

  // IMPORTANT: Save to offline storage immediately so data persists if page is refreshed
  await saveOffline(rawTrips, rawExpenses);

  requestQueue.push({ sendRequest, snapshotTrips, snapshotExpenses });
  processQueue(); // không await — chạy ngầm, không chặn UI
}

function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;
  const name = e.currentTarget.dataset.name;
  const member = e.currentTarget.dataset.member;

  if (action === 'openMemberDetail') { window.app.openMemberDetail(member); return; }

  if (action === 'markSettled') {
    const from = e.currentTarget.dataset.from;
    const to = e.currentTarget.dataset.to;
    const amount = parseFloat(e.currentTarget.dataset.amount);
    const now = new Date();
    const expenseData = {
      expense_id: uid(),
      trip_id: activeTripId,
      paid_by: from,
      amount,
      currency: '',
      desc: `${t('auto_payment_desc_prefix')} ${to}`,
      split_with: to,
      date: now.toISOString().slice(0, 10),
      time: nowTimeStr(),
      category: 'payment',
    };
    withSaving(
      () => rawExpenses.push({ ...expenseData }),
      () => apiPost({ action: 'addExpense', ...expenseData })
    );
    showToast(`${from} → ${to}: ${fmtHome(amount, currentHomeCurrency())}`);
    return;
  }
  if (action === 'selectTrip') { activeTripId = id; expenseFilter = { person: '', category: '' }; render(); }
  if (action === 'openNewTrip') { modal = 'newTrip'; newTripName = ''; render(); }

  if (action === 'openRenameTrip') {
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    renameTripDraft = trip.trip_name;
    renameTripUseForeign = !!trip.foreign_currency;
    renameTripHomeCurrency = trip.home_currency || 'VND';
    const isKnownCurrency = CURRENCIES.some(c => c.code === trip.foreign_currency);
    if (trip.foreign_currency && !isKnownCurrency) {
      renameTripCurrency = '__custom__';
      renameTripCustomCurrency = trip.foreign_currency;
    } else {
      renameTripCurrency = trip.foreign_currency || 'USD';
      renameTripCustomCurrency = '';
    }
    renameTripRate = trip.exchange_rate ? String(trip.exchange_rate) : '';
    modal = 'renameTrip'; render();
  }

  if (action === 'toggleArchivedList') {
    showArchivedList = !showArchivedList; render();
  }

  if (action === 'archiveTrip') {
    const trip = rawTrips.find(t => t.trip_id === id);
    withSaving(
      () => { trip.archived = 'true'; },
      () => apiPost({ action: 'setTripArchived', trip_id: id, archived: true })
    );
    showToast(t('archive_done'));
  }

  if (action === 'unarchiveTrip') {
    const trip = rawTrips.find(t => t.trip_id === id);
    withSaving(
      () => { trip.archived = ''; },
      () => apiPost({ action: 'setTripArchived', trip_id: id, archived: false })
    );
    showToast(t('unarchive_done'));
  }

  if (action === 'openEditMember') {
    editMemberDraft = { oldName: name, newName: name };
    modal = 'editMember'; render();
  }

  if (action === 'removeMember') {
    const hasExpenses = e.currentTarget.dataset.hasExpenses === 'true';
    if (hasExpenses) {
      const ok = confirm(`${name} ${t('remove_member_confirm_prefix')} ${name} ${t('remove_member_confirm_suffix')}`);
      if (!ok) return;
    }
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const newMembers = parseMembers(trip.members).filter(m => m !== name);
    const tripId = activeTripId;
    const expensesToDelete = rawExpenses.filter(ex => ex.trip_id === tripId && ex.paid_by === name);
    withSaving(
      () => {
        trip.members = newMembers.join(',');
        rawExpenses = rawExpenses.filter(ex => !(ex.trip_id === tripId && ex.paid_by === name));
      },
      async () => {
        await apiPost({ action: 'updateTripMembers', trip_id: tripId, members: newMembers.join(',') });
        for (const ex of expensesToDelete) {
          await apiPost({ action: 'deleteExpense', expense_id: ex.expense_id });
        }
      }
    );
  }

  if (action === 'openAddExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const now = new Date();
    // Nếu trip đã có khoản góp quỹ (quỹ chung đã được khởi tạo),
    // mặc định chọn "Quỹ chung" làm người trả vì đa số chi tiêu sẽ từ quỹ.
    const hasFund = rawExpenses.some(e => e.trip_id === activeTripId && e.category === 'fund');
    expDraft = {
      id: null,
      paidBy: hasFund ? CASH_FUND_NAME : (trip.members[0] || ''),
      amount: '', currency: trip.foreignCurrency || '', amountInputRaw: '', desc: '', splitWith: [],
      date: now.toISOString().slice(0, 10),
      time: nowTimeStr(),
      category: '',
    };
    modal = 'addExpense'; render();
  }

  if (action === 'editExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const exp = rawExpenses.find(ex => ex.expense_id === id);
    const currency = exp.currency || '';
    const amountNum = Number(exp.amount);
    expDraft = {
      id: exp.expense_id,
      paidBy: exp.paid_by,
      amount: String(exp.amount),
      currency,
      amountInputRaw: currency ? String(amountNum) : (trip.homeCurrency === 'VND' ? String(amountNum / 1000) : String(amountNum)),
      desc: exp.desc,
      splitWith: parseMembers(exp.split_with),
      date: exp.date,
      time: exp.time || nowTimeStr(),
      category: exp.category || '',
    };
    modal = 'addExpense'; render();
  }

  if (action === 'deleteExpense') {
    if (!confirm(t('confirm_delete_expense'))) return;
    withSaving(
      () => { rawExpenses = rawExpenses.filter(e => e.expense_id !== id); },
      () => apiPost({ action: 'deleteExpense', expense_id: id })
    );
  }

  if (action === 'deleteTrip') {
    if (!confirm(t('confirm_delete_trip'))) return;
    const tripIdToDelete = activeTripId;
    withSaving(
      () => {
        rawTrips = rawTrips.filter(t => t.trip_id !== tripIdToDelete);
        rawExpenses = rawExpenses.filter(e => e.trip_id !== tripIdToDelete);
        activeTripId = rawTrips.length > 0 ? rawTrips[0].trip_id : null;
      },
      () => apiPost({ action: 'deleteTrip', trip_id: tripIdToDelete })
    );
  }

  if (action === 'exportImage') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip);
    const rawBalances = computeBalances(trip.members, expenses);
    const { peopleBalances } = splitCashFundBalance(rawBalances);
    const hasCashFund = expenses.some(e => e.category === 'fund' || e.paidBy === CASH_FUND_NAME);
    const cashFundRemaining = computeCashFundRemaining(expenses);
    const settlements = simplifyDebts(peopleBalances, trip.homeCurrency);
    generateSummaryImage(trip, expenses, peopleBalances, settlements, hasCashFund ? cashFundRemaining : null);
  }

  if (action === 'exportCsv') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip);
    const rawBalances = computeBalances(trip.members, expenses);
    const { peopleBalances } = splitCashFundBalance(rawBalances);
    const hasCashFund = expenses.some(e => e.category === 'fund' || e.paidBy === CASH_FUND_NAME);
    const cashFundRemaining = computeCashFundRemaining(expenses);
    const settlements = simplifyDebts(peopleBalances, trip.homeCurrency);
    const usage = computeUsage(trip.members, expenses);
    const paid = computePaid(trip.members, expenses);

    function csvEscape(val) {
      const s = String(val ?? '');
      if (s.includes(',') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    const members = trip.members;

    let rows = [];
    // ---- Raw data: header + cột động theo từng thành viên ----
    rows.push([
      t('csv_col_date'), t('csv_col_time'), t('csv_col_category'), t('csv_col_payer'), t('csv_col_desc'),
      t('export_col_orig_amount'), t('export_col_orig_unit'), `${t('export_col_home_amount')} (${trip.homeCurrency || 'VND'})`, t('export_col_split'),
      ...members.map(m => `${t('export_member_share_prefix')} ${m} (${trip.homeCurrency || 'VND'})`),
    ]);
    expenses.slice().reverse().forEach(ex => {
      const isFund = ex.category === 'fund';
      const splitMembers = ex.splitWith.length > 0 ? ex.splitWith : members;
      const share = ex.amountVND / splitMembers.length;
      // Mỗi thành viên: nếu có phần trong giao dịch này thì điền số tiền, không thì rỗng
      const memberShares = members.map(m => {
        if (isFund) return '';
        return splitMembers.includes(m) ? roundCurrency(ex.amountHome / splitMembers.length, trip.homeCurrency) : '';
      });
      rows.push([
        ex.date, ex.time || '', categoryLabel(ex.category), ex.paidBy,
        ex.desc || '', ex.amount, ex.currency || (trip.homeCurrency || 'VND'), roundCurrency(ex.amountVND, trip.homeCurrency),
        isFund ? t('export_no_split') : (ex.splitWith.length > 0 ? ex.splitWith.join(' | ') : t('split_with_everyone')),
        ...memberShares,
      ]);
    });

    // ---- Tổng quan từng người: 4 cột ----
    rows.push([]);
    rows.push([t('overview_title'), t('export_col_paid'), t('export_col_used'), t('export_col_bal')]);
    members.forEach(m => {
      rows.push([
        m,
        roundCurrency(paid[m] || 0, trip.homeCurrency),
        roundCurrency(usage[m] || 0, trip.homeCurrency),
        roundCurrency(peopleBalances[m] || 0, trip.homeCurrency),
      ]);
    });

    // ---- Quỹ tiền mặt chung ----
    if (hasCashFund) {
      rows.push([]);
      rows.push([t('cash_fund_remaining')]);
      cashFundRemaining.forEach(r => {
        rows.push([`${t('remaining_label')} (${r.label})`, r.currency ? r.remaining : roundCurrency(r.remaining, trip.homeCurrency)]);
      });
    }

    // ---- Kết quả thanh toán ----
    rows.push([]);
    rows.push([t('settlement_title')]);
    if (settlements.length === 0) {
      rows.push([t('all_settled')]);
    } else {
      settlements.forEach(s => rows.push([s.from, t('export_transfers_for'), s.to, s.amount]));
    }

    const csvContent = rows.map(r => r.map(csvEscape).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${trip.name.replace(/[^\w\u00C0-\u1EF9 ]/g, '')}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(t('toast_csv_done'));
  }

  if (action === 'copySummary') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip);
    const rawBalances = computeBalances(trip.members, expenses);
    const { peopleBalances } = splitCashFundBalance(rawBalances);
    const hasCashFund = expenses.some(e => e.category === 'fund' || e.paidBy === CASH_FUND_NAME);
    const cashFundRemaining = computeCashFundRemaining(expenses);
    const settlements = simplifyDebts(peopleBalances, trip.homeCurrency);
    const usage = computeUsage(trip.members, expenses);
    const paid = computePaid(trip.members, expenses);

    let text = `${t('export_summary_header')} - ${trip.name}\n\n`;

    // Danh sách chi tiêu
    expenses.slice().reverse().forEach(ex => {
      const amountText = ex.currency
        ? `${ex.amount.toLocaleString(numLocale())}${currencySymbol(ex.currency)} (≈${fmtHome(ex.amountHome, trip.homeCurrency)})`
        : fmtHome(ex.amountHome, trip.homeCurrency);
      text += `${ex.date}${ex.time ? ' ' + ex.time : ''} [${categoryLabel(ex.category)}] ${ex.paidBy} ${t('copy_paid_word')} ${amountText}${ex.desc ? ' ' + t('copy_for_word') + ' ' + ex.desc : ''}\n`;
    });

    // Bảng tổng quan 3 cột — pad bằng tab để thẳng hàng trong monospace font
    text += `\n${t('overview_title')}:\n`;
    const maxNameLen = Math.max(...trip.members.map(m => m.length), 4);
    const pad = (s, n) => String(s).padEnd(n);
    text += `${pad('', maxNameLen + 2)}${pad(t('col_paid'), 10)}${pad(t('col_used'), 10)}${t('col_balance')}\n`;
    trip.members.forEach(m => {
      const bal = roundCurrency(peopleBalances[m] || 0, trip.homeCurrency);
      const TH = settleThreshold(trip.homeCurrency);
      const note = bal > TH ? ` ${t('will_receive')}` : bal < -TH ? ` ${t('needs_to_pay')}` : ` ${t('settled')}`;
      const balStr = (bal > 0 ? '+' : '') + fmtHome(bal, trip.homeCurrency) + note;
      text += `${pad(m, maxNameLen + 2)}${pad(fmtHome(paid[m] || 0, trip.homeCurrency), 10)}${pad(fmtHome(usage[m] || 0, trip.homeCurrency), 10)}${balStr}\n`;
    });

    // Quỹ tiền mặt chung
    if (hasCashFund) {
      text += `\n${t('cash_fund_remaining')}:\n`;
      cashFundRemaining.forEach(r => {
        const display = r.currency ? fmtForeign(r.remaining, r.currency) : fmtHome(r.remaining, trip.homeCurrency);
        text += `  ${r.label}: ${display}\n`;
      });
    }

    // Kết quả thanh toán
    text += `\n${t('export_settlement_header')}:\n`;
    if (settlements.length === 0) text += t('all_settled') + '\n';
    else settlements.forEach(s => { text += `  ${s.from} → ${s.to}: ${fmtHome(s.amount, currentHomeCurrency())}\n`; });

    navigator.clipboard.writeText(text).then(() => showToast(t('toast_copy_done')));
  }
}

        renderModal();
      });
    });

    document.getElementById('descInput').addEventListener('input', e => expDraft.desc = e.target.value);
    document.getElementById('categorySelect').addEventListener('change', e => { expDraft.category = e.target.value; renderModal(); });
    overlay.querySelectorAll('[data-toggle-member]').forEach(el => {

      });
    });
  }
}

  openMemberDetail(memberName) {
    if (!trip) return;
    const expenses = getExpensesForTrip(trip);
    const paid = computePaid(trip.members, expenses);
    const usage = computeUsage(trip.members, expenses);
    const rawBal = computeBalances(trip.members, expenses);
    const { peopleBalances } = splitCashFundBalance(rawBal);

    // Lọc ra các giao dịch người này có phần (được chia vào, không tính góp quỹ)
    const myExpenses = expenses
      .filter(e => {
        if (isNonSpending(e.category)) return false;
        const splitMembers = e.splitWith.length > 0 ? e.splitWith : trip.members;
        return splitMembers.includes(memberName);
      })
      .slice() // giữ nguyên order (mới nhất trước)

    const bal = roundCurrency(peopleBalances[memberName] || 0, trip.homeCurrency);
    const TH = settleThreshold(trip.homeCurrency);
    const balCls = bal > TH ? 'color:#1A9461' : bal < -TH ? 'color:#D6453A' : 'color:var(--text-muted)';
    const balSign = bal > 0 ? '+' : '';
    const balNote = bal > TH ? t('will_receive').replace(/[()]/g,'') : bal < -TH ? t('needs_to_pay').replace(/[()]/g,'') : t('settled').replace(/[()]/g,'');

    let rowsHtml = '';
    myExpenses.forEach(e => {
      const splitMembers = e.splitWith.length > 0 ? e.splitWith : trip.members;
      const myShare = e.amountVND / splitMembers.length;
      const isPayer = e.paidBy === memberName;
      rowsHtml += `<div style="padding:10px 0; border-bottom:1px solid var(--border);">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
          <div style="flex:1; min-width:0;">
            <span class="cat-badge" style="${categoryBadgeStyle(e.category)}">${escapeHtml(categoryLabel(e.category))}</span>
            <span style="font-size:13.5px;">${e.desc ? escapeHtml(e.desc) : escapeHtml(e.paidBy) + ' ' + t('paid_suffix')}</span>
            ${isPayer ? `<span style="font-size:11px; color:var(--accent-text); background:var(--accent-bg); padding:1px 5px; border-radius:4px; margin-left:4px;">${t('payer_badge')}</span>` : ''}
            <div style="font-size:11.5px; color:var(--text-muted); margin-top:2px;">${escapeHtml(e.date)} · ${escapeHtml(e.paidBy)} ${t('export_transfers_for')} ${fmtHome(e.amountHome, trip.homeCurrency || currentHomeCurrency())} · ${t('share_for')} ${splitMembers.length}</div>
          </div>
          <div style="text-align:right; flex-shrink:0;">
            <div style="font-size:14px; font-weight:600;">−${fmtHome(myShare, currentHomeCurrency())}</div>
            <div style="font-size:11px; color:var(--text-muted);">${t('my_share_label')}</div>
          </div>
        </div>
      </div>`;
    });

    if (myExpenses.length === 0) {
      rowsHtml = `<p style="color:var(--text-muted); font-size:13.5px; text-align:center; padding:24px 0;">${t('no_transactions_yet')}</p>`;
    }

    const overlay = document.createElement('div');
    overlay.id = 'memberDetailOverlay';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" style="max-width:480px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <h2 style="margin:0;">👤 ${escapeHtml(memberName)}</h2>
        <button class="icon-btn" onclick="window.app.closeMemberDetail()" aria-label="${t('aria_close')}">✕</button>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:12px 0; padding:12px; background:var(--surface-2); border-radius:var(--radius-sm);">
        <div style="text-align:center;">
          <div style="font-size:11px; color:var(--text-muted); margin-bottom:3px;">${t('overview_paid')}</div>
          <div style="font-size:15px; font-weight:600;">${fmtHome(paid[memberName] || 0, currentHomeCurrency())}</div>
        </div>
        <div style="text-align:center; border-left:1px solid var(--border); border-right:1px solid var(--border);">
          <div style="font-size:11px; color:var(--text-muted); margin-bottom:3px;">${t('overview_used')}</div>
          <div style="font-size:15px; font-weight:600;">${fmtHome(usage[memberName] || 0, currentHomeCurrency())}</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:11px; color:var(--text-muted); margin-bottom:3px;">${t('overview_balance')}</div>
          <div style="font-size:15px; font-weight:600; ${balCls}">${balSign}${fmtHome(bal, currentHomeCurrency())}</div>
        </div>
      </div>
      <div style="font-size:11.5px; color:var(--text-muted); text-align:center; margin-bottom:12px;">${balNote}</div>

      <div style="font-weight:600; font-size:13px; color:var(--text-secondary); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.03em;">${t('transactions_involved')} (${myExpenses.length})</div>
      <div style="max-height:50vh; overflow-y:auto;">
        ${rowsHtml}
      </div>

      <div class="row" style="justify-content:flex-end; margin-top:14px;">
        <button class="primary" onclick="window.app.closeMemberDetail()">${t('close_btn')}</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) window.app.closeMemberDetail(); });

  closeMemberDetail() {

  addMember() {
    const name = memberInput.trim();
    if (!name) return;
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const currentMembers = parseMembers(trip.members);
    if (currentMembers.includes(name)) { memberInput = ''; return; }
    const newMembers = [...currentMembers, name];
    memberInput = '';
    withSaving(
      () => { trip.members = newMembers.join(','); },
      () => apiPost({ action: 'updateTripMembers', trip_id: activeTripId, members: newMembers.join(',') })
    );
  },

  closeModal() { modal = null; render(); },

  createTrip() {
    const name = newTripName.trim();
    if (!name) return;
    if (newTripUseForeign && newTripCurrency === '__custom__' && !newTripCustomCurrency.trim()) {
      showToast(t('toast_need_name'));
      return;
    }
    const id = uid();
    const resolvedCurrency = newTripCurrency === '__custom__' ? newTripCustomCurrency.trim().toUpperCase() : newTripCurrency;
    const foreignCurrency = newTripUseForeign ? resolvedCurrency : '';
    const exchangeRate = newTripUseForeign ? (parseFloat(newTripRate) || '') : '';
    const homeCurrency = newTripHomeCurrency || 'VND';
    modal = null;
    withSaving(
      () => {
        rawTrips.push({ trip_id: id, trip_name: name, members: '', foreign_currency: foreignCurrency, exchange_rate: exchangeRate, home_currency: homeCurrency });
        activeTripId = id;
      },
      () => apiPost({ action: 'createTrip', trip_id: id, trip_name: name, members: '', foreign_currency: foreignCurrency, exchange_rate: exchangeRate, home_currency: homeCurrency })
    );
    newTripUseForeign = false;
    newTripCurrency = 'USD';
    newTripCustomCurrency = '';
    newTripRate = '';
    newTripHomeCurrency = 'VND';
  },

  renameTrip() {
    const name = renameTripDraft.trim();
    if (!name) return;
    if (renameTripUseForeign && renameTripCurrency === '__custom__' && !renameTripCustomCurrency.trim()) {
      showToast(t('toast_need_name2'));
      return;
    }
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const oldCurrency = trip.foreign_currency || '';
    const resolvedCurrency = renameTripCurrency === '__custom__' ? renameTripCustomCurrency.trim().toUpperCase() : renameTripCurrency;
    const newCurrency = renameTripUseForeign ? resolvedCurrency : '';
    const newRate = renameTripUseForeign ? (parseFloat(renameTripRate) || '') : '';

    // Nếu trip đã có chi tiêu dùng ngoại tệ cũ, không cho đổi sang mã khác
    // (vì các dòng cũ vẫn lưu currency cũ, đổi mã sẽ làm sai lệch quy đổi VNĐ).
    if (oldCurrency && newCurrency && oldCurrency !== newCurrency) {
      const hasOldCurrencyExpenses = rawExpenses.some(e => e.trip_id === activeTripId && e.currency === oldCurrency);
      if (hasOldCurrencyExpenses) {
        showToast(`${t('toast_cant_change_currency')} ${oldCurrency}${t('toast_cant_change_suffix')} ${newCurrency}`);
        return;
      }
    }

    const newHomeCurrency = renameTripHomeCurrency || 'VND';
    modal = null;
    withSaving(
      () => {
        trip.trip_name = name;
        trip.foreign_currency = newCurrency;
        trip.exchange_rate = newRate;
        trip.home_currency = newHomeCurrency;
      },
      () => apiPost({ action: 'renameTrip', trip_id: activeTripId, trip_name: name }).then(() =>
        apiPost({ action: 'setTripCurrency', trip_id: activeTripId, foreign_currency: newCurrency, exchange_rate: newRate, home_currency: newHomeCurrency })
      )
    );
  },

  renameMember() {
    const newName = editMemberDraft.newName.trim();
    const oldName = editMemberDraft.oldName;
    if (!newName || newName === oldName) { modal = null; render(); return; }

    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const currentMembers = parseMembers(trip.members);
    if (currentMembers.includes(newName)) {
      showToast(t('toast_dup_member'));
      return;
    }
    const newMembers = currentMembers.map(m => m === oldName ? newName : m);
    const tripId = activeTripId;

    // Tìm mọi expense liên quan tới tên cũ (đã trả, hoặc trong danh sách chia)
    const affectedExpenses = rawExpenses.filter(ex =>
      ex.trip_id === tripId && (ex.paid_by === oldName || parseMembers(ex.split_with).includes(oldName))
    );

    modal = null;
    withSaving(
      () => {
        trip.members = newMembers.join(',');
        affectedExpenses.forEach(ex => {
          if (ex.paid_by === oldName) ex.paid_by = newName;
          const splitList = parseMembers(ex.split_with);
          if (splitList.includes(oldName)) {
            ex.split_with = splitList.map(m => m === oldName ? newName : m).join(',');
          }
        });
      },
      async () => {
        await apiPost({ action: 'updateTripMembers', trip_id: tripId, members: newMembers.join(',') });
        for (const ex of affectedExpenses) {
          await apiPost({
            action: 'editExpense',
            expense_id: ex.expense_id,
            paid_by: ex.paid_by,
            amount: ex.amount,
            desc: ex.desc,
            split_with: ex.split_with,
            date: ex.date,
            time: ex.time,
            category: ex.category,
          });
        }
      }
    );
  },

  submitExpense() {
    const amt = parseFloat(expDraft.amount);
    if (!expDraft.paidBy || !amt || amt <= 0 || !expDraft.date) {
      showToast(t('fill_required'));
      return;
    }
    const isPayment = expDraft.category === 'payment';
    if (isPayment && expDraft.splitWith.length !== 1) {
      showToast(t('payment_error'));
      return;
    }
    modal = null;
    const isEditing = !!expDraft.id;
    const isFund = expDraft.category === 'fund';
    // Khoản góp quỹ chỉ cộng cho người góp, không chia cho ai khác -
    // tận dụng cơ chế splitWith sẵn có bằng cách gán đúng 1 người là chính họ.
    const splitWith = isFund ? [] : expDraft.splitWith;
    const expenseData = {
      expense_id: isEditing ? expDraft.id : uid(),
      trip_id: activeTripId,
      paid_by: expDraft.paidBy,
      amount: amt,
      currency: expDraft.currency || '',
      desc: expDraft.desc.trim(),
      split_with: splitWith.join(','),
      date: expDraft.date,
      time: expDraft.time || '',
      category: expDraft.category || '',
    };

    if (isEditing) {
      withSaving(
        () => {
          const idx = rawExpenses.findIndex(e => e.expense_id === expDraft.id);
          if (idx !== -1) rawExpenses[idx] = expenseData;
        },
        () => apiPost({ action: 'editExpense', ...expenseData })
      );
    } else {
      withSaving(
        () => { rawExpenses.push(expenseData); },
        () => apiPost({ action: 'addExpense', ...expenseData })
      );
    }
  }
};

// ===== Xác định workspace trước khi khởi động app =====
const WORKSPACE_STORAGE_KEY = 'tripsplit_workspace_id';
let WORKSPACE_ID = '';

function getWorkspaceFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const ws = params.get('ws');
  return ws ? ws.trim() : '';
}

function startApp(workspaceId) {
  WORKSPACE_ID = workspaceId;
  localStorage.setItem(WORKSPACE_STORAGE_KEY, workspaceId);
  // Đồng bộ luôn lên URL để bookmark/chia sẻ lại đúng workspace này
  const url = new URL(window.location.href);
  url.searchParams.set('ws', workspaceId);
  window.history.replaceState({}, '', url);

  document.getElementById('app').innerHTML = '';
  refreshData(true);
  startPolling();
}

function renderWorkspaceSetup(existingWarning) {
  const app = document.getElementById('app');
  const langBtn = document.getElementById('langToggleBtn');
  if (langBtn) { langBtn.textContent = appLang === 'vi' ? 'EN' : 'VI'; langBtn.title = appLang === 'vi' ? 'Switch to English' : 'Chuyển sang tiếng Việt'; }
  const wsTitle = appLang === 'en' ? 'Your workspace' : 'Tạo không gian của bạn';
  const wsDesc = appLang === 'en'
    ? 'Choose a unique name to store your trips, separate from other users. Example: your name or a unique alias (e.g. <em>phong-2026</em>).'
    : 'Đặt một tên riêng để lưu trữ trip của bạn, tách biệt với người khác cùng dùng app này. Ví dụ: tên bạn hoặc một biệt danh không trùng với ai (vd: <em>phong-2026</em>).';
  const wsLabel = appLang === 'en' ? 'Workspace name' : 'Tên không gian';
  const wsPlaceholder = appLang === 'en' ? 'e.g. phong-2026' : 'vd: phong-2026';
  const wsContinue = appLang === 'en' ? 'Continue' : 'Tiếp tục';
  app.innerHTML = `
    <div class="card" style="max-width:420px; margin:2rem auto;">
      <div class="card-head"><span class="card-title">${wsTitle}</span></div>
      <p style="font-size:13.5px; color:var(--text-secondary); margin-top:0;">${wsDesc}</p>
      <div class="field">
        <label>${wsLabel}</label>
        <input id="workspaceInput" placeholder="${wsPlaceholder}" autocomplete="off">
      </div>
      <div id="workspaceWarning"></div>
      <div class="row" style="justify-content:flex-end; margin-top:10px;">
        <button class="primary" onclick="window.app.confirmWorkspace()">${wsContinue}</button>
      </div>
    </div>
  `;
  if (existingWarning) {
    document.getElementById('workspaceWarning').innerHTML = `
      <div class="setup-banner" style="margin-bottom:0;">
        ${appLang === 'en' ? `The name "<strong>${escapeHtml(existingWarning)}</strong>" already has trip data. If this is not your workspace, please choose a different name.` : `Tên "<strong>${escapeHtml(existingWarning)}</strong>" đã có dữ liệu trip từ trước. Nếu đây không phải không gian của bạn, hãy đổi sang tên khác.`}
      </div>`;
  }
  document.getElementById('workspaceInput').focus();
}

window.app.confirmWorkspace = async function() {
  const input = document.getElementById('workspaceInput');
  const name = input.value.trim();
  if (!name) {
    showToast(t('workspace_required'));
    return;
  }
  if (!/^[a-zA-Z0-9_-]+$/.test(name)) {
    showToast(t('workspace_invalid'));
    return;
  }
  try {
    WORKSPACE_ID = name; // tạm gán để apiPost gửi đúng workspace khi check
    const result = await apiPost({ action: 'checkWorkspaceExists' });
    if (result.exists && !input.dataset.confirmed) {
      input.dataset.confirmed = 'true';
      renderWorkspaceSetup(name);
      const newInput = document.getElementById('workspaceInput');
      newInput.value = name;
      newInput.dataset.confirmed = 'true';
      return;
    }
    startApp(name);
  } catch (err) {
    showToast(t('connect_error') + err.message);
  }
};

// ===== Khởi động =====
(function initWorkspace() {
  const fromUrl = getWorkspaceFromUrl();
  if (fromUrl) {
    startApp(fromUrl);
    return;
  }
  const fromStorage = localStorage.getItem(WORKSPACE_STORAGE_KEY);
  if (fromStorage) {
    startApp(fromStorage);
    return;
  }
  renderWorkspaceSetup(null);
})();
</script>
