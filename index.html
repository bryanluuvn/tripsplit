<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trip Split</title>
<meta name="description" content="Chia tiền chi tiêu nhóm cho các chuyến đi">

<!-- PWA: chuẩn chung -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A1A2E">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<!-- PWA: chuẩn riêng cho iOS Safari (không tự đọc manifest.json đầy đủ) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trip Split">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    /* Bryan In Data brand tokens */
    --navy: #1A1A2E;
    --blue: #4A6CF7;
    --blue-dark: #3A56D4;
    --purple: #8B5CF6;
    --bg-tint: #F8F9FF;

    --bg: var(--bg-tint);
    --surface: #FFFFFF;
    --surface-2: #F1F2FA;
    --surface-3: #E9EBFA;
    --border: #E3E5F2;
    --border-strong: #CBCFE8;
    --text-primary: var(--navy);
    --text-secondary: #585B78;
    --text-muted: #9295B0;
    --accent: var(--blue);
    --accent-bg: #EDF0FE;
    --accent-text: var(--blue-dark);
    --accent-2: var(--purple);
    --accent-2-bg: #F1ECFE;
    --accent-2-text: #6D3FD9;
    --success: #1A9461;
    --success-bg: #E7F6EE;
    --danger: #D6453A;
    --danger-bg: #FCEDEB;
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --shadow-card: 0 1px 2px rgba(26,26,46,0.04), 0 1px 8px rgba(26,26,46,0.03);
    --shadow-modal: 0 12px 40px rgba(26,26,46,0.18);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(circle at 8% 0%, rgba(139,92,246,0.07), transparent 45%),
      radial-gradient(circle at 100% 12%, rgba(74,108,247,0.08), transparent 40%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text-primary);
    padding: 1.25rem 1rem 3rem;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 480px; margin: 0 auto; }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .app-header .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  h1 {
    font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.01em;
  }

  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem;
    margin-bottom: 0.9rem;
    box-shadow: var(--shadow-card);
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem;
  }
  .card-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 6px;
  }
  .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

  input, select {
    height: 40px;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text-primary);
    width: 100%;
    transition: border-color 0.15s ease;
    font-family: inherit;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }

  button {
    height: 40px;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  button:hover { background: var(--surface-2); border-color: var(--border-strong); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.45; cursor: default; }
  button.primary {
    background: var(--blue);
    color: white;
    border-color: var(--blue);
    box-shadow: 0 2px 8px rgba(74,108,247,0.3);
  }
  button.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
  button.ghost { border: none; background: none; color: var(--text-muted); padding: 4px; height: auto; }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border-strong);
    background: var(--surface); font-size: 13.5px; font-weight: 500; cursor: pointer;
    transition: all 0.12s ease;
  }
  .pill.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }

  .member-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-2); border-radius: 20px; padding: 6px 6px 6px 13px;
    font-size: 13.5px; font-weight: 500; color: var(--text-primary);
  }
  .member-tag button { height: auto; border: none; background: none; padding: 3px 6px; font-size: 13px; color: var(--text-muted); }
  .member-tag button:hover { color: var(--danger); background: none; }

  .expense-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .expense-row:last-child { border-bottom: none; padding-bottom: 2px; }
  .expense-row:first-child { padding-top: 2px; }
  .expense-main { font-size: 14.5px; }
  .expense-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .amount { font-weight: 600; font-size: 14.5px; white-space: nowrap; }
  .expense-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .settlement-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0; font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .settlement-row:last-child { border-bottom: none; }
  .settlement-row .spacer { flex: 1; }
  .settlement-arrow { color: var(--accent-2); font-weight: 600; }

  .empty {
    color: var(--text-muted); font-size: 13.5px; padding: 1.1rem 0; text-align: center;
  }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,26,46,0.55);
    display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 50;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); padding: 1.4rem;
    width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-modal);
  }
  .modal h2 { font-size: 16.5px; font-weight: 600; margin: 0 0 14px; letter-spacing: -0.01em; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 13px; font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 6px; }

  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.1rem; }
  .tab {
    padding: 7px 15px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--surface); font-size: 13.5px; font-weight: 500; cursor: pointer;
    color: var(--text-secondary); transition: all 0.12s ease;
  }
  .tab:hover { border-color: var(--border-strong); }
  .tab.active {
    background: var(--navy); color: white; border-color: var(--navy);
  }
  .tab.add-tab { color: var(--accent-text); border-color: var(--accent-bg); background: var(--accent-bg); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: white; padding: 10px 18px; border-radius: 24px;
    font-size: 13.5px; font-weight: 500; z-index: 100; box-shadow: 0 8px 24px rgba(26,26,46,0.25);
  }

  .total-line {
    text-align: right; font-size: 13px; color: var(--text-secondary); margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .danger-link {
    color: var(--danger); font-size: 13px; font-weight: 500; background: none;
    border: none; padding: 6px 0; cursor: pointer;
  }

  .cat-badge {
    display: inline-flex; align-items: center; font-size: 10.5px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px; margin-right: 7px;
    text-transform: uppercase; letter-spacing: 0.02em;
  }

  .balance-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border);
  }
  .balance-row:last-child { border-bottom: none; }
  .balance-name { font-weight: 500; }
  .balance-amt { font-weight: 600; }
  .balance-pos { color: var(--success); }
  .balance-neg { color: var(--danger); }
  .balance-note { color: var(--text-muted); font-size: 11.5px; font-weight: 400; margin-left: 4px; }

  .icon-btn {
    border: none; background: none; padding: 6px; cursor: pointer; display: inline-flex;
    color: var(--text-muted); border-radius: var(--radius-sm); transition: all 0.12s ease;
  }
  .icon-btn:hover { color: var(--text-primary); background: var(--surface-2); }

  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
    display: inline-block; flex-shrink: 0;
  }
  .sync-dot.ok { background: var(--success); }
  .sync-dot.error { background: var(--danger); }

  .setup-banner {
    background: #FFF7E8; border: 1px solid #F0CB7C; border-radius: var(--radius);
    padding: 14px; font-size: 13.5px; margin-bottom: 1rem; color: #7A5414;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border-strong);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Category summary chart */
  .cat-chart-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 13.5px;
  }
  .cat-chart-label { width: 76px; flex-shrink: 0; color: var(--text-secondary); font-weight: 500; }
  .cat-chart-bar-track {
    flex: 1; height: 9px; border-radius: 5px; background: var(--surface-2); overflow: hidden;
  }
  .cat-chart-bar-fill { height: 100%; border-radius: 5px; }
  .cat-chart-amt { width: 64px; text-align: right; font-weight: 600; flex-shrink: 0; }
  .cat-chart-pct { width: 38px; text-align: right; color: var(--text-muted); font-size: 11.5px; flex-shrink: 0; }

  .donut-wrap { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
  .donut-legend { flex: 1; min-width: 160px; display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: var(--text-secondary); flex: 1; }
  .legend-val { font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="app-header">
    <div class="brand">
      <div class="brand-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 10h13l-3.5-3.5"/>
          <path d="M17 16H4l3.5 3.5"/>
        </svg>
      </div>
      <h1>Trip Split</h1>
    </div>
    <span id="syncDot" class="sync-dot" title="Trạng thái đồng bộ"></span>
  </div>
  <div id="app"></div>
</div>

<script>
/* ====== CẤU HÌNH - DÁN URL APPS SCRIPT CỦA BẠN VÀO ĐÂY ====== */
const API_URL = 'https://script.google.com/macros/s/AKfycby_YCMUQ0o9zzYbk1zttsYKsktK3tQk8ddxcXFiJfzdedxL_J-2wEnEb3wvXM36OupBHQ/exec';
/* ============================================================= */

function uid() { return Math.random().toString(36).slice(2, 10); }
function fmt(n) {
  const rounded = Math.round(n);
  const k = rounded / 1000;
  // Nếu chia hết cho 1000 thì hiện số nguyên + k, nếu không thì hiện 1 số lẻ
  const kRounded = Math.round(k * 10) / 10;
  const display = kRounded % 1 === 0 ? kRounded.toFixed(0) : kRounded.toFixed(1);
  return display.replace('.', ',') + 'k';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function parseMembers(str) { return str ? String(str).split(',').map(s => s.trim()).filter(Boolean) : []; }

const CURRENCIES = [
  { code: 'USD', symbol: '$', name: 'USD' },
  { code: 'JPY', symbol: '¥', name: 'JPY' },
  { code: 'EUR', symbol: '€', name: 'EUR' },
  { code: 'THB', symbol: '฿', name: 'THB' },
  { code: 'KRW', symbol: '₩', name: 'KRW' },
  { code: 'SGD', symbol: 'S$', name: 'SGD' },
  { code: 'CNY', symbol: '¥', name: 'CNY' },
  { code: 'TWD', symbol: 'NT$', name: 'TWD' },
  { code: 'AUD', symbol: 'A$', name: 'AUD' },
  { code: 'GBP', symbol: '£', name: 'GBP' },
];
function currencySymbol(code) {
  const found = CURRENCIES.find(c => c.code === code);
  return found ? found.symbol : code;
}
// Quy đổi 1 expense sang VNĐ để dùng cho mọi tính toán (settlement, balance, chart...).
// amount luôn lưu số tiền gốc theo currency của dòng đó; trip.exchangeRate là tỷ giá
// 1 đơn vị ngoại tệ = bao nhiêu VNĐ, áp dụng chung cho cả trip.
const CATEGORIES = [
  { id: '', label: 'Khác', color: '#9295B0', bg: '#EEEFF5', text: '#5F6275' },
  { id: 'food', label: 'Ăn uống', color: '#E8833A', bg: '#FCEEE1', text: '#A85A1F' },
  { id: 'transport', label: 'Di chuyển', color: '#3266E0', bg: '#E8EDFC', text: '#2348AD' },
  { id: 'stay', label: 'Chỗ ở', color: '#1F9E6E', bg: '#E5F6EF', text: '#157450' },
  { id: 'activity', label: 'Vui chơi', color: '#D6457A', bg: '#FCE9F0', text: '#A12E59' },
];
function categoryLabel(id) {
  const found = CATEGORIES.find(c => c.id === id);
  return found ? found.label : 'Khác';
}
function categoryColor(id) {
  const found = CATEGORIES.find(c => c.id === id);
  return found ? found.color : '#9295B0';
}
function categoryBadgeStyle(id) {
  const found = CATEGORIES.find(c => c.id === id);
  const bg = found ? found.bg : '#EEEFF5';
  const text = found ? found.text : '#5F6275';
  return `background:${bg}; color:${text};`;
}
function nowTimeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function computeCategoryTotals(expenses) {
  const totals = {};
  let grandTotal = 0;
  expenses.forEach(e => {
    const key = e.category || '';
    const amt = e.amountVND ?? e.amount;
    totals[key] = (totals[key] || 0) + amt;
    grandTotal += amt;
  });
  const rows = Object.entries(totals)
    .map(([cat, amt]) => ({ cat, amt, pct: grandTotal > 0 ? amt / grandTotal : 0 }))
    .sort((a, b) => b.amt - a.amt);
  return { rows, grandTotal };
}

function renderCategoryChart(expenses) {
  const { rows, grandTotal } = computeCategoryTotals(expenses);
  if (grandTotal <= 0) return '';

  // Vẽ donut bằng conic-gradient thuần CSS, không cần thư viện ngoài
  let gradientStops = [];
  let acc = 0;
  rows.forEach(r => {
    const start = acc * 360;
    acc += r.pct;
    const end = acc * 360;
    gradientStops.push(`${categoryColor(r.cat)} ${start}deg ${end}deg`);
  });
  const gradient = `conic-gradient(${gradientStops.join(', ')})`;

  let html = `<div class="card">
    <div class="card-head"><span class="card-title">Chi tiêu theo loại</span></div>
    <div class="donut-wrap">
      <div style="width:96px; height:96px; border-radius:50%; background:${gradient}; flex-shrink:0; position:relative;">
        <div style="position:absolute; inset:14px; background:var(--surface); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--text-secondary); text-align:center; line-height:1.3;">
          ${fmt(grandTotal)}
        </div>
      </div>
      <div class="donut-legend">`;
  rows.forEach(r => {
    html += `<div class="legend-item">
      <span class="legend-dot" style="background:${categoryColor(r.cat)};"></span>
      <span class="legend-label">${escapeHtml(categoryLabel(r.cat))}</span>
      <span class="legend-val">${Math.round(r.pct * 100)}%</span>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--border);">`;
  rows.forEach(r => {
    html += `<div class="cat-chart-row">
      <span class="cat-chart-label">${escapeHtml(categoryLabel(r.cat))}</span>
      <span class="cat-chart-bar-track"><span class="cat-chart-bar-fill" style="width:${Math.max(r.pct * 100, 3)}%; background:${categoryColor(r.cat)};"></span></span>
      <span class="cat-chart-amt">${fmt(r.amt)}</span>
      <span class="cat-chart-pct">${Math.round(r.pct * 100)}%</span>
    </div>`;
  });
  html += `</div></div>`;

  return html;
}

function generateSummaryImage(trip, expenses, balances, settlements) {
  const W = 600;
  const PAD = 36;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const scale = 2; // render @2x cho ảnh nét trên màn hình retina

  // --- Bước 1: đo trước chiều cao cần thiết bằng cách render thử trên canvas tạm ---
  const { rows: catRows, grandTotal } = computeCategoryTotals(expenses);
  // Header (logo 50) + tên trip (22+8+28) + tổng chi (26+36)
  let estHeight = PAD + 50 + 22 + 8 + 28 + 26 + 36;
  if (catRows.length > 0) {
    const donutBlockHeight = Math.max(108, catRows.length * 26 + 8);
    estHeight += donutBlockHeight + 28;
  }
  estHeight += 22 + trip.members.length * 26 + 6 + 28; // số dư + line
  estHeight += 24 + Math.max(settlements.length, 1) * 28 + 10; // settlement
  estHeight += 20; // footer + padding đáy

  canvas.width = W * scale;
  canvas.height = estHeight * scale;
  ctx.scale(scale, scale);

  // --- Nền ---
  ctx.fillStyle = '#F8F9FF';
  ctx.fillRect(0, 0, W, estHeight);

  let y = PAD;

  // --- Header: logo + tên app ---
  ctx.save();
  const markGrad = ctx.createLinearGradient(PAD, y, PAD + 30, y + 30);
  markGrad.addColorStop(0, '#4A6CF7');
  markGrad.addColorStop(1, '#8B5CF6');
  ctx.fillStyle = markGrad;
  roundRect(ctx, PAD, y, 30, 30, 9);
  ctx.fill();
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(PAD + 7, y + 14); ctx.lineTo(PAD + 22, y + 14); ctx.lineTo(PAD + 18, y + 10);
  ctx.moveTo(PAD + 23, y + 19); ctx.lineTo(PAD + 8, y + 19); ctx.lineTo(PAD + 12, y + 23);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#1A1A2E';
  ctx.font = '600 15px -apple-system, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText('Trip Split', PAD + 40, y + 16);
  y += 50;

  // --- Tên trip ---
  ctx.fillStyle = '#1A1A2E';
  ctx.font = '600 22px -apple-system, sans-serif';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(trip.name, PAD, y);
  y += 8;
  ctx.strokeStyle = '#E3E5F2';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
  y += 28;

  // --- Tổng chi ---
  ctx.fillStyle = '#9295B0';
  ctx.font = '600 11px -apple-system, sans-serif';
  ctx.fillText('TỔNG CHI TIÊU', PAD, y);
  y += 26;
  ctx.fillStyle = '#1A1A2E';
  ctx.font = '700 28px -apple-system, sans-serif';
  ctx.fillText(fmt(grandTotal), PAD, y);
  y += 36;

  // --- Donut chart + legend ---
  if (catRows.length > 0) {
    const cx = PAD + 50, cy = y + 50, r = 50, rInner = 30;
    let startAngle = -Math.PI / 2;
    catRows.forEach(row => {
      const sweep = row.pct * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAngle, startAngle + sweep);
      ctx.closePath();
      ctx.fillStyle = categoryColor(row.cat);
      ctx.fill();
      startAngle += sweep;
    });
    ctx.fillStyle = '#F8F9FF';
    ctx.beginPath();
    ctx.arc(cx, cy, rInner, 0, Math.PI * 2);
    ctx.fill();

    let ly = y + 14;
    const legendX = PAD + 120;
    catRows.forEach(row => {
      ctx.fillStyle = categoryColor(row.cat);
      ctx.beginPath();
      ctx.arc(legendX, ly, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#585B78';
      ctx.font = '500 13px -apple-system, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText(categoryLabel(row.cat), legendX + 12, ly + 1);
      ctx.fillStyle = '#1A1A2E';
      ctx.font = '600 13px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(Math.round(row.pct * 100) + '%', W - PAD, ly + 1);
      ctx.textAlign = 'left';
      ly += 26;
    });
    const donutBlockHeight = Math.max(108, catRows.length * 26 + 8);
    y += donutBlockHeight;
    ctx.strokeStyle = '#E3E5F2';
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
    y += 28;
  }

  // --- Số dư từng người ---
  ctx.fillStyle = '#9295B0';
  ctx.font = '600 11px -apple-system, sans-serif';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('SỐ DƯ TỪNG NGƯỜI', PAD, y);
  y += 22;
  trip.members.forEach(m => {
    const bal = Math.round(balances[m] || 0);
    const isPos = bal > 100, isNeg = bal < -100;
    ctx.fillStyle = '#1A1A2E';
    ctx.font = '500 14px -apple-system, sans-serif';
    ctx.fillText(m, PAD, y);
    ctx.fillStyle = isPos ? '#1A9461' : isNeg ? '#D6453A' : '#9295B0';
    ctx.font = '600 14px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((bal > 0 ? '+' : '') + fmt(bal), W - PAD, y);
    ctx.textAlign = 'left';
    y += 26;
  });
  y += 6;
  ctx.strokeStyle = '#E3E5F2';
  ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
  y += 28;

  // --- Kết quả thanh toán ---
  ctx.fillStyle = '#9295B0';
  ctx.font = '600 11px -apple-system, sans-serif';
  ctx.fillText('KẾT QUẢ THANH TOÁN', PAD, y);
  y += 24;
  if (settlements.length === 0) {
    ctx.fillStyle = '#585B78';
    ctx.font = '500 14px -apple-system, sans-serif';
    ctx.fillText('Mọi người đã hòa sổ', PAD, y);
    y += 26;
  } else {
    settlements.forEach(s => {
      ctx.fillStyle = '#1A1A2E';
      ctx.font = '600 14px -apple-system, sans-serif';
      ctx.fillText(s.from, PAD, y);
      const fromWidth = ctx.measureText(s.from).width;
      ctx.fillStyle = '#8B5CF6';
      ctx.font = '600 14px -apple-system, sans-serif';
      ctx.fillText(' → ', PAD + fromWidth, y);
      const arrowWidth = ctx.measureText(' → ').width;
      ctx.fillStyle = '#1A1A2E';
      ctx.fillText(s.to, PAD + fromWidth + arrowWidth, y);
      ctx.font = '700 14px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(fmt(s.amount), W - PAD, y);
      ctx.textAlign = 'left';
      y += 28;
    });
  }
  y += 10;

  // --- Footer ---
  ctx.fillStyle = '#9295B0';
  ctx.font = '400 11px -apple-system, sans-serif';
  ctx.fillText('Tạo bởi Trip Split', PAD, y);

  // --- Xuất PNG ---
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${trip.name.replace(/[^\w\u00C0-\u1EF9 ]/g, '')}-tong-ket.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Đã tải ảnh tổng kết');
  }, 'image/png');
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function computeBalances(members, expenses) {
  const balances = {};
  members.forEach(m => balances[m] = 0);
  expenses.forEach(exp => {
    const splitMembers = exp.splitWith.length > 0 ? exp.splitWith : members;
    const amt = exp.amountVND ?? exp.amount;
    const share = amt / splitMembers.length;
    balances[exp.paidBy] = (balances[exp.paidBy] || 0) + amt;
    splitMembers.forEach(m => { balances[m] = (balances[m] || 0) - share; });
  });
  return balances;
}

function simplifyDebts(balances) {
  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([name, amt]) => {
    const r = Math.round(amt);
    if (r > 100) creditors.push({ name, amt: r });
    else if (r < -100) debtors.push({ name, amt: -r });
  });
  creditors.sort((a,b) => b.amt - a.amt);
  debtors.sort((a,b) => b.amt - a.amt);
  const settlements = [];
  let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const c = creditors[ci], d = debtors[di];
    const amt = Math.min(c.amt, d.amt);
    if (amt > 100) settlements.push({ from: d.name, to: c.name, amount: amt });
    c.amt -= amt; d.amt -= amt;
    if (c.amt <= 100) ci++;
    if (d.amt <= 100) di++;
  }
  return settlements;
}

// ---- API layer ----
async function apiGet() {
  const res = await fetch(API_URL);
  if (!res.ok) throw new Error('GET failed');
  return res.json();
}
async function apiPost(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' }, // tránh CORS preflight với Apps Script
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('POST failed');
  return res.json();
}

function setSyncDot(state) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state === 'ok' ? ' ok' : state === 'error' ? ' error' : '');
  dot.title = state === 'ok' ? 'Đã đồng bộ' : state === 'error' ? 'Lỗi đồng bộ - kiểm tra mạng' : 'Đang đồng bộ...';
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (t) t.remove();
  t = document.createElement('div');
  t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 1800);
}

function getTripObjects() {
  return rawTrips.map(t => ({
    trip_id: t.trip_id,
    name: t.trip_name,
    members: parseMembers(t.members),
    archived: t.archived === 'true' || t.archived === true,
    foreignCurrency: t.foreign_currency || '',
    exchangeRate: t.exchange_rate || '',
  }));
}
function getExpensesForTrip(trip) {
  return rawExpenses
    .filter(e => e.trip_id === trip.trip_id)
    .map(e => {
      const currency = e.currency || '';
      const amount = Number(e.amount);
      const rate = currency ? (parseFloat(trip.exchangeRate) || 0) : 1;
      return {
        id: e.expense_id,
        paidBy: e.paid_by,
        amount,
        currency,
        amountVND: currency ? amount * rate : amount,
        desc: e.desc,
        splitWith: parseMembers(e.split_with),
        date: e.date,
        time: e.time || '',
        category: e.category || '',
      };
    })
    .sort((a, b) => {
      const ak = a.date + ' ' + (a.time || '00:00');
      const bk = b.date + ' ' + (b.time || '00:00');
      return ak < bk ? 1 : -1;
    });
}

async function refreshData(showSpinner) {
  if (showSpinner) setSyncDot('loading');
  try {
    const data = await apiGet();
    rawTrips = data.trips || [];
    rawExpenses = data.expenses || [];
    if (!activeTripId && rawTrips.length > 0) {
      const firstActive = rawTrips.find(t => !(t.archived === 'true' || t.archived === true));
      activeTripId = firstActive ? firstActive.trip_id : rawTrips[0].trip_id;
    }
    loadError = null;
    setSyncDot('ok');
  } catch (err) {
    loadError = err.message;
    setSyncDot('error');
  }
  isLoading = false;
  render();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => refreshData(false), 8000); // tự đồng bộ mỗi 8 giây
}

// Optimistic update: áp dụng thay đổi vào state cục bộ NGAY, render ngay,
// rồi mới gửi request lên server ở dưới nền. Nếu lỗi, hoàn tác lại bằng snapshot.
async function withSaving(applyLocal, sendRequest) {
  const snapshotTrips = JSON.parse(JSON.stringify(rawTrips));
  const snapshotExpenses = JSON.parse(JSON.stringify(rawExpenses));

  if (applyLocal) applyLocal();
  render();
  setSyncDot('loading');

  try {
    await sendRequest();
    setSyncDot('ok');
    // Đồng bộ lại nền để lấy đúng dữ liệu thật từ Sheet (không hiện loading, không chặn UI)
    refreshData(false);
  } catch (err) {
    rawTrips = snapshotTrips;
    rawExpenses = snapshotExpenses;
    showToast('Lỗi đồng bộ, đã hoàn tác: ' + err.message);
    setSyncDot('error');
    render();
  }
}

function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;
  const name = e.currentTarget.dataset.name;

  if (action === 'selectTrip') { activeTripId = id; expenseFilter = { person: '', category: '' }; render(); }
  if (action === 'openNewTrip') { modal = 'newTrip'; newTripName = ''; render(); }

  if (action === 'openRenameTrip') {
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    renameTripDraft = trip.trip_name;
    renameTripUseForeign = !!trip.foreign_currency;
    renameTripCurrency = trip.foreign_currency || 'USD';
    renameTripRate = trip.exchange_rate ? String(trip.exchange_rate) : '';
    modal = 'renameTrip'; render();
  }

  if (action === 'toggleArchivedList') {
    showArchivedList = !showArchivedList; render();
  }

  if (action === 'archiveTrip') {
    const trip = rawTrips.find(t => t.trip_id === id);
    withSaving(
      () => { trip.archived = 'true'; },
      () => apiPost({ action: 'setTripArchived', trip_id: id, archived: true })
    );
    showToast('Đã lưu trữ trip');
  }

  if (action === 'unarchiveTrip') {
    const trip = rawTrips.find(t => t.trip_id === id);
    withSaving(
      () => { trip.archived = ''; },
      () => apiPost({ action: 'setTripArchived', trip_id: id, archived: false })
    );
    showToast('Đã bỏ lưu trữ');
  }

  if (action === 'openEditMember') {
    editMemberDraft = { oldName: name, newName: name };
    modal = 'editMember'; render();
  }

  if (action === 'removeMember') {
    const hasExpenses = e.currentTarget.dataset.hasExpenses === 'true';
    if (hasExpenses) {
      const ok = confirm(`${name} đã có chi tiêu trong trip này. Xóa thành viên sẽ XÓA LUÔN mọi chi tiêu mà ${name} đã trả. Tiếp tục?`);
      if (!ok) return;
    }
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const newMembers = parseMembers(trip.members).filter(m => m !== name);
    const tripId = activeTripId;
    const expensesToDelete = rawExpenses.filter(ex => ex.trip_id === tripId && ex.paid_by === name);
    withSaving(
      () => {
        trip.members = newMembers.join(',');
        rawExpenses = rawExpenses.filter(ex => !(ex.trip_id === tripId && ex.paid_by === name));
      },
      async () => {
        await apiPost({ action: 'updateTripMembers', trip_id: tripId, members: newMembers.join(',') });
        for (const ex of expensesToDelete) {
          await apiPost({ action: 'deleteExpense', expense_id: ex.expense_id });
        }
      }
    );
  }

  if (action === 'openAddExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const now = new Date();
    expDraft = {
      id: null,
      paidBy: trip.members[0] || '',
      amount: '', currency: '', amountInputRaw: '', desc: '', splitWith: [],
      date: now.toISOString().slice(0, 10),
      time: nowTimeStr(),
      category: '',
    };
    modal = 'addExpense'; render();
  }

  if (action === 'editExpense') {
    const exp = rawExpenses.find(ex => ex.expense_id === id);
    const currency = exp.currency || '';
    const amountNum = Number(exp.amount);
    expDraft = {
      id: exp.expense_id,
      paidBy: exp.paid_by,
      amount: String(exp.amount),
      currency,
      amountInputRaw: currency ? String(amountNum) : String(amountNum / 1000),
      desc: exp.desc,
      splitWith: parseMembers(exp.split_with),
      date: exp.date,
      time: exp.time || nowTimeStr(),
      category: exp.category || '',
    };
    modal = 'addExpense'; render();
  }

  if (action === 'deleteExpense') {
    if (!confirm('Xóa chi tiêu này? Không thể hoàn tác.')) return;
    withSaving(
      () => { rawExpenses = rawExpenses.filter(e => e.expense_id !== id); },
      () => apiPost({ action: 'deleteExpense', expense_id: id })
    );
  }

  if (action === 'deleteTrip') {
    if (!confirm('Xóa trip này? Không thể hoàn tác, dữ liệu sẽ mất với mọi người.')) return;
    const tripIdToDelete = activeTripId;
    withSaving(
      () => {
        rawTrips = rawTrips.filter(t => t.trip_id !== tripIdToDelete);
        rawExpenses = rawExpenses.filter(e => e.trip_id !== tripIdToDelete);
        activeTripId = rawTrips.length > 0 ? rawTrips[0].trip_id : null;
      },
      () => apiPost({ action: 'deleteTrip', trip_id: tripIdToDelete })
    );
  }

  if (action === 'exportImage') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip);
    const balances = computeBalances(trip.members, expenses);
    const settlements = simplifyDebts(balances);
    generateSummaryImage(trip, expenses, balances, settlements);
  }

  if (action === 'exportCsv') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip);
    const balances = computeBalances(trip.members, expenses);
    const settlements = simplifyDebts(balances);

    function csvEscape(val) {
      const s = String(val ?? '');
      if (s.includes(',') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    let rows = [];
    rows.push(['Ngày', 'Giờ', 'Loại', 'Người trả', 'Mô tả', 'Số tiền gốc', 'Đơn vị', 'Số tiền (VNĐ)', 'Chia cho']);
    expenses.slice().reverse().forEach(ex => {
      rows.push([
        ex.date, ex.time || '', categoryLabel(ex.category), ex.paidBy,
        ex.desc || '', ex.amount, ex.currency || 'VNĐ', Math.round(ex.amountVND),
        ex.splitWith.length > 0 ? ex.splitWith.join(' | ') : 'Cả nhóm',
      ]);
    });
    rows.push([]);
    rows.push(['Số dư từng người']);
    trip.members.forEach(m => {
      rows.push([m, Math.round(balances[m] || 0)]);
    });
    rows.push([]);
    rows.push(['Kết quả thanh toán']);
    if (settlements.length === 0) {
      rows.push(['Mọi người đã hòa sổ']);
    } else {
      settlements.forEach(s => rows.push([s.from, 'chuyển cho', s.to, Math.round(s.amount)]));
    }

    const csvContent = rows.map(r => r.map(csvEscape).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${trip.name.replace(/[^\w\u00C0-\u1EF9 ]/g, '')}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Đã tải file CSV');
  }

  if (action === 'copySummary') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip);
    const balances = computeBalances(trip.members, expenses);
    const settlements = simplifyDebts(balances);
    let text = `Tổng kết chia tiền - ${trip.name}\n\n`;
    expenses.slice().reverse().forEach(ex => {
      const amountText = ex.currency
        ? `${ex.amount.toLocaleString('vi-VN')}${currencySymbol(ex.currency)} (≈${fmt(ex.amountVND)})`
        : fmt(ex.amountVND);
      text += `${ex.date}${ex.time ? ' ' + ex.time : ''} [${categoryLabel(ex.category)}] ${ex.paidBy} trả ${amountText}${ex.desc ? ' cho ' + ex.desc : ''}\n`;
    });
    text += '\nSố dư từng người:\n';
    trip.members.forEach(m => {
      const bal = Math.round(balances[m] || 0);
      text += `${m}: ${bal > 0 ? '+' : ''}${fmt(bal)}\n`;
    });
    text += '\nKết quả thanh toán:\n';
    if (settlements.length === 0) text += 'Mọi người đã hòa sổ.\n';
    else settlements.forEach(s => { text += `${s.from} chuyển ${s.to}: ${fmt(s.amount)}\n`; });
    navigator.clipboard.writeText(text).then(() => showToast('Đã copy vào clipboard'));
  }
}

  if (modal === 'renameTrip') {
    overlay.innerHTML = `<div class="modal">
      <h2>Sửa trip</h2>
      <div class="field">
        <label>Tên trip</label>
        <input id="renameTripInput" value="${escapeHtml(renameTripDraft)}">

      ${renameTripUseForeign ? `
      <div class="row" style="gap:8px;">
        <div class="field" style="flex:1;">
          <label>Đơn vị ngoại tệ</label>
          <select id="renameTripCurrencySelect">
            ${CURRENCIES.map(c => `<option value="${c.code}" ${c.code === renameTripCurrency ? 'selected' : ''}>${c.code} (${c.symbol})</option>`).join('')}
          </select>
        </div>
        <div class="field" style="flex:1;">
          <label>1 ${escapeHtml(renameTripCurrency)} = ? đ</label>
          <input id="renameTripRateInput" type="number" step="any" placeholder="ví dụ 165" value="${escapeHtml(renameTripRate)}">
        </div>
      </div>
      <div style="font-size:12px; color:var(--text-muted); margin-top:-6px; margin-bottom:12px;">
        Đổi tỷ giá sẽ áp dụng lại cho mọi chi tiêu ngoại tệ đã ghi trong trip này.
      </div>` : ''}
      <div class="row" style="justify-content:flex-end;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.renameTrip()">Lưu</button>
      </div>
    </div>`;
  }

  if (modal === 'editMember') {
    overlay.innerHTML = `<div class="modal">
      <h2>Sửa tên thành viên</h2>
      <div class="field">
        <label>Tên</label>
        <input id="editMemberInput" value="${escapeHtml(editMemberDraft.newName)}">
        <div style="font-size:12px; color:var(--text-muted); margin-top:6px;">
          Mọi chi tiêu trước đây của <strong>${escapeHtml(editMemberDraft.oldName)}</strong> sẽ tự cập nhật theo tên mới.
        </div>
      </div>
      <div class="row" style="justify-content:flex-end;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.renameMember()">Lưu</button>
      </div>
    </div>`;
  }

  if (modal === 'addExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const isEditing = !!expDraft.id;
    const hasForeign = !!trip.foreignCurrency;
    const isForeign = expDraft.currency === trip.foreignCurrency && hasForeign;
    overlay.innerHTML = `<div class="modal">
      <h2>${isEditing ? 'Sửa chi tiêu' : 'Thêm chi tiêu'}</h2>
      <div class="field">
        <label>Ai trả</label>
        <select id="paidBySelect">
          ${trip.members.map(m => `<option value="${escapeHtml(m)}" ${m === expDraft.paidBy ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('')}
        </select>
      </div>
      <div class="row" style="gap:8px;">
        <div class="field" style="flex:1;">
          <label>Ngày</label>
          <input id="dateInput" type="date" value="${escapeHtml(expDraft.date)}">
        </div>
        <div class="field" style="flex:1;">
          <label>Giờ</label>
          <input id="timeInput" type="time" value="${escapeHtml(expDraft.time)}">
        </div>
      </div>
      ${hasForeign ? `
      <div class="field">
        <label>Đơn vị tiền</label>
        <div class="row">
          <span class="pill ${!isForeign ? 'active' : ''}" data-set-currency="">VNĐ</span>
          <span class="pill ${isForeign ? 'active' : ''}" data-set-currency="${escapeHtml(trip.foreignCurrency)}">${escapeHtml(trip.foreignCurrency)} (${currencySymbol(trip.foreignCurrency)})</span>
        </div>
      </div>` : ''}
      <div class="field">
        <label>Số tiền ${isForeign
          ? `<span style="color:var(--text-muted); font-weight:400;">(đơn vị: ${escapeHtml(trip.foreignCurrency)})</span>`
          : `<span style="color:var(--text-muted); font-weight:400;">(đơn vị: ngàn đồng)</span>`}
        </label>
        <input id="amountInput" type="number" step="any" placeholder="${isForeign ? 'ví dụ 5000' : 'ví dụ 90 = 90.000đ'}" value="${expDraft.amountInputRaw}">
        <div style="font-size:12px; color:var(--text-muted); margin-top:4px;" id="amountPreview">${expDraft.amount ? '= ' + fmt(isForeign ? parseFloat(expDraft.amount) * (parseFloat(trip.exchangeRate) || 0) : parseFloat(expDraft.amount)) : ''}</div>
      </div>
      <div class="field">
        <label>Mô tả <span style="color:var(--text-muted); font-weight:400;">(không bắt buộc)</span></label>
        <input id="descInput" placeholder="Ăn tối, taxi, khách sạn..." value="${escapeHtml(expDraft.desc)}">
      </div>
      <div class="field">
        <label>Loại chi tiêu</label>
        <select id="categorySelect">
          ${CATEGORIES.map(c => `<option value="${c.id}" ${c.id === expDraft.category ? 'selected' : ''}>${escapeHtml(c.label)}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Chia cho (bỏ trống = cả nhóm)</label>
        <div class="row">
          ${trip.members.map(m => `<span class="pill ${expDraft.splitWith.includes(m) ? 'active' : ''}" data-toggle-member="${escapeHtml(m)}">${escapeHtml(m)}</span>`).join('')}
        </div>
      </div>
      <div class="row" style="justify-content:flex-end; margin-top: 8px;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.submitExpense()">${isEditing ? 'Lưu thay đổi' : 'Lưu chi tiêu'}</button>
      </div>
    </div>`;
  }

  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) window.app.closeModal(); });

  if (modal === 'newTrip') {
    const inp = document.getElementById('newTripInput');
    inp.addEventListener('input', e => newTripName = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.app.createTrip(); });
    inp.focus();

    const useForeignCb = document.getElementById('useForeignCheckbox');
    if (useForeignCb) useForeignCb.addEventListener('change', e => { newTripUseForeign = e.target.checked; renderModal(); });
    const curSelect = document.getElementById('newTripCurrencySelect');
    if (curSelect) curSelect.addEventListener('change', e => { newTripCurrency = e.target.value; renderModal(); });
    const rateInput = document.getElementById('newTripRateInput');
    if (rateInput) rateInput.addEventListener('input', e => newTripRate = e.target.value);
  }
  if (modal === 'renameTrip') {
    const inp = document.getElementById('renameTripInput');
    inp.addEventListener('input', e => renameTripDraft = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.app.renameTrip(); });
    inp.focus();

    const useForeignCb2 = document.getElementById('useForeignCheckbox2');
    if (useForeignCb2) useForeignCb2.addEventListener('change', e => { renameTripUseForeign = e.target.checked; renderModal(); });
    const curSelect2 = document.getElementById('renameTripCurrencySelect');
    if (curSelect2) curSelect2.addEventListener('change', e => { renameTripCurrency = e.target.value; renderModal(); });

    inp.addEventListener('input', e => editMemberDraft.newName = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.app.renameMember(); });
    inp.focus();
    inp.select();
  }
  if (modal === 'addExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    document.getElementById('paidBySelect').addEventListener('change', e => expDraft.paidBy = e.target.value);
    document.getElementById('dateInput').addEventListener('input', e => expDraft.date = e.target.value);
    document.getElementById('timeInput').addEventListener('input', e => expDraft.time = e.target.value);

    function updateAmountFromRaw() {
      const isForeign = expDraft.currency === trip.foreignCurrency && !!trip.foreignCurrency;
      const typed = parseFloat(expDraft.amountInputRaw);
      if (isNaN(typed)) {
        expDraft.amount = '';
      } else {
        expDraft.amount = isForeign ? String(typed) : String(typed * 1000);
      }
      const preview = document.getElementById('amountPreview');
      if (preview) {
        if (isNaN(typed) || typed <= 0) {
          preview.textContent = '';
        } else {
          const vnd = isForeign ? typed * (parseFloat(trip.exchangeRate) || 0) : typed * 1000;
          preview.textContent = '= ' + fmt(vnd);
        }
      }
    }

    document.getElementById('amountInput').addEventListener('input', e => {
      expDraft.amountInputRaw = e.target.value;
      updateAmountFromRaw();
    });

    overlay.querySelectorAll('[data-set-currency]').forEach(el => {
      el.addEventListener('click', () => {
        expDraft.currency = el.dataset.setCurrency;
        renderModal();
      });
    });

    document.getElementById('descInput').addEventListener('input', e => expDraft.desc = e.target.value);
    document.getElementById('categorySelect').addEventListener('change', e => expDraft.category = e.target.value);
    overlay.querySelectorAll('[data-toggle-member]').forEach(el => {
      el.addEventListener('click', () => {
        const m = el.dataset.toggleMember;
        if (expDraft.splitWith.includes(m)) expDraft.splitWith = expDraft.splitWith.filter(x => x !== m);
        else expDraft.splitWith.push(m);
        renderModal();
      });
    });
  }
}

window.app = {
  retry() { isLoading = true; render(); refreshData(true); },

  addMember() {
    const name = memberInput.trim();
    if (!name) return;
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const currentMembers = parseMembers(trip.members);
    if (currentMembers.includes(name)) { memberInput = ''; return; }
    const newMembers = [...currentMembers, name];
    memberInput = '';
    withSaving(
      () => { trip.members = newMembers.join(','); },
      () => apiPost({ action: 'updateTripMembers', trip_id: activeTripId, members: newMembers.join(',') })
    );
  },

  closeModal() { modal = null; render(); },

  createTrip() {
    const name = newTripName.trim();
    if (!name) return;
    const id = uid();
    const foreignCurrency = newTripUseForeign ? newTripCurrency : '';
    const exchangeRate = newTripUseForeign ? (parseFloat(newTripRate) || '') : '';
    modal = null;
    withSaving(
      () => {
        rawTrips.push({ trip_id: id, trip_name: name, members: '', foreign_currency: foreignCurrency, exchange_rate: exchangeRate });
        activeTripId = id;
      },
      () => apiPost({ action: 'createTrip', trip_id: id, trip_name: name, members: '', foreign_currency: foreignCurrency, exchange_rate: exchangeRate })
    );
    newTripUseForeign = false;
    newTripCurrency = 'USD';
    newTripRate = '';
  },

  renameTrip() {
    const name = renameTripDraft.trim();
    if (!name) return;
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const oldCurrency = trip.foreign_currency || '';
    const newCurrency = renameTripUseForeign ? renameTripCurrency : '';
    const newRate = renameTripUseForeign ? (parseFloat(renameTripRate) || '') : '';

    // Nếu trip đã có chi tiêu dùng ngoại tệ cũ, không cho đổi sang mã khác
    // (vì các dòng cũ vẫn lưu currency cũ, đổi mã sẽ làm sai lệch quy đổi VNĐ).
    if (oldCurrency && newCurrency && oldCurrency !== newCurrency) {
      const hasOldCurrencyExpenses = rawExpenses.some(e => e.trip_id === activeTripId && e.currency === oldCurrency);
      if (hasOldCurrencyExpenses) {
        showToast(`Trip đã có chi tiêu bằng ${oldCurrency}, không thể đổi sang ${newCurrency}`);
        return;
      }
    }

    modal = null;
    withSaving(
      () => {
        trip.trip_name = name;
        trip.foreign_currency = newCurrency;
        trip.exchange_rate = newRate;
      },
      () => apiPost({ action: 'renameTrip', trip_id: activeTripId, trip_name: name }).then(() =>
        apiPost({ action: 'setTripCurrency', trip_id: activeTripId, foreign_currency: newCurrency, exchange_rate: newRate })
      )
    );
  },

  renameMember() {
    const newName = editMemberDraft.newName.trim();
    const oldName = editMemberDraft.oldName;
    if (!newName || newName === oldName) { modal = null; render(); return; }

    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const currentMembers = parseMembers(trip.members);
    if (currentMembers.includes(newName)) {
      showToast('Đã có thành viên tên này trong trip');
      return;
    }
    const newMembers = currentMembers.map(m => m === oldName ? newName : m);
    const tripId = activeTripId;

    // Tìm mọi expense liên quan tới tên cũ (đã trả, hoặc trong danh sách chia)
    const affectedExpenses = rawExpenses.filter(ex =>
      ex.trip_id === tripId && (ex.paid_by === oldName || parseMembers(ex.split_with).includes(oldName))
    );

    modal = null;
    withSaving(
      () => {
        trip.members = newMembers.join(',');
        affectedExpenses.forEach(ex => {
          if (ex.paid_by === oldName) ex.paid_by = newName;
          const splitList = parseMembers(ex.split_with);
          if (splitList.includes(oldName)) {
            ex.split_with = splitList.map(m => m === oldName ? newName : m).join(',');
          }
        });
      },
      async () => {
        await apiPost({ action: 'updateTripMembers', trip_id: tripId, members: newMembers.join(',') });
        for (const ex of affectedExpenses) {
          await apiPost({
            action: 'editExpense',
            expense_id: ex.expense_id,
            paid_by: ex.paid_by,
            amount: ex.amount,
            desc: ex.desc,
            split_with: ex.split_with,
            date: ex.date,
            time: ex.time,
            category: ex.category,
          });
        }
      }
    );
  },

  submitExpense() {
    const amt = parseFloat(expDraft.amount);
    if (!expDraft.paidBy || !amt || amt <= 0 || !expDraft.date) {
      showToast('Điền đủ thông tin trước khi lưu');
      return;
    }
    modal = null;
    const isEditing = !!expDraft.id;
    const expenseData = {
      expense_id: isEditing ? expDraft.id : uid(),
      trip_id: activeTripId,
      paid_by: expDraft.paidBy,
      amount: amt,
      currency: expDraft.currency || '',
      desc: expDraft.desc.trim(),
      split_with: expDraft.splitWith.join(','),
      date: expDraft.date,
      time: expDraft.time || '',
      category: expDraft.category || '',
    };

    if (isEditing) {
      withSaving(
        () => {
          const idx = rawExpenses.findIndex(e => e.expense_id === expDraft.id);
          if (idx !== -1) rawExpenses[idx] = expenseData;
        },
        () => apiPost({ action: 'editExpense', ...expenseData })
      );
    } else {
      withSaving(
        () => { rawExpenses.push(expenseData); },
        () => apiPost({ action: 'addExpense', ...expenseData })
      );
    }
  }
};

refreshData(true);
startPolling();
</script>
</body>
</html>
