<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trip Split — Bryan In Data</title>
<link rel="icon" href="data:,">
<style>
  :root {
    /* Bryan In Data brand tokens */
    --navy: #1A1A2E;
    --blue: #4A6CF7;
    --blue-dark: #3A56D4;
    --purple: #8B5CF6;
    --bg-tint: #F8F9FF;

    --bg: var(--bg-tint);
    --surface: #FFFFFF;
    --surface-2: #F1F2FA;
    --surface-3: #E9EBFA;
    --border: #E3E5F2;
    --border-strong: #CBCFE8;
    --text-primary: var(--navy);
    --text-secondary: #585B78;
    --text-muted: #9295B0;
    --accent: var(--blue);
    --accent-bg: #EDF0FE;
    --accent-text: var(--blue-dark);
    --accent-2: var(--purple);
    --accent-2-bg: #F1ECFE;
    --accent-2-text: #6D3FD9;
    --success: #1A9461;
    --success-bg: #E7F6EE;
    --danger: #D6453A;
    --danger-bg: #FCEDEB;
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --shadow-card: 0 1px 2px rgba(26,26,46,0.04), 0 1px 8px rgba(26,26,46,0.03);
    --shadow-modal: 0 12px 40px rgba(26,26,46,0.18);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(circle at 8% 0%, rgba(139,92,246,0.07), transparent 45%),
      radial-gradient(circle at 100% 12%, rgba(74,108,247,0.08), transparent 40%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text-primary);
    padding: 1.25rem 1rem 3rem;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 480px; margin: 0 auto; }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .app-header .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  h1 {
    font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.01em;
    display: flex; flex-direction: column; line-height: 1.25;
  }
  h1 .sub { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.02em; text-transform: uppercase; }

  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem;
    margin-bottom: 0.9rem;
    box-shadow: var(--shadow-card);
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem;
  }
  .card-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 6px;
  }
  .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

  input, select {
    height: 40px;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-size: 15px;
    background: var(--surface);
    color: var(--text-primary);
    width: 100%;
    transition: border-color 0.15s ease;
    font-family: inherit;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }

  button {
    height: 40px;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  button:hover { background: var(--surface-2); border-color: var(--border-strong); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.45; cursor: default; }
  button.primary {
    background: var(--blue);
    color: white;
    border-color: var(--blue);
    box-shadow: 0 2px 8px rgba(74,108,247,0.3);
  }
  button.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
  button.ghost { border: none; background: none; color: var(--text-muted); padding: 4px; height: auto; }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border-strong);
    background: var(--surface); font-size: 13.5px; font-weight: 500; cursor: pointer;
    transition: all 0.12s ease;
  }
  .pill.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }

  .member-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-2); border-radius: 20px; padding: 6px 6px 6px 13px;
    font-size: 13.5px; font-weight: 500; color: var(--text-primary);
  }
  .member-tag button { height: auto; border: none; background: none; padding: 3px 6px; font-size: 13px; color: var(--text-muted); }
  .member-tag button:hover { color: var(--danger); background: none; }

  .expense-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .expense-row:last-child { border-bottom: none; padding-bottom: 2px; }
  .expense-row:first-child { padding-top: 2px; }
  .expense-main { font-size: 14.5px; }
  .expense-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .amount { font-weight: 600; font-size: 14.5px; white-space: nowrap; }
  .expense-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .settlement-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0; font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .settlement-row:last-child { border-bottom: none; }
  .settlement-row .spacer { flex: 1; }
  .settlement-arrow { color: var(--accent-2); font-weight: 600; }

  .empty {
    color: var(--text-muted); font-size: 13.5px; padding: 1.1rem 0; text-align: center;
  }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,26,46,0.55);
    display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 50;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); padding: 1.4rem;
    width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-modal);
  }
  .modal h2 { font-size: 16.5px; font-weight: 600; margin: 0 0 14px; letter-spacing: -0.01em; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 13px; font-weight: 500; color: var(--text-secondary); display: block; margin-bottom: 6px; }

  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.1rem; }
  .tab {
    padding: 7px 15px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--surface); font-size: 13.5px; font-weight: 500; cursor: pointer;
    color: var(--text-secondary); transition: all 0.12s ease;
  }
  .tab:hover { border-color: var(--border-strong); }
  .tab.active {
    background: var(--navy); color: white; border-color: var(--navy);
  }
  .tab.add-tab { color: var(--accent-text); border-color: var(--accent-bg); background: var(--accent-bg); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: white; padding: 10px 18px; border-radius: 24px;
    font-size: 13.5px; font-weight: 500; z-index: 100; box-shadow: 0 8px 24px rgba(26,26,46,0.25);
  }

  .total-line {
    text-align: right; font-size: 13px; color: var(--text-secondary); margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .danger-link {
    color: var(--danger); font-size: 13px; font-weight: 500; background: none;
    border: none; padding: 6px 0; cursor: pointer;
  }

  .cat-badge {
    display: inline-flex; align-items: center; font-size: 10.5px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px; margin-right: 7px;
    background: var(--accent-2-bg); color: var(--accent-2-text);
    text-transform: uppercase; letter-spacing: 0.02em;
  }

  .balance-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border);
  }
  .balance-row:last-child { border-bottom: none; }
  .balance-name { font-weight: 500; }
  .balance-amt { font-weight: 600; }
  .balance-pos { color: var(--success); }
  .balance-neg { color: var(--danger); }
  .balance-note { color: var(--text-muted); font-size: 11.5px; font-weight: 400; margin-left: 4px; }

  .icon-btn {
    border: none; background: none; padding: 6px; cursor: pointer; display: inline-flex;
    color: var(--text-muted); border-radius: var(--radius-sm); transition: all 0.12s ease;
  }
  .icon-btn:hover { color: var(--text-primary); background: var(--surface-2); }

  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
    display: inline-block; flex-shrink: 0;
  }
  .sync-dot.ok { background: var(--success); }
  .sync-dot.error { background: var(--danger); }

  .setup-banner {
    background: #FFF7E8; border: 1px solid #F0CB7C; border-radius: var(--radius);
    padding: 14px; font-size: 13.5px; margin-bottom: 1rem; color: #7A5414;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border-strong);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Category summary chart */
  .cat-chart-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 13.5px;
  }
  .cat-chart-label { width: 76px; flex-shrink: 0; color: var(--text-secondary); font-weight: 500; }
  .cat-chart-bar-track {
    flex: 1; height: 9px; border-radius: 5px; background: var(--surface-2); overflow: hidden;
  }
  .cat-chart-bar-fill { height: 100%; border-radius: 5px; }
  .cat-chart-amt { width: 64px; text-align: right; font-weight: 600; flex-shrink: 0; }
  .cat-chart-pct { width: 38px; text-align: right; color: var(--text-muted); font-size: 11.5px; flex-shrink: 0; }

  .donut-wrap { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
  .donut-legend { flex: 1; min-width: 160px; display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: var(--text-secondary); flex: 1; }
  .legend-val { font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="app-header">
    <div class="brand">
      <div class="brand-mark">B</div>
      <h1>Trip Split<span class="sub">Bryan in data</span></h1>
    </div>
    <span id="syncDot" class="sync-dot" title="Trạng thái đồng bộ"></span>
  </div>
  <div id="app"></div>
</div>

<script>
/* ====== CẤU HÌNH - DÁN URL APPS SCRIPT CỦA BẠN VÀO ĐÂY ====== */
const API_URL = 'https://script.google.com/macros/s/AKfycby_YCMUQ0o9zzYbk1zttsYKsktK3tQk8ddxcXFiJfzdedxL_J-2wEnEb3wvXM36OupBHQ/exec';
/* ============================================================= */

function uid() { return Math.random().toString(36).slice(2, 10); }
function fmt(n) {
  const rounded = Math.round(n);
  const k = rounded / 1000;
  // Nếu chia hết cho 1000 thì hiện số nguyên + k, nếu không thì hiện 1 số lẻ
  const kRounded = Math.round(k * 10) / 10;
  const display = kRounded % 1 === 0 ? kRounded.toFixed(0) : kRounded.toFixed(1);
  return display.replace('.', ',') + 'k';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function parseMembers(str) { return str ? String(str).split(',').map(s => s.trim()).filter(Boolean) : []; }

const CATEGORIES = [
  { id: '', label: 'Khác', color: '#9295B0' },
  { id: 'food', label: 'Ăn uống', color: '#8B5CF6' },
  { id: 'transport', label: 'Di chuyển', color: '#4A6CF7' },
  { id: 'stay', label: 'Chỗ ở', color: '#1A1A2E' },
  { id: 'activity', label: 'Vui chơi', color: '#D6453A' },
];
function categoryLabel(id) {
  const found = CATEGORIES.find(c => c.id === id);
  return found ? found.label : 'Khác';
}
function categoryColor(id) {
  const found = CATEGORIES.find(c => c.id === id);
  return found ? found.color : '#9295B0';
}
function nowTimeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function renderCategoryChart(expenses) {
  const totals = {};
  let grandTotal = 0;
  expenses.forEach(e => {
    const key = e.category || '';
    totals[key] = (totals[key] || 0) + e.amount;
    grandTotal += e.amount;
  });
  if (grandTotal <= 0) return '';

  const rows = Object.entries(totals)
    .map(([cat, amt]) => ({ cat, amt, pct: amt / grandTotal }))
    .sort((a, b) => b.amt - a.amt);

  // Vẽ donut bằng conic-gradient thuần CSS, không cần thư viện ngoài
  let gradientStops = [];
  let acc = 0;
  rows.forEach(r => {
    const start = acc * 360;
    acc += r.pct;
    const end = acc * 360;
    gradientStops.push(`${categoryColor(r.cat)} ${start}deg ${end}deg`);
  });
  const gradient = `conic-gradient(${gradientStops.join(', ')})`;

  let html = `<div class="card">
    <div class="card-head"><span class="card-title">Chi tiêu theo loại</span></div>
    <div class="donut-wrap">
      <div style="width:96px; height:96px; border-radius:50%; background:${gradient}; flex-shrink:0; position:relative;">
        <div style="position:absolute; inset:14px; background:var(--surface); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--text-secondary); text-align:center; line-height:1.3;">
          ${fmt(grandTotal)}
        </div>
      </div>
      <div class="donut-legend">`;
  rows.forEach(r => {
    html += `<div class="legend-item">
      <span class="legend-dot" style="background:${categoryColor(r.cat)};"></span>
      <span class="legend-label">${escapeHtml(categoryLabel(r.cat))}</span>
      <span class="legend-val">${Math.round(r.pct * 100)}%</span>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--border);">`;
  rows.forEach(r => {
    html += `<div class="cat-chart-row">
      <span class="cat-chart-label">${escapeHtml(categoryLabel(r.cat))}</span>
      <span class="cat-chart-bar-track"><span class="cat-chart-bar-fill" style="width:${Math.max(r.pct * 100, 3)}%; background:${categoryColor(r.cat)};"></span></span>
      <span class="cat-chart-amt">${fmt(r.amt)}</span>
      <span class="cat-chart-pct">${Math.round(r.pct * 100)}%</span>
    </div>`;
  });
  html += `</div></div>`;

  return html;
}

function computeBalances(members, expenses) {
  const balances = {};
  members.forEach(m => balances[m] = 0);
  expenses.forEach(exp => {
    const splitMembers = exp.splitWith.length > 0 ? exp.splitWith : members;
    const share = exp.amount / splitMembers.length;
    balances[exp.paidBy] = (balances[exp.paidBy] || 0) + exp.amount;
    splitMembers.forEach(m => { balances[m] = (balances[m] || 0) - share; });
  });
  return balances;
}

function simplifyDebts(balances) {
  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([name, amt]) => {
    const r = Math.round(amt);
    if (r > 100) creditors.push({ name, amt: r });
    else if (r < -100) debtors.push({ name, amt: -r });
  });
  creditors.sort((a,b) => b.amt - a.amt);
  debtors.sort((a,b) => b.amt - a.amt);
  const settlements = [];
  let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const c = creditors[ci], d = debtors[di];
    const amt = Math.min(c.amt, d.amt);
    if (amt > 100) settlements.push({ from: d.name, to: c.name, amount: amt });
    c.amt -= amt; d.amt -= amt;
    if (c.amt <= 100) ci++;
    if (d.amt <= 100) di++;
  }
  return settlements;
}

// ---- API layer ----
async function apiGet() {
  const res = await fetch(API_URL);
  if (!res.ok) throw new Error('GET failed');
  return res.json();
}
async function apiPost(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' }, // tránh CORS preflight với Apps Script
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('POST failed');
  return res.json();
}

// ---- State ----
let rawTrips = [];     // raw rows từ Sheet Trips
let rawExpenses = [];  // raw rows từ Sheet Expenses
let activeTripId = null;
let modal = null;
let expDraft = { id: null, paidBy: '', amount: '', desc: '', splitWith: [], date: '', time: '', category: '' };
let memberInput = '';
let newTripName = '';
let renameTripDraft = '';
let isLoading = true;
let loadError = null;
let pollTimer = null;
let toastTimer = null;

function setSyncDot(state) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state === 'ok' ? ' ok' : state === 'error' ? ' error' : '');
  dot.title = state === 'ok' ? 'Đã đồng bộ' : state === 'error' ? 'Lỗi đồng bộ - kiểm tra mạng' : 'Đang đồng bộ...';
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (t) t.remove();
  t = document.createElement('div');
  t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 1800);
}

function getTripObjects() {
  return rawTrips.map(t => ({
    trip_id: t.trip_id,
    name: t.trip_name,
    members: parseMembers(t.members),
  }));
}
function getExpensesForTrip(tripId) {
  return rawExpenses
    .filter(e => e.trip_id === tripId)
    .map(e => ({
      id: e.expense_id,
      paidBy: e.paid_by,
      amount: Number(e.amount),
      desc: e.desc,
      splitWith: parseMembers(e.split_with),
      date: e.date,
      time: e.time || '',
      category: e.category || '',
    }))
    .sort((a, b) => {
      const ak = a.date + ' ' + (a.time || '00:00');
      const bk = b.date + ' ' + (b.time || '00:00');
      return ak < bk ? 1 : -1;
    });
}

async function refreshData(showSpinner) {
  if (showSpinner) setSyncDot('loading');
  try {
    const data = await apiGet();
    rawTrips = data.trips || [];
    rawExpenses = data.expenses || [];
    if (!activeTripId && rawTrips.length > 0) activeTripId = rawTrips[0].trip_id;
    loadError = null;
    setSyncDot('ok');
  } catch (err) {
    loadError = err.message;
    setSyncDot('error');
  }
  isLoading = false;
  render();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => refreshData(false), 8000); // tự đồng bộ mỗi 8 giây
}

function render() {
  const app = document.getElementById('app');

  if (!API_URL || API_URL === 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
    app.innerHTML = `<div class="setup-banner">
      Chưa cấu hình API_URL. Mở file index.html, dán link Google Apps Script Web App vào biến API_URL ở đầu phần &lt;script&gt;.
    </div>`;
    return;
  }

  if (isLoading) {
    app.innerHTML = `<p class="empty"><span class="spinner"></span> Đang tải dữ liệu...</p>`;
    return;
  }

  if (loadError) {
    app.innerHTML = `<div class="setup-banner">Không tải được dữ liệu: ${escapeHtml(loadError)}. <button onclick="window.app.retry()">Thử lại</button></div>`;
    return;
  }

  const trips = getTripObjects();
  const trip = trips.find(t => t.trip_id === activeTripId) || null;

  let html = '<div class="tabs">';
  trips.forEach(t => {
    html += `<div class="tab ${t.trip_id === activeTripId ? 'active' : ''}" data-action="selectTrip" data-id="${t.trip_id}">${escapeHtml(t.name)}</div>`;
  });
  html += `<div class="tab add-tab" data-action="openNewTrip">+ Trip mới</div></div>`;

  if (!trip && trips.length === 0) {
    html += `<p class="empty">Chưa có trip nào. Bấm "+ Trip mới" để bắt đầu.</p>`;
  }

  if (trip) {
    const expenses = getExpensesForTrip(trip.trip_id);

    html += `<div class="row" style="justify-content:space-between; margin-bottom:0.6rem; padding: 0 2px;">
      <h2 style="font-size:16.5px; font-weight:600; margin:0; letter-spacing:-0.01em;">${escapeHtml(trip.name)}</h2>
      <button class="icon-btn" data-action="openRenameTrip" aria-label="Sửa tên trip">✏️</button>
    </div>`;

    html += `<div class="card">
      <div class="card-head"><span class="card-title">Thành viên</span></div>
      <div class="row" style="margin-bottom:12px;">`;
    if (trip.members.length === 0) {
      html += `<span style="font-size:13px; color:var(--text-muted);">Chưa có thành viên nào.</span>`;
    }
    trip.members.forEach(m => {
      const hasExpenses = expenses.some(e => e.paidBy === m);
      html += `<span class="member-tag">${escapeHtml(m)}<button data-action="removeMember" data-name="${escapeHtml(m)}" data-has-expenses="${hasExpenses}">✕</button></span>`;
    });
    html += `</div><div class="row">
      <input id="memberInput" placeholder="Tên thành viên" value="${escapeHtml(memberInput)}" style="flex:1;" onkeydown="if(event.key==='Enter')window.app.addMember()">
      <button onclick="window.app.addMember()">Thêm</button>
    </div></div>`;

    html += `<div class="card">
      <div class="card-head">
        <span class="card-title">Chi tiêu · ${expenses.length}</span>
        <button class="primary" ${trip.members.length === 0 ? 'disabled' : ''} data-action="openAddExpense">+ Thêm chi tiêu</button>
      </div>`;

    if (trip.members.length === 0) {
      html += `<p class="empty">Thêm thành viên trước khi ghi chi tiêu.</p>`;
    } else if (expenses.length === 0) {
      html += `<p class="empty">Chưa có chi tiêu nào.</p>`;
    } else {
      let total = 0;
      expenses.forEach(e => {
        total += e.amount;
        html += `<div class="expense-row">
          <div class="expense-main">
            <span class="cat-badge">${escapeHtml(categoryLabel(e.category))}</span><strong>${escapeHtml(e.paidBy)}</strong>${e.desc ? ' trả cho ' + escapeHtml(e.desc) : ' đã trả'}
            <div class="expense-meta">${escapeHtml(e.date)}${e.time ? ' · ' + escapeHtml(e.time) : ''} · chia ${e.splitWith.length > 0 ? e.splitWith.map(escapeHtml).join(', ') : 'cả nhóm'}</div>
          </div>
          <div class="row" style="gap:0; flex-wrap:nowrap;">
            <span class="amount">${fmt(e.amount)}</span>
            <div class="expense-actions">
              <button class="icon-btn" data-action="editExpense" data-id="${e.id}" aria-label="Sửa">✏️</button>
              <button class="icon-btn" data-action="deleteExpense" data-id="${e.id}" aria-label="Xóa">🗑</button>
            </div>
          </div>
        </div>`;
      });
      html += `<div class="total-line">Tổng chi <strong style="color:var(--text-primary)">${fmt(total)}</strong></div>`;
    }
    html += `</div>`;

    if (trip.members.length > 0 && expenses.length > 0) {
      html += renderCategoryChart(expenses);
    }

    if (trip.members.length > 0) {
      const balances = computeBalances(trip.members, expenses);
      const settlements = simplifyDebts(balances);

      html += `<div class="card">
        <div class="card-head"><span class="card-title">Số dư từng người</span></div>`;
      trip.members.forEach(m => {
        const bal = Math.round(balances[m] || 0);
        const cls = bal > 100 ? 'balance-pos' : bal < -100 ? 'balance-neg' : '';
        const sign = bal > 0 ? '+' : '';
        const note = bal > 100 ? 'sẽ nhận lại' : bal < -100 ? 'cần trả thêm' : 'đã hòa sổ';
        html += `<div class="balance-row">
          <span class="balance-name">${escapeHtml(m)}</span>
          <span class="balance-amt ${cls}">${sign}${fmt(bal)}<span class="balance-note">${note}</span></span>
        </div>`;
      });
      html += `</div>`;

      html += `<div class="card">
        <div class="card-head">
          <span class="card-title">Kết quả chia tiền</span>
          <button data-action="copySummary">📋 Copy để gửi</button>
        </div>`;
      if (settlements.length === 0) {
        html += `<p class="empty">Mọi người đã hòa sổ, không cần chuyển tiền.</p>`;
      } else {
        settlements.forEach(s => {
          html += `<div class="settlement-row"><strong>${escapeHtml(s.from)}</strong> <span class="settlement-arrow">→</span> <strong>${escapeHtml(s.to)}</strong><span class="spacer"></span><strong>${fmt(s.amount)}</strong></div>`;
        });
      }
      html += `</div>`;
    }

    html += `<button class="danger-link" data-action="deleteTrip">Xóa trip này</button>`;
  }

  app.innerHTML = html;

  app.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleAction));
  const mi = document.getElementById('memberInput');
  if (mi) mi.addEventListener('input', e => { memberInput = e.target.value; });

  const existingOverlay = document.getElementById('modalOverlay');
  if (existingOverlay) existingOverlay.remove();
  if (modal) renderModal();
}

// Optimistic update: áp dụng thay đổi vào state cục bộ NGAY, render ngay,
// rồi mới gửi request lên server ở dưới nền. Nếu lỗi, hoàn tác lại bằng snapshot.
async function withSaving(applyLocal, sendRequest) {
  const snapshotTrips = JSON.parse(JSON.stringify(rawTrips));
  const snapshotExpenses = JSON.parse(JSON.stringify(rawExpenses));

  if (applyLocal) applyLocal();
  render();
  setSyncDot('loading');

  try {
    await sendRequest();
    setSyncDot('ok');
    // Đồng bộ lại nền để lấy đúng dữ liệu thật từ Sheet (không hiện loading, không chặn UI)
    refreshData(false);
  } catch (err) {
    rawTrips = snapshotTrips;
    rawExpenses = snapshotExpenses;
    showToast('Lỗi đồng bộ, đã hoàn tác: ' + err.message);
    setSyncDot('error');
    render();
  }
}

function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;
  const name = e.currentTarget.dataset.name;

  if (action === 'selectTrip') { activeTripId = id; render(); }
  if (action === 'openNewTrip') { modal = 'newTrip'; newTripName = ''; render(); }

  if (action === 'openRenameTrip') {
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    renameTripDraft = trip.trip_name;
    modal = 'renameTrip'; render();
  }

  if (action === 'removeMember') {
    const hasExpenses = e.currentTarget.dataset.hasExpenses === 'true';
    if (hasExpenses) {
      const ok = confirm(`${name} đã có chi tiêu trong trip này. Xóa thành viên sẽ XÓA LUÔN mọi chi tiêu mà ${name} đã trả. Tiếp tục?`);
      if (!ok) return;
    }
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const newMembers = parseMembers(trip.members).filter(m => m !== name);
    const tripId = activeTripId;
    const expensesToDelete = rawExpenses.filter(ex => ex.trip_id === tripId && ex.paid_by === name);
    withSaving(
      () => {
        trip.members = newMembers.join(',');
        rawExpenses = rawExpenses.filter(ex => !(ex.trip_id === tripId && ex.paid_by === name));
      },
      async () => {
        await apiPost({ action: 'updateTripMembers', trip_id: tripId, members: newMembers.join(',') });
        for (const ex of expensesToDelete) {
          await apiPost({ action: 'deleteExpense', expense_id: ex.expense_id });
        }
      }
    );
  }

  if (action === 'openAddExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const now = new Date();
    expDraft = {
      id: null,
      paidBy: trip.members[0] || '',
      amount: '', desc: '', splitWith: [],
      date: now.toISOString().slice(0, 10),
      time: nowTimeStr(),
      category: '',
    };
    modal = 'addExpense'; render();
  }

  if (action === 'editExpense') {
    const exp = rawExpenses.find(ex => ex.expense_id === id);
    expDraft = {
      id: exp.expense_id,
      paidBy: exp.paid_by,
      amount: String(exp.amount),
      desc: exp.desc,
      splitWith: parseMembers(exp.split_with),
      date: exp.date,
      time: exp.time || nowTimeStr(),
      category: exp.category || '',
    };
    modal = 'addExpense'; render();
  }

  if (action === 'deleteExpense') {
    if (!confirm('Xóa chi tiêu này? Không thể hoàn tác.')) return;
    withSaving(
      () => { rawExpenses = rawExpenses.filter(e => e.expense_id !== id); },
      () => apiPost({ action: 'deleteExpense', expense_id: id })
    );
  }

  if (action === 'deleteTrip') {
    if (!confirm('Xóa trip này? Không thể hoàn tác, dữ liệu sẽ mất với mọi người.')) return;
    const tripIdToDelete = activeTripId;
    withSaving(
      () => {
        rawTrips = rawTrips.filter(t => t.trip_id !== tripIdToDelete);
        rawExpenses = rawExpenses.filter(e => e.trip_id !== tripIdToDelete);
        activeTripId = rawTrips.length > 0 ? rawTrips[0].trip_id : null;
      },
      () => apiPost({ action: 'deleteTrip', trip_id: tripIdToDelete })
    );
  }

  if (action === 'copySummary') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip.trip_id);
    const balances = computeBalances(trip.members, expenses);
    const settlements = simplifyDebts(balances);
    let text = `Tổng kết chia tiền - ${trip.name}\n\n`;
    expenses.slice().reverse().forEach(ex => {
      text += `${ex.date}${ex.time ? ' ' + ex.time : ''} [${categoryLabel(ex.category)}] ${ex.paidBy} trả ${fmt(ex.amount)}${ex.desc ? ' cho ' + ex.desc : ''}\n`;
    });
    text += '\nSố dư từng người:\n';
    trip.members.forEach(m => {
      const bal = Math.round(balances[m] || 0);
      text += `${m}: ${bal > 0 ? '+' : ''}${fmt(bal)}\n`;
    });
    text += '\nKết quả thanh toán:\n';
    if (settlements.length === 0) text += 'Mọi người đã hòa sổ.\n';
    else settlements.forEach(s => { text += `${s.from} chuyển ${s.to}: ${fmt(s.amount)}\n`; });
    navigator.clipboard.writeText(text).then(() => showToast('Đã copy vào clipboard'));
  }
}

function renderModal() {
  let existing = document.getElementById('modalOverlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'modalOverlay';
  overlay.className = 'modal-overlay';

  if (modal === 'newTrip') {
    overlay.innerHTML = `<div class="modal">
      <h2>Tạo trip mới</h2>
      <div class="field">
        <label>Tên trip</label>
        <input id="newTripInput" placeholder="Ví dụ: Đà Lạt 2026" value="${escapeHtml(newTripName)}">
      </div>
      <div class="row" style="justify-content:flex-end;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.createTrip()">Tạo</button>
      </div>
    </div>`;
  }

  if (modal === 'renameTrip') {
    overlay.innerHTML = `<div class="modal">
      <h2>Sửa tên trip</h2>
      <div class="field">
        <label>Tên trip</label>
        <input id="renameTripInput" value="${escapeHtml(renameTripDraft)}">
      </div>
      <div class="row" style="justify-content:flex-end;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.renameTrip()">Lưu</button>
      </div>
    </div>`;
  }

  if (modal === 'addExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const isEditing = !!expDraft.id;
    overlay.innerHTML = `<div class="modal">
      <h2>${isEditing ? 'Sửa chi tiêu' : 'Thêm chi tiêu'}</h2>
      <div class="field">
        <label>Ai trả</label>
        <select id="paidBySelect">
          ${trip.members.map(m => `<option value="${escapeHtml(m)}" ${m === expDraft.paidBy ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('')}
        </select>
      </div>
      <div class="row" style="gap:8px;">
        <div class="field" style="flex:1;">
          <label>Ngày</label>
          <input id="dateInput" type="date" value="${escapeHtml(expDraft.date)}">
        </div>
        <div class="field" style="flex:1;">
          <label>Giờ</label>
          <input id="timeInput" type="time" value="${escapeHtml(expDraft.time)}">
        </div>
      </div>
      <div class="field">
        <label>Số tiền <span style="color:var(--text-muted); font-weight:400;">(đơn vị: ngàn đồng)</span></label>
        <input id="amountInput" type="number" step="any" placeholder="ví dụ 90 = 90.000đ" value="${expDraft.amount ? (parseFloat(expDraft.amount) / 1000) : ''}">
        <div style="font-size:12px; color:var(--text-muted); margin-top:4px;" id="amountPreview">${expDraft.amount ? '= ' + fmt(parseFloat(expDraft.amount)) : ''}</div>
      </div>
      <div class="field">
        <label>Mô tả <span style="color:var(--text-muted); font-weight:400;">(không bắt buộc)</span></label>
        <input id="descInput" placeholder="Ăn tối, taxi, khách sạn..." value="${escapeHtml(expDraft.desc)}">
      </div>
      <div class="field">
        <label>Loại chi tiêu</label>
        <select id="categorySelect">
          ${CATEGORIES.map(c => `<option value="${c.id}" ${c.id === expDraft.category ? 'selected' : ''}>${escapeHtml(c.label)}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Chia cho (bỏ trống = cả nhóm)</label>
        <div class="row">
          ${trip.members.map(m => `<span class="pill ${expDraft.splitWith.includes(m) ? 'active' : ''}" data-toggle-member="${escapeHtml(m)}">${escapeHtml(m)}</span>`).join('')}
        </div>
      </div>
      <div class="row" style="justify-content:flex-end; margin-top: 8px;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.submitExpense()">${isEditing ? 'Lưu thay đổi' : 'Lưu chi tiêu'}</button>
      </div>
    </div>`;
  }

  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) window.app.closeModal(); });

  if (modal === 'newTrip') {
    const inp = document.getElementById('newTripInput');
    inp.addEventListener('input', e => newTripName = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.app.createTrip(); });
    inp.focus();
  }
  if (modal === 'renameTrip') {
    const inp = document.getElementById('renameTripInput');
    inp.addEventListener('input', e => renameTripDraft = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.app.renameTrip(); });
    inp.focus();
  }
  if (modal === 'addExpense') {
    document.getElementById('paidBySelect').addEventListener('change', e => expDraft.paidBy = e.target.value);
    document.getElementById('dateInput').addEventListener('input', e => expDraft.date = e.target.value);
    document.getElementById('timeInput').addEventListener('input', e => expDraft.time = e.target.value);
    document.getElementById('amountInput').addEventListener('input', e => {
      const typed = parseFloat(e.target.value);
      expDraft.amount = isNaN(typed) ? '' : String(typed * 1000);
      const preview = document.getElementById('amountPreview');
      if (preview) preview.textContent = !isNaN(typed) && typed > 0 ? '= ' + fmt(typed * 1000) : '';
    });
    document.getElementById('descInput').addEventListener('input', e => expDraft.desc = e.target.value);
    document.getElementById('categorySelect').addEventListener('change', e => expDraft.category = e.target.value);
    overlay.querySelectorAll('[data-toggle-member]').forEach(el => {
      el.addEventListener('click', () => {
        const m = el.dataset.toggleMember;
        if (expDraft.splitWith.includes(m)) expDraft.splitWith = expDraft.splitWith.filter(x => x !== m);
        else expDraft.splitWith.push(m);
        renderModal();
      });
    });
  }
}

window.app = {
  retry() { isLoading = true; render(); refreshData(true); },

  addMember() {
    const name = memberInput.trim();
    if (!name) return;
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const currentMembers = parseMembers(trip.members);
    if (currentMembers.includes(name)) { memberInput = ''; return; }
    const newMembers = [...currentMembers, name];
    memberInput = '';
    withSaving(
      () => { trip.members = newMembers.join(','); },
      () => apiPost({ action: 'updateTripMembers', trip_id: activeTripId, members: newMembers.join(',') })
    );
  },

  closeModal() { modal = null; render(); },

  createTrip() {
    const name = newTripName.trim();
    if (!name) return;
    const id = uid();
    modal = null;
    withSaving(
      () => {
        rawTrips.push({ trip_id: id, trip_name: name, members: '' });
        activeTripId = id;
      },
      () => apiPost({ action: 'createTrip', trip_id: id, trip_name: name, members: '' })
    );
  },

  renameTrip() {
    const name = renameTripDraft.trim();
    if (!name) return;
    modal = null;
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    withSaving(
      () => { trip.trip_name = name; },
      () => apiPost({ action: 'renameTrip', trip_id: activeTripId, trip_name: name })
    );
  },

  submitExpense() {
    const amt = parseFloat(expDraft.amount);
    if (!expDraft.paidBy || !amt || amt <= 0 || !expDraft.date) {
      showToast('Điền đủ thông tin trước khi lưu');
      return;
    }
    modal = null;
    const isEditing = !!expDraft.id;
    const expenseData = {
      expense_id: isEditing ? expDraft.id : uid(),
      trip_id: activeTripId,
      paid_by: expDraft.paidBy,
      amount: amt,
      desc: expDraft.desc.trim(),
      split_with: expDraft.splitWith.join(','),
      date: expDraft.date,
      time: expDraft.time || '',
      category: expDraft.category || '',
    };

    if (isEditing) {
      withSaving(
        () => {
          const idx = rawExpenses.findIndex(e => e.expense_id === expDraft.id);
          if (idx !== -1) rawExpenses[idx] = expenseData;
        },
        () => apiPost({ action: 'editExpense', ...expenseData })
      );
    } else {
      withSaving(
        () => { rawExpenses.push(expenseData); },
        () => apiPost({ action: 'addExpense', ...expenseData })
      );
    }
  }
};

refreshData(true);
startPolling();
</script>
</body>
</html>
