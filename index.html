function setSyncDot(state) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state === 'ok' ? ' ok' : state === 'error' ? ' error' : '');
  dot.title = state === 'ok' ? 'Đã đồng bộ' : state === 'error' ? 'Lỗi đồng bộ - kiểm tra mạng' : 'Đang đồng bộ...';
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (t) t.remove();
  t = document.createElement('div');
  t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 1800);
}

function getTripObjects() {
  return rawTrips.map(t => ({
    trip_id: t.trip_id,
    name: t.trip_name,
    members: parseMembers(t.members),
    archived: t.archived === 'true' || t.archived === true,
    foreignCurrency: t.foreign_currency || '',
    exchangeRate: t.exchange_rate || '',
  }));
}
function getExpensesForTrip(trip) {
  return rawExpenses
    .filter(e => e.trip_id === trip.trip_id)
    .map(e => {
      const currency = e.currency || '';
      const amount = Number(e.amount);
      const rate = currency ? (parseFloat(trip.exchangeRate) || 0) : 1;
      return {
        id: e.expense_id,
        paidBy: e.paid_by,
        amount,
        currency,
        amountVND: currency ? amount * rate : amount,
        desc: e.desc,
        splitWith: parseMembers(e.split_with),
        date: e.date,
        time: e.time || '',
        category: e.category || '',
      };
    })
    .sort((a, b) => {
      const ak = a.date + ' ' + (a.time || '00:00');
      const bk = b.date + ' ' + (b.time || '00:00');
      return ak < bk ? 1 : -1;
    });
}

async function refreshData(showSpinner) {
  if (showSpinner) setSyncDot('loading');
  try {
    const data = await apiGet();
    rawTrips = data.trips || [];
    rawExpenses = data.expenses || [];
    if (!activeTripId && rawTrips.length > 0) {
      const firstActive = rawTrips.find(t => !(t.archived === 'true' || t.archived === true));
      activeTripId = firstActive ? firstActive.trip_id : rawTrips[0].trip_id;
    }
    loadError = null;
    setSyncDot('ok');
  } catch (err) {
    loadError = err.message;
    setSyncDot('error');
  }
  isLoading = false;
  render();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => refreshData(false), 8000); // tự đồng bộ mỗi 8 giây
}

function render() {
  const app = document.getElementById('app');

  if (!API_URL || API_URL === 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
    app.innerHTML = `<div class="setup-banner">
      Chưa cấu hình API_URL. Mở file index.html, dán link Google Apps Script Web App vào biến API_URL ở đầu phần &lt;script&gt;.
    </div>`;
    return;
  }

  if (isLoading) {
    app.innerHTML = `<p class="empty"><span class="spinner"></span> Đang tải dữ liệu...</p>`;
    return;
  }

  if (loadError) {
    app.innerHTML = `<div class="setup-banner">Không tải được dữ liệu: ${escapeHtml(loadError)}. <button onclick="window.app.retry()">Thử lại</button></div>`;
    return;
  }

  const allTrips = getTripObjects();
  const activeTrips = allTrips.filter(t => !t.archived);
  const archivedTrips = allTrips.filter(t => t.archived);
  const trip = allTrips.find(t => t.trip_id === activeTripId) || null;

  let html = '<div class="tabs">';
  activeTrips.forEach(t => {
    html += `<div class="tab ${t.trip_id === activeTripId ? 'active' : ''}" data-action="selectTrip" data-id="${t.trip_id}">${escapeHtml(t.name)}</div>`;
  });
  html += `<div class="tab add-tab" data-action="openNewTrip">+ Trip mới</div></div>`;

  if (archivedTrips.length > 0) {
    html += `<div style="margin-bottom:1.1rem;">
      <span style="font-size:12.5px; color:var(--text-muted); cursor:pointer; text-decoration:underline;" data-action="toggleArchivedList">
        ${showArchivedList ? 'Ẩn' : 'Xem'} trip đã lưu trữ (${archivedTrips.length})
      </span>`;
    if (showArchivedList) {
      html += `<div style="margin-top:8px; display:flex; flex-direction:column; gap:6px;">`;
      archivedTrips.forEach(t => {
        html += `<div class="row" style="justify-content:space-between; background:var(--surface-2); border-radius:var(--radius-sm); padding:8px 12px;">
          <span style="font-size:13.5px; cursor:pointer;" data-action="selectTrip" data-id="${t.trip_id}">${escapeHtml(t.name)}</span>
          <button class="icon-btn" data-action="unarchiveTrip" data-id="${t.trip_id}" aria-label="Bỏ lưu trữ" title="Bỏ lưu trữ">↩️</button>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  if (!trip && allTrips.length === 0) {
    html += `<p class="empty">Chưa có trip nào. Bấm "+ Trip mới" để bắt đầu.</p>`;
  }

  if (trip) {
    const expenses = getExpensesForTrip(trip);

    html += `<div class="row" style="justify-content:space-between; margin-bottom:0.6rem; padding: 0 2px;">
      <h2 style="font-size:16.5px; font-weight:600; margin:0; letter-spacing:-0.01em;">${escapeHtml(trip.name)}${trip.archived ? ' <span style="font-size:11px; color:var(--text-muted); font-weight:500;">(đã lưu trữ)</span>' : ''}</h2>
      <button class="icon-btn" data-action="openRenameTrip" aria-label="Sửa trip" title="Sửa tên / ngoại tệ">✏️</button>
    </div>`;

    html += `<div class="card">
      <div class="card-head"><span class="card-title">Thành viên</span><span style="font-size:11.5px; color:var(--text-muted); font-weight:400; text-transform:none;">Bấm tên để sửa</span></div>
      <div class="row" style="margin-bottom:12px;">`;
    if (trip.members.length === 0) {
      html += `<span style="font-size:13px; color:var(--text-muted);">Chưa có thành viên nào.</span>`;
    }
    trip.members.forEach(m => {
      const hasExpenses = expenses.some(e => e.paidBy === m);
      html += `<span class="member-tag"><span data-action="openEditMember" data-name="${escapeHtml(m)}" style="cursor:pointer;">${escapeHtml(m)}</span><button data-action="removeMember" data-name="${escapeHtml(m)}" data-has-expenses="${hasExpenses}">✕</button></span>`;
    });
    html += `</div><div class="row">
      <input id="memberInput" placeholder="Tên thành viên" value="${escapeHtml(memberInput)}" style="flex:1;" onkeydown="if(event.key==='Enter')window.app.addMember()">
      <button onclick="window.app.addMember()">Thêm</button>
    </div></div>`;

    html += `<div class="card">
      <div class="card-head">
        <span class="card-title">Chi tiêu · ${expenses.length}</span>
        <button class="primary" ${trip.members.length === 0 ? 'disabled' : ''} data-action="openAddExpense">+ Thêm chi tiêu</button>
      </div>`;

    if (trip.members.length === 0) {
      html += `<p class="empty">Thêm thành viên trước khi ghi chi tiêu.</p>`;
    } else if (expenses.length === 0) {
      html += `<p class="empty">Chưa có chi tiêu nào.</p>`;
    } else {
      html += `<div class="row" style="gap:8px; margin-bottom:12px;">
        <select id="filterPerson" style="flex:1; min-width:0; height:34px; font-size:13px;">
          <option value="">Tất cả người trả</option>
          ${trip.members.map(m => `<option value="${escapeHtml(m)}" ${expenseFilter.person === m ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('')}
        </select>
        <select id="filterCategory" style="flex:1; min-width:0; height:34px; font-size:13px;">
          <option value="__all__">Tất cả loại</option>
          ${CATEGORIES.map(c => `<option value="${c.id || '__none__'}" ${expenseFilter.category === (c.id || '__none__') ? 'selected' : ''}>${escapeHtml(c.label)}</option>`).join('')}
        </select>
      </div>`;

      const filtered = expenses.filter(e => {
        if (expenseFilter.person && e.paidBy !== expenseFilter.person) return false;
        if (expenseFilter.category) {
          const wantNone = expenseFilter.category === '__none__';
          if (wantNone ? e.category : e.category !== expenseFilter.category) return false;
        }
        return true;
      });

      if (filtered.length === 0) {
        html += `<p class="empty">Không có chi tiêu khớp bộ lọc.</p>`;
      } else {
        let filteredTotal = 0;
        filtered.forEach(e => {
          filteredTotal += e.amountVND;
          const isForeign = !!e.currency;
          html += `<div class="expense-row">
            <div class="expense-main">
              <span class="cat-badge" style="${categoryBadgeStyle(e.category)}">${escapeHtml(categoryLabel(e.category))}</span><strong>${escapeHtml(e.paidBy)}</strong>${e.desc ? ' trả cho ' + escapeHtml(e.desc) : ' đã trả'}
              <div class="expense-meta">${escapeHtml(e.date)}${e.time ? ' · ' + escapeHtml(e.time) : ''} · ${e.category === 'fund' ? 'góp vào quỹ chung' : 'chia ' + (e.splitWith.length > 0 ? e.splitWith.map(escapeHtml).join(', ') : 'cả nhóm')}</div>
            </div>
            <div class="row" style="gap:0; flex-wrap:nowrap;">
              <span class="amount">${isForeign
                ? `${e.amount.toLocaleString('vi-VN')}${currencySymbol(e.currency)}<span style="display:block; font-size:11px; color:var(--text-muted); font-weight:400; text-align:right;">≈ ${fmt(e.amountVND)}</span>`
                : fmt(e.amountVND)}</span>
              <div class="expense-actions">
                <button class="icon-btn" data-action="editExpense" data-id="${e.id}" aria-label="Sửa">✏️</button>
                <button class="icon-btn" data-action="deleteExpense" data-id="${e.id}" aria-label="Xóa">🗑</button>
              </div>
            </div>
          </div>`;
        });
        const isFiltered = expenseFilter.person || expenseFilter.category;
        html += `<div class="total-line">${isFiltered ? 'Tổng (đã lọc)' : 'Tổng chi'} <strong style="color:var(--text-primary)">${fmt(filteredTotal)}</strong></div>`;
      }
    }
    html += `</div>`;

    if (trip.members.length > 0 && expenses.length > 0) {
      html += renderCategoryChart(expenses);
      html += renderDailyChart(expenses);
    }

    if (trip.members.length > 0) {
      const rawBalances = computeBalances(trip.members, expenses);
      const { peopleBalances } = splitCashFundBalance(rawBalances);
      const hasCashFund = expenses.some(e => e.category === 'fund' || e.paidBy === CASH_FUND_NAME);
      const cashFundRemaining = computeCashFundRemaining(expenses);
      const settlements = simplifyDebts(peopleBalances);

      const usage = computeUsage(trip.members, expenses);
      const paid = computePaid(trip.members, expenses);

      html += `<div class="card">
        <div class="card-head"><span class="card-title">Tổng quan từng người</span></div>
        <div class="overview-head-row">
          <span></span>
          <span class="overview-head-label">Đã chi</span>
          <span class="overview-head-label">Đã dùng</span>
          <span class="overview-head-label">Số dư</span>
        </div>`;
      trip.members.forEach(m => {
        const bal = Math.round(peopleBalances[m] || 0);
        const cls = bal > 100 ? 'balance-pos' : bal < -100 ? 'balance-neg' : '';
        const sign = bal > 0 ? '+' : '';
        const note = bal > 100 ? 'sẽ nhận lại' : bal < -100 ? 'cần trả thêm' : 'đã hòa sổ';
        html += `<div class="overview-row">
          <span class="balance-name">${escapeHtml(m)}</span>
          <span class="overview-val">${fmt(paid[m] || 0)}</span>
          <span class="overview-val">${fmt(usage[m] || 0)}</span>
          <span class="overview-val ${cls}" style="font-weight:600;">${sign}${fmt(bal)}</span>
        </div>
        <div style="font-size:11px; color:var(--text-muted); text-align:right; margin-top:-4px; margin-bottom:4px;">${note}</div>`;
      });
      html += `<div style="font-size:11.5px; color:var(--text-muted); margin-top:6px; padding-top:8px; border-top:1px solid var(--border);">Đã chi − Đã dùng = Số dư. "Đã dùng" không tính tiền góp quỹ.</div>`;
      html += `</div>`;

      if (hasCashFund) {
        html += `<div class="card">
          <div class="card-head"><span class="card-title">💰 Quỹ tiền mặt chung</span></div>`;
        cashFundRemaining.forEach(r => {
          const cls = r.remaining >= 0 ? 'balance-pos' : 'balance-neg';
          const display = r.currency ? fmtForeign(r.remaining, r.currency) : fmt(r.remaining);
          html += `<div class="balance-row">
            <span class="balance-name">Còn lại (${escapeHtml(r.label)})</span>
            <span class="balance-amt ${cls}">${display}</span>
          </div>`;
        });
        html += `</div>`;
      }

      html += `<div class="card">
        <div class="card-head">
          <span class="card-title">Kết quả chia tiền</span>
          <div class="row" style="gap:6px;">
            <button class="icon-btn" data-action="exportCsv" aria-label="Xuất CSV" title="Xuất CSV">⬇️</button>
            <button class="icon-btn" data-action="exportImage" aria-label="Xuất ảnh tổng kết" title="Xuất ảnh tổng kết">🖼️</button>
            <button data-action="copySummary">📋 Copy để gửi</button>
          </div>
        </div>`;
      if (settlements.length === 0) {
        html += `<p class="empty">Mọi người đã hòa sổ, không cần chuyển tiền.</p>`;
      } else {
        settlements.forEach(s => {
          html += `<div class="settlement-row"><strong>${escapeHtml(s.from)}</strong> <span class="settlement-arrow">→</span> <strong>${escapeHtml(s.to)}</strong><span class="spacer"></span><strong>${fmt(s.amount)}</strong></div>`;
        });
      }
      html += `</div>`;
    }

    html += `<div class="row" style="justify-content:space-between; margin-top:4px;">
      <button class="danger-link" data-action="deleteTrip">Xóa trip này</button>
      ${trip.archived
        ? `<button style="font-size:13px; padding:6px 0; border:none; background:none; color:var(--text-secondary); cursor:pointer;" data-action="unarchiveTrip" data-id="${trip.trip_id}">Bỏ lưu trữ</button>`
        : `<button style="font-size:13px; padding:6px 0; border:none; background:none; color:var(--text-secondary); cursor:pointer;" data-action="archiveTrip" data-id="${trip.trip_id}">Lưu trữ trip</button>`
      }
    </div>`;
  }

  app.innerHTML = html;

  app.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleAction));
  const mi = document.getElementById('memberInput');
  if (mi) mi.addEventListener('input', e => { memberInput = e.target.value; });

  const fp = document.getElementById('filterPerson');
  if (fp) fp.addEventListener('change', e => { expenseFilter.person = e.target.value; render(); });
  const fc = document.getElementById('filterCategory');
  if (fc) fc.addEventListener('change', e => {
    expenseFilter.category = e.target.value === '__all__' ? '' : e.target.value;
    render();
  });

  const existingOverlay = document.getElementById('modalOverlay');
  if (existingOverlay) existingOverlay.remove();
  if (modal) renderModal();
}

// Optimistic update: áp dụng thay đổi vào state cục bộ NGAY, render ngay,
// rồi mới gửi request lên server ở dưới nền. Nếu lỗi, hoàn tác lại bằng snapshot.
async function withSaving(applyLocal, sendRequest) {
  const snapshotTrips = JSON.parse(JSON.stringify(rawTrips));
  const snapshotExpenses = JSON.parse(JSON.stringify(rawExpenses));

  if (applyLocal) applyLocal();
  render();
  setSyncDot('loading');

  try {
    await sendRequest();
    setSyncDot('ok');
    // Đồng bộ lại nền để lấy đúng dữ liệu thật từ Sheet (không hiện loading, không chặn UI)
    refreshData(false);
  } catch (err) {
    rawTrips = snapshotTrips;
    rawExpenses = snapshotExpenses;
    showToast('Lỗi đồng bộ, đã hoàn tác: ' + err.message);
    setSyncDot('error');
    render();
  }
}

function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;
  const name = e.currentTarget.dataset.name;

  if (action === 'selectTrip') { activeTripId = id; expenseFilter = { person: '', category: '' }; render(); }
  if (action === 'openNewTrip') { modal = 'newTrip'; newTripName = ''; render(); }

  if (action === 'openRenameTrip') {
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    renameTripDraft = trip.trip_name;
    renameTripUseForeign = !!trip.foreign_currency;
    const isKnownCurrency = CURRENCIES.some(c => c.code === trip.foreign_currency);
    if (trip.foreign_currency && !isKnownCurrency) {
      renameTripCurrency = '__custom__';
      renameTripCustomCurrency = trip.foreign_currency;
    } else {
      renameTripCurrency = trip.foreign_currency || 'USD';
      renameTripCustomCurrency = '';
    }
    renameTripRate = trip.exchange_rate ? String(trip.exchange_rate) : '';
    modal = 'renameTrip'; render();
  }

  if (action === 'toggleArchivedList') {
    showArchivedList = !showArchivedList; render();
  }

  if (action === 'archiveTrip') {
    const trip = rawTrips.find(t => t.trip_id === id);
    withSaving(
      () => { trip.archived = 'true'; },
      () => apiPost({ action: 'setTripArchived', trip_id: id, archived: true })
    );
    showToast('Đã lưu trữ trip');
  }

  if (action === 'unarchiveTrip') {
    const trip = rawTrips.find(t => t.trip_id === id);
    withSaving(
      () => { trip.archived = ''; },
      () => apiPost({ action: 'setTripArchived', trip_id: id, archived: false })
    );
    showToast('Đã bỏ lưu trữ');
  }

  if (action === 'openEditMember') {
    editMemberDraft = { oldName: name, newName: name };
    modal = 'editMember'; render();
  }

  if (action === 'removeMember') {
    const hasExpenses = e.currentTarget.dataset.hasExpenses === 'true';
    if (hasExpenses) {
      const ok = confirm(`${name} đã có chi tiêu trong trip này. Xóa thành viên sẽ XÓA LUÔN mọi chi tiêu mà ${name} đã trả. Tiếp tục?`);
      if (!ok) return;
    }
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const newMembers = parseMembers(trip.members).filter(m => m !== name);
    const tripId = activeTripId;
    const expensesToDelete = rawExpenses.filter(ex => ex.trip_id === tripId && ex.paid_by === name);
    withSaving(
      () => {
        trip.members = newMembers.join(',');
        rawExpenses = rawExpenses.filter(ex => !(ex.trip_id === tripId && ex.paid_by === name));
      },
      async () => {
        await apiPost({ action: 'updateTripMembers', trip_id: tripId, members: newMembers.join(',') });
        for (const ex of expensesToDelete) {
          await apiPost({ action: 'deleteExpense', expense_id: ex.expense_id });
        }
      }
    );
  }

  if (action === 'openAddExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const now = new Date();
    expDraft = {
      id: null,
      paidBy: trip.members[0] || '',
      amount: '', currency: trip.foreignCurrency || '', amountInputRaw: '', desc: '', splitWith: [],
      date: now.toISOString().slice(0, 10),
      time: nowTimeStr(),
      category: '',
    };
    modal = 'addExpense'; render();
  }

  if (action === 'editExpense') {
    const exp = rawExpenses.find(ex => ex.expense_id === id);
    const currency = exp.currency || '';
    const amountNum = Number(exp.amount);
    expDraft = {
      id: exp.expense_id,
      paidBy: exp.paid_by,
      amount: String(exp.amount),
      currency,
      amountInputRaw: currency ? String(amountNum) : String(amountNum / 1000),
      desc: exp.desc,
      splitWith: parseMembers(exp.split_with),
      date: exp.date,
      time: exp.time || nowTimeStr(),
      category: exp.category || '',
    };
    modal = 'addExpense'; render();
  }

  if (action === 'deleteExpense') {
    if (!confirm('Xóa chi tiêu này? Không thể hoàn tác.')) return;
    withSaving(
      () => { rawExpenses = rawExpenses.filter(e => e.expense_id !== id); },
      () => apiPost({ action: 'deleteExpense', expense_id: id })
    );
  }

  if (action === 'deleteTrip') {
    if (!confirm('Xóa trip này? Không thể hoàn tác, dữ liệu sẽ mất với mọi người.')) return;
    const tripIdToDelete = activeTripId;
    withSaving(
      () => {
        rawTrips = rawTrips.filter(t => t.trip_id !== tripIdToDelete);
        rawExpenses = rawExpenses.filter(e => e.trip_id !== tripIdToDelete);
        activeTripId = rawTrips.length > 0 ? rawTrips[0].trip_id : null;
      },
      () => apiPost({ action: 'deleteTrip', trip_id: tripIdToDelete })
    );
  }

  if (action === 'exportImage') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip);
    const rawBalances = computeBalances(trip.members, expenses);
    const { peopleBalances } = splitCashFundBalance(rawBalances);
    const hasCashFund = expenses.some(e => e.category === 'fund' || e.paidBy === CASH_FUND_NAME);
    const cashFundRemaining = computeCashFundRemaining(expenses);
    const settlements = simplifyDebts(peopleBalances);
    generateSummaryImage(trip, expenses, peopleBalances, settlements, hasCashFund ? cashFundRemaining : null);
  }

  if (action === 'exportCsv') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip);
    const rawBalances = computeBalances(trip.members, expenses);
    const { peopleBalances } = splitCashFundBalance(rawBalances);
    const hasCashFund = expenses.some(e => e.category === 'fund' || e.paidBy === CASH_FUND_NAME);
    const cashFundRemaining = computeCashFundRemaining(expenses);
    const settlements = simplifyDebts(peopleBalances);

    function csvEscape(val) {
      const s = String(val ?? '');
      if (s.includes(',') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    let rows = [];
    rows.push(['Ngày', 'Giờ', 'Loại', 'Người trả', 'Mô tả', 'Số tiền gốc', 'Đơn vị', 'Số tiền (VNĐ)', 'Chia cho']);
    expenses.slice().reverse().forEach(ex => {
      const isFund = ex.category === 'fund';
      rows.push([
        ex.date, ex.time || '', categoryLabel(ex.category), ex.paidBy,
        ex.desc || '', ex.amount, ex.currency || 'VNĐ', Math.round(ex.amountVND),
        isFund ? 'Không chia (góp quỹ)' : (ex.splitWith.length > 0 ? ex.splitWith.join(' | ') : 'Cả nhóm'),
      ]);
    });
    rows.push([]);
    rows.push(['Số dư từng người']);
    trip.members.forEach(m => {
      rows.push([m, Math.round(peopleBalances[m] || 0)]);
    });
    if (hasCashFund) {
      rows.push([]);
      rows.push(['Quỹ tiền mặt chung']);
      cashFundRemaining.forEach(r => {
        rows.push([`Còn lại (${r.label})`, r.currency ? r.remaining : Math.round(r.remaining)]);
      });
    }
    rows.push([]);
    rows.push(['Kết quả thanh toán']);
    if (settlements.length === 0) {
      rows.push(['Mọi người đã hòa sổ']);
    } else {
      settlements.forEach(s => rows.push([s.from, 'chuyển cho', s.to, Math.round(s.amount)]));
    }

    const csvContent = rows.map(r => r.map(csvEscape).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${trip.name.replace(/[^\w\u00C0-\u1EF9 ]/g, '')}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Đã tải file CSV');
  }

  if (action === 'copySummary') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const expenses = getExpensesForTrip(trip);
    const rawBalances = computeBalances(trip.members, expenses);
    const { peopleBalances } = splitCashFundBalance(rawBalances);
    const hasCashFund = expenses.some(e => e.category === 'fund' || e.paidBy === CASH_FUND_NAME);
    const cashFundRemaining = computeCashFundRemaining(expenses);
    const settlements = simplifyDebts(peopleBalances);
    let text = `Tổng kết chia tiền - ${trip.name}\n\n`;
    expenses.slice().reverse().forEach(ex => {
      const amountText = ex.currency
        ? `${ex.amount.toLocaleString('vi-VN')}${currencySymbol(ex.currency)} (≈${fmt(ex.amountVND)})`
        : fmt(ex.amountVND);
      text += `${ex.date}${ex.time ? ' ' + ex.time : ''} [${categoryLabel(ex.category)}] ${ex.paidBy} trả ${amountText}${ex.desc ? ' cho ' + ex.desc : ''}\n`;
    });
    text += '\nSố dư từng người:\n';
    trip.members.forEach(m => {
      const bal = Math.round(peopleBalances[m] || 0);
      text += `${m}: ${bal > 0 ? '+' : ''}${fmt(bal)}\n`;
    });
    if (hasCashFund) {
      text += '\nQuỹ tiền mặt chung còn lại:\n';
      cashFundRemaining.forEach(r => {
        const display = r.currency ? fmtForeign(r.remaining, r.currency) : fmt(r.remaining);
        text += `${r.label}: ${display}\n`;
      });
    }
    text += '\nKết quả thanh toán:\n';
    if (settlements.length === 0) text += 'Mọi người đã hòa sổ.\n';
    else settlements.forEach(s => { text += `${s.from} chuyển ${s.to}: ${fmt(s.amount)}\n`; });
    navigator.clipboard.writeText(text).then(() => showToast('Đã copy vào clipboard'));
  }
}

function renderModal() {
  let existing = document.getElementById('modalOverlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'modalOverlay';
  overlay.className = 'modal-overlay';

  if (modal === 'newTrip') {
    overlay.innerHTML = `<div class="modal">
      <h2>Tạo trip mới</h2>
      <div class="field">
        <label>Tên trip</label>
        <input id="newTripInput" placeholder="Ví dụ: Đà Lạt 2026" value="${escapeHtml(newTripName)}">
      </div>
      <div class="field">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" id="useForeignCheckbox" ${newTripUseForeign ? 'checked' : ''} style="width:auto; height:auto;">
          Trip này có chi tiêu bằng ngoại tệ
        </label>
      </div>
      ${newTripUseForeign ? `
      <div class="row" style="gap:8px;">
        <div class="field" style="flex:1;">
          <label>Đơn vị ngoại tệ</label>
          <select id="newTripCurrencySelect">
            ${CURRENCIES.map(c => `<option value="${c.code}" ${c.code === newTripCurrency ? 'selected' : ''}>${c.code} (${c.symbol})</option>`).join('')}
            <option value="__custom__" ${newTripCurrency === '__custom__' ? 'selected' : ''}>Khác (tự nhập)...</option>
          </select>
        </div>
        <div class="field" style="flex:1;">
          <label>1 ${escapeHtml(newTripCurrency === '__custom__' ? (newTripCustomCurrency || '?') : newTripCurrency)} = ? đ</label>
          <input id="newTripRateInput" type="number" step="any" placeholder="ví dụ 165" value="${escapeHtml(newTripRate)}">
        </div>
      </div>
      ${newTripCurrency === '__custom__' ? `
      <div class="field">
        <label>Mã/ký hiệu tiền tệ</label>
        <input id="newTripCustomCurrencyInput" placeholder="ví dụ LAK, MYR, Kip..." value="${escapeHtml(newTripCustomCurrency)}">
      </div>` : ''}
      <div style="font-size:12px; color:var(--text-muted); margin-top:-6px; margin-bottom:12px;">
        Tỷ giá áp dụng chung cho cả trip, có thể sửa lại sau trong phần sửa tên trip.
      </div>` : ''}
      <div class="row" style="justify-content:flex-end;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.createTrip()">Tạo</button>
      </div>
    </div>`;
  }

  if (modal === 'renameTrip') {
    overlay.innerHTML = `<div class="modal">
      <h2>Sửa trip</h2>
      <div class="field">
        <label>Tên trip</label>
        <input id="renameTripInput" value="${escapeHtml(renameTripDraft)}">
      </div>
      <div class="field">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" id="useForeignCheckbox2" ${renameTripUseForeign ? 'checked' : ''} style="width:auto; height:auto;">
          Trip này có chi tiêu bằng ngoại tệ
        </label>
      </div>
      ${renameTripUseForeign ? `
      <div class="row" style="gap:8px;">
        <div class="field" style="flex:1;">
          <label>Đơn vị ngoại tệ</label>
          <select id="renameTripCurrencySelect">
            ${CURRENCIES.map(c => `<option value="${c.code}" ${c.code === renameTripCurrency ? 'selected' : ''}>${c.code} (${c.symbol})</option>`).join('')}
            <option value="__custom__" ${renameTripCurrency === '__custom__' ? 'selected' : ''}>Khác (tự nhập)...</option>
          </select>
        </div>
        <div class="field" style="flex:1;">
          <label>1 ${escapeHtml(renameTripCurrency === '__custom__' ? (renameTripCustomCurrency || '?') : renameTripCurrency)} = ? đ</label>
          <input id="renameTripRateInput" type="number" step="any" placeholder="ví dụ 165" value="${escapeHtml(renameTripRate)}">
        </div>
      </div>
      ${renameTripCurrency === '__custom__' ? `
      <div class="field">
        <label>Mã/ký hiệu tiền tệ</label>
        <input id="renameTripCustomCurrencyInput" placeholder="ví dụ LAK, MYR, Kip..." value="${escapeHtml(renameTripCustomCurrency)}">
      </div>` : ''}
      <div style="font-size:12px; color:var(--text-muted); margin-top:-6px; margin-bottom:12px;">
        Đổi tỷ giá sẽ áp dụng lại cho mọi chi tiêu ngoại tệ đã ghi trong trip này.
      </div>` : ''}
      <div class="row" style="justify-content:flex-end;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.renameTrip()">Lưu</button>
      </div>
    </div>`;
  }

  if (modal === 'editMember') {
    overlay.innerHTML = `<div class="modal">
      <h2>Sửa tên thành viên</h2>
      <div class="field">
        <label>Tên</label>
        <input id="editMemberInput" value="${escapeHtml(editMemberDraft.newName)}">
        <div style="font-size:12px; color:var(--text-muted); margin-top:6px;">
          Mọi chi tiêu trước đây của <strong>${escapeHtml(editMemberDraft.oldName)}</strong> sẽ tự cập nhật theo tên mới.
        </div>
      </div>
      <div class="row" style="justify-content:flex-end;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.renameMember()">Lưu</button>
      </div>
    </div>`;
  }

  if (modal === 'addExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    const isEditing = !!expDraft.id;
    const hasForeign = !!trip.foreignCurrency;
    const isForeign = expDraft.currency === trip.foreignCurrency && hasForeign;
    overlay.innerHTML = `<div class="modal">
      <h2>${isEditing ? 'Sửa chi tiêu' : 'Thêm chi tiêu'}</h2>
      <div class="field">
        <label>Ai trả</label>
        <select id="paidBySelect">
          ${trip.members.map(m => `<option value="${escapeHtml(m)}" ${m === expDraft.paidBy ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('')}
          <option value="${CASH_FUND_NAME}" ${expDraft.paidBy === CASH_FUND_NAME ? 'selected' : ''}>💰 ${CASH_FUND_NAME} (tiền mặt)</option>
        </select>
      </div>
      <div class="row" style="gap:8px;">
        <div class="field" style="flex:1;">
          <label>Ngày</label>
          <input id="dateInput" type="date" value="${escapeHtml(expDraft.date)}">
        </div>
        <div class="field" style="flex:1;">
          <label>Giờ</label>
          <input id="timeInput" type="time" value="${escapeHtml(expDraft.time)}">
        </div>
      </div>
      ${hasForeign ? `
      <div class="field">
        <label>Đơn vị tiền</label>
        <div class="row">
          <span class="pill ${!isForeign ? 'active' : ''}" data-set-currency="">VNĐ</span>
          <span class="pill ${isForeign ? 'active' : ''}" data-set-currency="${escapeHtml(trip.foreignCurrency)}">${escapeHtml(trip.foreignCurrency)} (${currencySymbol(trip.foreignCurrency)})</span>
        </div>
      </div>` : ''}
      <div class="field">
        <label>Số tiền ${isForeign
          ? `<span style="color:var(--text-muted); font-weight:400;">(đơn vị: ${escapeHtml(trip.foreignCurrency)})</span>`
          : `<span style="color:var(--text-muted); font-weight:400;">(đơn vị: ngàn đồng)</span>`}
        </label>
        <input id="amountInput" type="number" step="any" placeholder="${isForeign ? 'ví dụ 5000' : 'ví dụ 90 = 90.000đ'}" value="${expDraft.amountInputRaw}">
        <div style="font-size:12px; color:var(--text-muted); margin-top:4px;" id="amountPreview">${expDraft.amount ? '= ' + fmt(isForeign ? parseFloat(expDraft.amount) * (parseFloat(trip.exchangeRate) || 0) : parseFloat(expDraft.amount)) : ''}</div>
      </div>
      <div class="field">
        <label>Mô tả <span style="color:var(--text-muted); font-weight:400;">(không bắt buộc)</span></label>
        <input id="descInput" placeholder="Ăn tối, taxi, khách sạn..." value="${escapeHtml(expDraft.desc)}">
      </div>
      <div class="field">
        <label>Loại chi tiêu</label>
        <select id="categorySelect">
          ${CATEGORIES.map(c => `<option value="${c.id}" ${c.id === expDraft.category ? 'selected' : ''}>${escapeHtml(c.label)}</option>`).join('')}
        </select>
      </div>
      ${expDraft.category === 'fund' ? `
      <div style="font-size:12px; color:var(--text-muted); margin:-6px 0 14px;">
        Khoản góp quỹ chỉ cộng vào số dư của người góp, không chia cho ai.
      </div>` : `
      <div class="field">
        <label>Chia cho (bỏ trống = cả nhóm)</label>
        <div class="row">
          ${trip.members.map(m => `<span class="pill ${expDraft.splitWith.includes(m) ? 'active' : ''}" data-toggle-member="${escapeHtml(m)}">${escapeHtml(m)}</span>`).join('')}
        </div>
      </div>`}
      <div class="row" style="justify-content:flex-end; margin-top: 8px;">
        <button onclick="window.app.closeModal()">Hủy</button>
        <button class="primary" onclick="window.app.submitExpense()">${isEditing ? 'Lưu thay đổi' : 'Lưu chi tiêu'}</button>
      </div>
    </div>`;
  }

  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) window.app.closeModal(); });

  if (modal === 'newTrip') {
    const inp = document.getElementById('newTripInput');
    inp.addEventListener('input', e => newTripName = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.app.createTrip(); });
    inp.focus();

    const useForeignCb = document.getElementById('useForeignCheckbox');
    if (useForeignCb) useForeignCb.addEventListener('change', e => { newTripUseForeign = e.target.checked; renderModal(); });
    const curSelect = document.getElementById('newTripCurrencySelect');
    if (curSelect) curSelect.addEventListener('change', e => { newTripCurrency = e.target.value; renderModal(); });
    const rateInput = document.getElementById('newTripRateInput');
    if (rateInput) rateInput.addEventListener('input', e => newTripRate = e.target.value);
    const customCurInput = document.getElementById('newTripCustomCurrencyInput');
    if (customCurInput) {
      customCurInput.addEventListener('input', e => {
        newTripCustomCurrency = e.target.value.trim().toUpperCase();
        const labelEl = rateInput && rateInput.closest('.field').querySelector('label');
        if (labelEl) labelEl.innerHTML = `1 ${newTripCustomCurrency || '?'} = ? đ`;
      });
      customCurInput.focus();
    }
  }
  if (modal === 'renameTrip') {
    const inp = document.getElementById('renameTripInput');
    inp.addEventListener('input', e => renameTripDraft = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.app.renameTrip(); });
    inp.focus();

    const useForeignCb2 = document.getElementById('useForeignCheckbox2');
    if (useForeignCb2) useForeignCb2.addEventListener('change', e => { renameTripUseForeign = e.target.checked; renderModal(); });
    const curSelect2 = document.getElementById('renameTripCurrencySelect');
    if (curSelect2) curSelect2.addEventListener('change', e => { renameTripCurrency = e.target.value; renderModal(); });
    const rateInput2 = document.getElementById('renameTripRateInput');
    if (rateInput2) rateInput2.addEventListener('input', e => renameTripRate = e.target.value);
    const customCurInput2 = document.getElementById('renameTripCustomCurrencyInput');
    if (customCurInput2) {
      customCurInput2.addEventListener('input', e => {
        renameTripCustomCurrency = e.target.value.trim().toUpperCase();
        const labelEl = rateInput2 && rateInput2.closest('.field').querySelector('label');
        if (labelEl) labelEl.innerHTML = `1 ${renameTripCustomCurrency || '?'} = ? đ`;
      });
      customCurInput2.focus();
    }
  }
  if (modal === 'editMember') {
    const inp = document.getElementById('editMemberInput');
    inp.addEventListener('input', e => editMemberDraft.newName = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.app.renameMember(); });
    inp.focus();
    inp.select();
  }
  if (modal === 'addExpense') {
    const trip = getTripObjects().find(t => t.trip_id === activeTripId);
    document.getElementById('paidBySelect').addEventListener('change', e => expDraft.paidBy = e.target.value);
    document.getElementById('dateInput').addEventListener('input', e => expDraft.date = e.target.value);
    document.getElementById('timeInput').addEventListener('input', e => expDraft.time = e.target.value);

    function updateAmountFromRaw() {
      const isForeign = expDraft.currency === trip.foreignCurrency && !!trip.foreignCurrency;
      const typed = parseFloat(expDraft.amountInputRaw);
      if (isNaN(typed)) {
        expDraft.amount = '';
      } else {
        expDraft.amount = isForeign ? String(typed) : String(typed * 1000);
      }
      const preview = document.getElementById('amountPreview');
      if (preview) {
        if (isNaN(typed) || typed <= 0) {
          preview.textContent = '';
        } else {
          const vnd = isForeign ? typed * (parseFloat(trip.exchangeRate) || 0) : typed * 1000;
          preview.textContent = '= ' + fmt(vnd);
        }
      }
    }

    document.getElementById('amountInput').addEventListener('input', e => {
      expDraft.amountInputRaw = e.target.value;
      updateAmountFromRaw();
    });

    overlay.querySelectorAll('[data-set-currency]').forEach(el => {
      el.addEventListener('click', () => {
        expDraft.currency = el.dataset.setCurrency;
        renderModal();
      });
    });

    document.getElementById('descInput').addEventListener('input', e => expDraft.desc = e.target.value);
    document.getElementById('categorySelect').addEventListener('change', e => { expDraft.category = e.target.value; renderModal(); });
    overlay.querySelectorAll('[data-toggle-member]').forEach(el => {
      el.addEventListener('click', () => {
        const m = el.dataset.toggleMember;
        if (expDraft.splitWith.includes(m)) expDraft.splitWith = expDraft.splitWith.filter(x => x !== m);
        else expDraft.splitWith.push(m);
        renderModal();
      });
    });
  }
}

window.app = {
  retry() { isLoading = true; render(); refreshData(true); },

  openHelp() {
    const overlay = document.createElement('div');
    overlay.id = 'helpOverlay';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" style="max-width:480px;">
      <div class="row" style="justify-content:space-between; align-items:flex-start; margin-bottom:4px;">
        <h2 style="margin:0;">Hướng dẫn sử dụng</h2>
        <button class="icon-btn" onclick="window.app.closeHelp()" aria-label="Đóng">✕</button>
      </div>

      <div style="font-size:13.5px; line-height:1.6; color:var(--text-primary);">

        <p style="font-weight:600; margin-bottom:4px;">1. Bắt đầu</p>
        <p style="margin-top:0; color:var(--text-secondary);">
          Lần đầu mở app, bạn đặt 1 tên riêng (không trùng người khác) để tách dữ liệu của bạn khỏi người khác cùng dùng app này. App tự nhớ tên đó cho các lần mở sau, không cần nhập lại.
        </p>

        <p style="font-weight:600; margin-bottom:4px;">2. Tạo trip và ghi chi tiêu</p>
        <p style="margin-top:0; color:var(--text-secondary);">
          Bấm "+ Trip mới" → đặt tên trip → thêm thành viên. Mỗi lần chi tiêu, bấm "+ Thêm chi tiêu", chọn ai trả, số tiền (nhập theo <strong>ngàn đồng</strong>, vd gõ 90 = 90.000đ), và chia cho ai (bỏ trống = chia đều cả nhóm).
        </p>

        <p style="font-weight:600; margin-bottom:4px;">3. Xem kết quả</p>
        <p style="margin-top:0; color:var(--text-secondary);">
          App tự tính "Số dư từng người" và "Kết quả chia tiền" — số giao dịch ít nhất để mọi người hòa sổ. Bấm 📋 để copy gửi nhóm, ⬇️ để tải CSV, 🖼️ để tải ảnh tổng kết đẹp.
        </p>

        <p style="font-weight:600; margin-bottom:4px;">4. Chi tiêu bằng ngoại tệ</p>
        <p style="margin-top:0; color:var(--text-secondary);">
          Khi tạo trip, tick "Có chi tiêu bằng ngoại tệ", chọn đơn vị và nhập tỷ giá quy đổi sang VNĐ. Khi ghi chi tiêu, chọn đúng đơn vị (VNĐ hoặc ngoại tệ) — app tự quy đổi và vẫn hiện rõ số tiền gốc để đối chiếu.
        </p>

        <p style="font-weight:600; margin-bottom:4px;">5. Quỹ tiền mặt chung</p>
        <p style="margin-top:0; color:var(--text-secondary);">
          Khi ai đó góp tiền vào quỹ chung của cả nhóm, chọn loại chi tiêu "Góp quỹ". Khi chi tiêu bằng tiền mặt từ quỹ, chọn "💰 Quỹ chung" ở mục "Ai trả". App tự tính số tiền mặt còn lại trong quỹ, tách riêng khỏi công nợ giữa mọi người.
        </p>

        <p style="font-weight:600; margin-bottom:4px;">6. Khác</p>
        <p style="margin-top:0; color:var(--text-secondary);">
          Bấm tên thành viên để sửa tên · bấm ✏️ trên chi tiêu để sửa lại · "Lưu trữ trip" để ẩn trip cũ khỏi danh sách chính mà không mất dữ liệu · bộ lọc theo người/loại chi tiêu nằm ngay trên danh sách chi tiêu.
        </p>

      </div>

      <div class="row" style="justify-content:flex-end; margin-top:14px;">
        <button class="primary" onclick="window.app.closeHelp()">Đã hiểu</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) window.app.closeHelp(); });
  },

  closeHelp() {
    const overlay = document.getElementById('helpOverlay');
    if (overlay) overlay.remove();
  },

  addMember() {
    const name = memberInput.trim();
    if (!name) return;
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const currentMembers = parseMembers(trip.members);
    if (currentMembers.includes(name)) { memberInput = ''; return; }
    const newMembers = [...currentMembers, name];
    memberInput = '';
    withSaving(
      () => { trip.members = newMembers.join(','); },
      () => apiPost({ action: 'updateTripMembers', trip_id: activeTripId, members: newMembers.join(',') })
    );
  },

  closeModal() { modal = null; render(); },

  createTrip() {
    const name = newTripName.trim();
    if (!name) return;
    if (newTripUseForeign && newTripCurrency === '__custom__' && !newTripCustomCurrency.trim()) {
      showToast('Nhập mã/ký hiệu tiền tệ trước khi tạo trip');
      return;
    }
    const id = uid();
    const resolvedCurrency = newTripCurrency === '__custom__' ? newTripCustomCurrency.trim().toUpperCase() : newTripCurrency;
    const foreignCurrency = newTripUseForeign ? resolvedCurrency : '';
    const exchangeRate = newTripUseForeign ? (parseFloat(newTripRate) || '') : '';
    modal = null;
    withSaving(
      () => {
        rawTrips.push({ trip_id: id, trip_name: name, members: '', foreign_currency: foreignCurrency, exchange_rate: exchangeRate });
        activeTripId = id;
      },
      () => apiPost({ action: 'createTrip', trip_id: id, trip_name: name, members: '', foreign_currency: foreignCurrency, exchange_rate: exchangeRate })
    );
    newTripUseForeign = false;
    newTripCurrency = 'USD';
    newTripCustomCurrency = '';
    newTripRate = '';
  },

  renameTrip() {
    const name = renameTripDraft.trim();
    if (!name) return;
    if (renameTripUseForeign && renameTripCurrency === '__custom__' && !renameTripCustomCurrency.trim()) {
      showToast('Nhập mã/ký hiệu tiền tệ trước khi lưu');
      return;
    }
    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const oldCurrency = trip.foreign_currency || '';
    const resolvedCurrency = renameTripCurrency === '__custom__' ? renameTripCustomCurrency.trim().toUpperCase() : renameTripCurrency;
    const newCurrency = renameTripUseForeign ? resolvedCurrency : '';
    const newRate = renameTripUseForeign ? (parseFloat(renameTripRate) || '') : '';

    // Nếu trip đã có chi tiêu dùng ngoại tệ cũ, không cho đổi sang mã khác
    // (vì các dòng cũ vẫn lưu currency cũ, đổi mã sẽ làm sai lệch quy đổi VNĐ).
    if (oldCurrency && newCurrency && oldCurrency !== newCurrency) {
      const hasOldCurrencyExpenses = rawExpenses.some(e => e.trip_id === activeTripId && e.currency === oldCurrency);
      if (hasOldCurrencyExpenses) {
        showToast(`Trip đã có chi tiêu bằng ${oldCurrency}, không thể đổi sang ${newCurrency}`);
        return;
      }
    }

    modal = null;
    withSaving(
      () => {
        trip.trip_name = name;
        trip.foreign_currency = newCurrency;
        trip.exchange_rate = newRate;
      },
      () => apiPost({ action: 'renameTrip', trip_id: activeTripId, trip_name: name }).then(() =>
        apiPost({ action: 'setTripCurrency', trip_id: activeTripId, foreign_currency: newCurrency, exchange_rate: newRate })
      )
    );
  },

  renameMember() {
    const newName = editMemberDraft.newName.trim();
    const oldName = editMemberDraft.oldName;
    if (!newName || newName === oldName) { modal = null; render(); return; }

    const trip = rawTrips.find(t => t.trip_id === activeTripId);
    const currentMembers = parseMembers(trip.members);
    if (currentMembers.includes(newName)) {
      showToast('Đã có thành viên tên này trong trip');
      return;
    }
    const newMembers = currentMembers.map(m => m === oldName ? newName : m);
    const tripId = activeTripId;

    // Tìm mọi expense liên quan tới tên cũ (đã trả, hoặc trong danh sách chia)
    const affectedExpenses = rawExpenses.filter(ex =>
      ex.trip_id === tripId && (ex.paid_by === oldName || parseMembers(ex.split_with).includes(oldName))
    );

    modal = null;
    withSaving(
      () => {
        trip.members = newMembers.join(',');
        affectedExpenses.forEach(ex => {
          if (ex.paid_by === oldName) ex.paid_by = newName;
          const splitList = parseMembers(ex.split_with);
          if (splitList.includes(oldName)) {
            ex.split_with = splitList.map(m => m === oldName ? newName : m).join(',');
          }
        });
      },
      async () => {
        await apiPost({ action: 'updateTripMembers', trip_id: tripId, members: newMembers.join(',') });
        for (const ex of affectedExpenses) {
          await apiPost({
            action: 'editExpense',
            expense_id: ex.expense_id,
            paid_by: ex.paid_by,
            amount: ex.amount,
            desc: ex.desc,
            split_with: ex.split_with,
            date: ex.date,
            time: ex.time,
            category: ex.category,
          });
        }
      }
    );
  },

  submitExpense() {
    const amt = parseFloat(expDraft.amount);
    if (!expDraft.paidBy || !amt || amt <= 0 || !expDraft.date) {
      showToast('Điền đủ thông tin trước khi lưu');
      return;
    }
    modal = null;
    const isEditing = !!expDraft.id;
    const isFund = expDraft.category === 'fund';
    // Khoản góp quỹ chỉ cộng cho người góp, không chia cho ai khác -
    // tận dụng cơ chế splitWith sẵn có bằng cách gán đúng 1 người là chính họ.
    const splitWith = isFund ? [] : expDraft.splitWith;
    const expenseData = {
      expense_id: isEditing ? expDraft.id : uid(),
      trip_id: activeTripId,
      paid_by: expDraft.paidBy,
      amount: amt,
      currency: expDraft.currency || '',
      desc: expDraft.desc.trim(),
      split_with: splitWith.join(','),
      date: expDraft.date,
      time: expDraft.time || '',
      category: expDraft.category || '',
    };

    if (isEditing) {
      withSaving(
        () => {
          const idx = rawExpenses.findIndex(e => e.expense_id === expDraft.id);
          if (idx !== -1) rawExpenses[idx] = expenseData;
        },
        () => apiPost({ action: 'editExpense', ...expenseData })
      );
    } else {
      withSaving(
        () => { rawExpenses.push(expenseData); },
        () => apiPost({ action: 'addExpense', ...expenseData })
      );
    }
  }
};

// ===== Xác định workspace trước khi khởi động app =====
const WORKSPACE_STORAGE_KEY = 'tripsplit_workspace_id';
let WORKSPACE_ID = '';

function getWorkspaceFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const ws = params.get('ws');
  return ws ? ws.trim() : '';
}

function startApp(workspaceId) {
  WORKSPACE_ID = workspaceId;
  localStorage.setItem(WORKSPACE_STORAGE_KEY, workspaceId);
  // Đồng bộ luôn lên URL để bookmark/chia sẻ lại đúng workspace này
  const url = new URL(window.location.href);
  url.searchParams.set('ws', workspaceId);
  window.history.replaceState({}, '', url);

  document.getElementById('app').innerHTML = '';
  refreshData(true);
  startPolling();
}

function renderWorkspaceSetup(existingWarning) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="card" style="max-width:420px; margin:2rem auto;">
      <div class="card-head"><span class="card-title">Tạo không gian của bạn</span></div>
      <p style="font-size:13.5px; color:var(--text-secondary); margin-top:0;">
        Đặt một tên riêng để lưu trữ trip của bạn, tách biệt với người khác cùng dùng app này.
        Ví dụ: tên bạn hoặc một biệt danh không trùng với ai (vd: <em>phong-2026</em>).
      </p>
      <div class="field">
        <label>Tên không gian</label>
        <input id="workspaceInput" placeholder="vd: phong-2026" autocomplete="off">
      </div>
      <div id="workspaceWarning"></div>
      <div class="row" style="justify-content:flex-end; margin-top:10px;">
        <button class="primary" onclick="window.app.confirmWorkspace()">Tiếp tục</button>
      </div>
    </div>
  `;
  if (existingWarning) {
    document.getElementById('workspaceWarning').innerHTML = `
      <div class="setup-banner" style="margin-bottom:0;">
        Tên "<strong>${escapeHtml(existingWarning)}</strong>" đã có dữ liệu trip từ trước.
        Nếu đây không phải không gian của bạn, hãy đổi sang tên khác để tránh nhầm lẫn với người khác.
      </div>`;
  }
  document.getElementById('workspaceInput').focus();
}

window.app.confirmWorkspace = async function() {
  const input = document.getElementById('workspaceInput');
  const name = input.value.trim();
  if (!name) {
    showToast('Nhập tên không gian trước khi tiếp tục');
    return;
  }
  if (!/^[a-zA-Z0-9_-]+$/.test(name)) {
    showToast('Chỉ dùng chữ, số, dấu gạch ngang/gạch dưới, không dấu cách');
    return;
  }
  try {
    WORKSPACE_ID = name; // tạm gán để apiPost gửi đúng workspace khi check
    const result = await apiPost({ action: 'checkWorkspaceExists' });
    if (result.exists && !input.dataset.confirmed) {
      input.dataset.confirmed = 'true';
      renderWorkspaceSetup(name);
      const newInput = document.getElementById('workspaceInput');
      newInput.value = name;
      newInput.dataset.confirmed = 'true';
      return;
    }
    startApp(name);
  } catch (err) {
    showToast('Lỗi kết nối, thử lại sau: ' + err.message);
  }
};

// ===== Khởi động =====
(function initWorkspace() {
  const fromUrl = getWorkspaceFromUrl();
  if (fromUrl) {
    startApp(fromUrl);
    return;
  }
  const fromStorage = localStorage.getItem(WORKSPACE_STORAGE_KEY);
  if (fromStorage) {
    startApp(fromStorage);
    return;
  }
  renderWorkspaceSetup(null);
})();
</script>
